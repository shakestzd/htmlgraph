meta:
    id: plan-c3bbb1ed
    track_id: trk-f15004d6
    title: Cross-session file visibility for concurrent CLI sessions
    description: ""
    created_at: ""
    status: finalized
    schema_version: v3
    version: 4
design:
    problem: Concurrent CLI sessions (Claude/Codex/Gemini) edit overlapping files invisibly — users cannot see which files other active sessions are touching, causing attribution mix-ups and coordination failures in shared projects.
    goals:
        - Surface which concurrent sessions are editing which files (read-only roster)
        - Detect and warn on live file overlaps before edits are made
        - Build first-class file-ownership semantics via claims.write_scope
        - Establish honest session liveness and cross-harness lifecycle hooks
        - Make the dashboard Kanban board the user-facing source of truth for active work, step progress, ownership, and cross-CLI movement
    constraints:
        - Zero write amplification on the PreToolUse/PostToolUse hot path (feat-156e0a1a SQLITE_BUSY gate must stay at zero)
        - Avoid new hot-path lock tables; the only new derived table allowed by this plan is session_files for claimless file touches
        - Roster and overlap detection must be pull-queries (explicit CLI/API calls), not a live-watch daemon
        - Codex/Gemini liveness must be honest even when a harness lacks Claude-style SessionEnd semantics
    approved: false
    comment: ""
slices:
    - id: slice-1
      num: 1
      title: 'Tier 0 — Surface session→files: wipnote who + session show + API + dashboard'
      what: |
        Add read-only surfacing of data wipnote already captures. New `wipnote
        who` command lists every active session in the current project (joined
        sessions + claims + feature_files) with agent, model, active work item,
        claim lease remaining, and the files that session has touched
        (feature_files.session_id already exists — schema.go:301-311, nullable).
        Extend `wipnote session show <id>` with a Files section. Add a `files[]`
        array per session to GET /api/sessions (api.go:97-173, today 13 scalar
        fields, no files). Add an "Active sessions & files" dashboard panel.
        Reuse the ListFilesByFeature pattern (feature_files_repo.go:42) for a
        new ListFilesBySession. No new tables, no writes.
      why: |
        Track trk-cd61bbae. Concurrent Claude/Codex/Gemini sessions edit
        overlapping files invisibly — this session a concurrent Codex session
        committed feat-b2d1dc2e WIP unseen, causing an attribution mix-up.
        Forward sibling of closed bug-e8b8900b. Highest ROI: pure surfacing of
        already-captured data, zero lifecycle/contention risk.
      files:
        - cmd/wipnote/who.go
        - cmd/wipnote/session.go
        - cmd/wipnote/api.go
        - internal/db/session_repo.go
        - internal/db/feature_files_repo.go
        - cmd/wipnote/static
      deps: []
      done_when:
        - '`wipnote who` lists each active session in the current project with agent, model, active work item, claim lease remaining, and touched files'
        - '`wipnote session show <id>` includes a Files section (path, operation, last_seen)'
        - GET /api/sessions returns a `files` array per session
        - Dashboard renders an Active sessions & files panel
      effort: M
      risk: Low
      tests: |
        Unit: TestSessionFiles_Query — SELECT file_path FROM feature_files WHERE session_id=?
        Integration: TestWhoCommand — spawn binary, seed two sessions, assert roster + files
        API: /api/sessions response includes files[]
        Regression: existing cmd/wipnote/session_test.go must still pass
      complexity: complex
      approved: true
      comment: ""
      questions:
        - id: q-scope
          text: Scope `wipnote who` to the current project only, or all projects?
          answer: Current project only — the SQLite DB is per project-path-hash; cross-project rollup is out of scope.
      critic_revisions:
        - source: sonnet
          severity: LOW
          summary: 'Verified: feature_files.session_id (schema.go:301-311, nullable); write_scope col (schema.go:202); WriteScope struct (claim.go:38-44, never populated, only read at claim.go:139-141); /api/sessions 13 scalars no files[] (api.go:97-173); ListFilesByFeature reuse realistic (feature_files_repo.go:42). Slice fully grounded.'
        - source: haiku
          severity: LOW
          summary: Well-scoped, read-only, testable done_when, zero write-path/contention risk. Project-only scope decision correct. No rework.
      decisions_notes: |
        **Trigger:** explicit CLI invocation (`wipnote who`, `session show`) and
        GET /api/sessions — no hook, off the hot path.
        **State:** derived read only; joins existing sessions + claims +
        feature_files. No new table; nothing persisted.
        **Payload:** per-session roster row + files[] (path, operation,
        last_seen); /api/sessions gains files[].
        **Track:** trk-cd61bbae.
        **Rejected:** new table (data already in feature_files — DRY); a
        live-watch daemon (out of scope for Tier 0; a pull query suffices).
    - id: slice-2
      num: 2
      title: 'Tier 1 — Live file-overlap detection: who ⚠ flag + PreToolUse advisory (+ composite index)'
      what: |
        Compute intersection of recently-touched file sets (feature_files,
        last_seen within a window) across LIVE sessions. `wipnote who` marks
        files touched by >=2 live sessions with ⚠ and the other session id.
        PreToolUse check: before Edit/Write, a single indexed SELECT for the
        same path touched by another live session within the window emits a
        non-blocking advisory. ADD a composite index
        idx_feature_files_path_seen ON feature_files(file_path, last_seen) via
        schema.go + a migration (FEASIBILITY CRITIC: only idx_feature_files_path
        on (file_path) exists today — schema.go:433-434 — the overlap query
        would otherwise range-scan). Config flags `warn_on_file_overlap`
        (default true) and `block_on_file_overlap` (default false → exit 2),
        read via the same local os.ReadFile pattern as
        block_task_completion_on_quality_failure (task_completion_gate.go:77-96;
        no shared internal/config package exists).
      why: |
        Track trk-cd61bbae. Detect collisions in real time, before the edit —
        the failure mode that caused the feat-b2d1dc2e mix-up. Depends on
        slice-4's heartbeat-recency liveness so the ⚠ does not false-fire on
        stale 'active' ghost sessions (bug-6c3e8252).
      files:
        - cmd/wipnote/who.go
        - internal/hooks/pretooluse.go
        - internal/db/feature_files_repo.go
        - internal/db/schema.go
        - internal/db/migrations.go
      deps:
        - 1
        - 4
      done_when:
        - '`wipnote who` marks files touched by >=2 live sessions with ⚠ and the other session id'
        - PreToolUse prints an advisory when editing a file another live session touched within the window (non-blocking by default)
        - '`block_on_file_overlap: true` makes PreToolUse return exit code 2 with a recovery hint'
        - A composite index idx_feature_files_path_seen on feature_files(file_path, last_seen) backs the overlap query (added in schema + migration)
        - The overlap check is a single indexed SELECT with zero writes — feat-156e0a1a zero-SQLITE_BUSY gate stays green
      effort: L
      risk: Med
      tests: |
        Unit: TestOverlapQuery — intersecting feature_files by recent last_seen, EXPLAIN uses the new composite index
        Hook: TestPreToolUseOverlapAdvisory — advisory + block-mode exit 2
        Migration: TestMigration_FeatureFilesPathSeenIndex
        Contention regression: feat-156e0a1a SQLITE_BUSY assertion remains zero
      complexity: complex
      approved: true
      comment: ""
      questions:
        - id: q-window
          text: How long is the overlap recency window?
          answer: Default 15 minutes, configurable — aligned to the claim heartbeat/lease cadence so it tracks live work and excludes ghosts.
      critic_revisions:
        - source: sonnet
          severity: DANGER
          summary: 'Missing composite index: only idx_feature_files_path(file_path) exists (schema.go:433-434); overlap SELECT on (file_path,last_seen,session_id) would range-scan. RESOLVED: index + migration added to scope; effort M→L.'
        - source: sonnet
          severity: LOW
          summary: 'Config: no internal/config package; must replicate local os.ReadFile pattern from task_completion_gate.go:77-96 (block_task_completion_on_quality_failure). Files list corrected.'
        - source: haiku
          severity: HIGH
          summary: 'Overlap ⚠ depends on slice-4 honest-liveness or it false-fires on ghost sessions. RESOLVED: deps now [1,4]; execution order 1→4→2.'
      decisions_notes: |
        **Trigger:** PreToolUse on Edit/Write only.
        **State:** derived read from feature_files; no new table; one new
        composite index idx_feature_files_path_seen(file_path, last_seen).
        **Payload:** advisory text naming the conflicting session+file;
        config-gated exit 2 when blocking enabled.
        **Config:** mirrors block_task_completion_on_quality_failure local
        os.ReadFile pattern (task_completion_gate.go:77-96); no shared
        internal/config exists.
        **Track:** trk-cd61bbae.
        **Dep:** requires slice-4 heartbeat-recency liveness, else ⚠
        false-fires on ghost 'active' sessions (bug-6c3e8252).
        **Rejected:** blocking-by-default (too disruptive for parallel
        dogfooding); a dedicated file-lock table (write amplification on the
        PreToolUse hot path violates feat-156e0a1a zero-SQLITE_BUSY).
    - id: slice-3
      num: 3
      title: Tier 2 — Populate claims.write_scope.Paths in PreToolUse alongside the heartbeat UPDATE
      what: |
        CORRECTED from PostToolUse. The claim heartbeat (HeartbeatClaimByWorkItem)
        fires in PreToolUse (pretooluse.go:242), where the target file_path is
        already present in the Edit/Write tool input. Widen the SET clause of
        that EXISTING heartbeat UPDATE to also append the path to
        claims.write_scope.Paths (deduped, FIFO-capped at 200) — one UPDATE, no
        net-new write. The WriteScope struct + write_scope JSON column already
        exist (claim.go:38-44, schema.go:202) and are never populated today.
        Clear write_scope when the claim is released or expires
        (ReleaseAllClaimsForSession / ReapExpiredClaims in claim_repo.go).
        Surface scope in `wipnote claim list` / `claim show`.
      why: |
        Track trk-97f85b3b. First-class claimed-files concept enabling
        lease-based file ownership and a stronger overlap signal — without
        adding any write to the hot path.
      files:
        - internal/hooks/pretooluse.go
        - internal/db/claim_repo.go
        - internal/models/claim.go
        - cmd/wipnote/claim.go
      deps:
        - 1
      done_when:
        - write_scope.Paths is appended within the EXISTING PreToolUse heartbeat UPDATE (single UPDATE, zero net-new write)
        - Paths are deduped and FIFO-capped at 200 per claim
        - write_scope is cleared when the claim is released or expires (ReleaseAllClaimsForSession / ReapExpiredClaims)
        - On `wipnote reindex` write_scope resets with the rebuilt claims (documented ephemeral session state); no stale paths surface
        - '`wipnote claim list`/`show` display the claimed file scope per claim'
      effort: M
      risk: Med
      tests: |
        Unit: TestWriteScopeAppendedInHeartbeatUpdate — asserts a SINGLE claims UPDATE per PreToolUse
        Unit: TestWriteScopeDedupeCap — append/dedupe/FIFO-cap at 200
        Unit: TestWriteScopeClearedOnRelease — release + expiry both clear it
        Behavior: reindex resets write_scope (no stale paths)
      complexity: complex
      approved: true
      comment: ""
      questions:
        - id: q-cap
          text: Per-claim path cap?
          answer: 200 paths/claim, FIFO-trim — realistic feature scope without unbounded JSON growth.
        - id: q-timing
          text: PreToolUse or PostToolUse for write_scope population?
          answer: PreToolUse — the heartbeat UPDATE already runs there (pretooluse.go:242) and the file_path is in the tool input; PostToolUse has no claim write to extend.
      critic_revisions:
        - source: sonnet
          severity: DANGER
          summary: 'Original premise false: heartbeat is PreToolUse (pretooluse.go:242) not PostToolUse; PostToolUse does zero claim UPDATEs, so ''piggyback'' would be a net-new write breaking zero-amplification. RESOLVED: redesigned to widen the existing PreToolUse heartbeat UPDATE.'
        - source: haiku
          severity: HIGH
          summary: 'write_scope lifecycle (reindex, worktree teardown, release/expiry) was undefined. RESOLVED: cleared on ReleaseAllClaimsForSession/ReapExpiredClaims; resets on reindex (documented ephemeral); tests added.'
      decisions_notes: |
        **Trigger:** PreToolUse on Edit/Write (the path is in the tool input
        there) — CORRECTED from PostToolUse.
        **State:** claims.write_scope JSON (existing column); widened SET in
        the existing PreToolUse heartbeat UPDATE; ephemeral — rebuilt on
        reindex, cleared on release/expiry.
        **Payload:** deduped, FIFO-capped (200) Paths[].
        **Track:** trk-97f85b3b.
        **Rejected:** PostToolUse population — FEASIBILITY CRITIC proved
        HeartbeatClaimByWorkItem fires only in PreToolUse (pretooluse.go:242);
        PostToolUse does zero claim UPDATEs, so populating there is a net-new
        write violating zero-amplification. Separate file_claims table (write
        amplification, same contention contract).
    - id: slice-4
      num: 4
      title: Tier 3 — Honest liveness + claimless visibility (session_files) + cross-harness release
      what: |
        (a) PRIMARY cross-harness fix: derive 'live' in who/roster from
        claim-heartbeat recency, not sessions.status — works for ALL harnesses
        with no dependency on a session-end event. (b) Claimless visibility:
        the PostToolUse else-branch (posttooluse.go:134-138) currently only
        debugLogs and drops attribution when ctx.FeatureID=="". Replace with a
        new lightweight `session_files` table (session_id, file_path,
        operation, last_seen, UNIQUE(session_id,file_path)) — chosen over
        relaxing feature_files because feature_files.feature_id is NOT NULL
        with UNIQUE(feature_id,file_path) (schema.go:301-311) and cannot hold
        empty-feature_id rows. (c) Cross-harness session-end: Gemini already
        releases via Stop→SessionEnd (manifest:78, geminiEventName SessionEnd);
        Codex has NO session-end event in the manifest at all (SessionEnd:68 is
        claude-only; no Codex Stop/SessionEnd). New manifest work is
        Codex-specific and contingent on whether Codex CLI emits any
        session-end / task-lifecycle event; if it does not, Codex correctly
        relies on heartbeat-recency liveness (part a) + lease reap. Folds
        bug-6c3e8252.
      why: |
        Track trk-97f85b3b. The roster is only as honest as the session
        lifecycle; cross-harness gaps make it lie (ghost Codex/Gemini sessions,
        invisible claimless sessions) and defeat Tiers 0-2.
      files:
        - packages/plugin-core/manifest.json
        - internal/hooks/posttooluse.go
        - internal/hooks/sessionend.go
        - internal/db/session_repo.go
        - internal/db/claim_repo.go
        - internal/db/schema.go
        - internal/db/migrations.go
      deps:
        - 1
      done_when:
        - '`wipnote who` derives ''live'' from claim-heartbeat recency, not sessions.status; stale ''active'' rows are excluded'
        - Claimless session file touches are recorded in a new session_files table and visible in `wipnote who`
        - Gemini session-end release verified via the existing Stop→SessionEnd (manifest line 78)
        - 'Codex release mechanism resolved: either a Codex session-end handler is added to the manifest and ports regenerated, OR documented reliance on heartbeat-recency liveness because Codex emits no session-end event'
        - 'bug-6c3e8252: no new stale status=active sessions accumulate after a Codex/Gemini run exits'
      effort: L
      risk: High
      tests: |
        Unit: TestLivenessByHeartbeat — stale 'active' excluded by heartbeat age
        Unit: TestClaimlessSessionFilesLedger — FeatureID=="" writes session_files
        Integration: TestGeminiSessionEndRelease (existing Stop→SessionEnd path)
        Migration: TestMigration_SessionFilesTable
        Port regen: build-ports emits any new Codex session-end event
        Repro: bug-6c3e8252 stale-active harness → 0 after fix
      complexity: complex
      approved: true
      comment: ""
      questions:
        - id: q-claimless
          text: Where do claimless file touches live?
          answer: A new session_files table keyed (session_id,file_path) — feature_files cannot hold empty feature_id (NOT NULL + UNIQUE(feature_id,file_path), schema.go:301-311).
        - id: q-stale
          text: What heartbeat age marks a session as not-live?
          answer: '> 2x the heartbeat interval since last heartbeat (~2 min, derived from the lease/heartbeat cadence), tunable via config — drops ghosts, tolerates a slow tool call.'
      critic_revisions:
        - source: haiku
          severity: DANGER
          summary: 'feature_files UNIQUE(feature_id,file_path)+feature_id NOT NULL blocks claimless rows. RESOLVED: dedicated session_files table for FeatureID=='''' touches.'
        - source: haiku
          severity: DANGER
          summary: 'Codex has NO SessionEnd hook (manifest:68 claude-only; no Codex Stop). RESOLVED: heartbeat-recency liveness is the primary cross-harness fix; Codex session-end handling made contingent + flagged for verification.'
        - source: sonnet
          severity: LOW
          summary: 'Manifest matrix nuance: Gemini already releases via Stop→SessionEnd (manifest:78); only Codex truly lacks any session-end event. done_when reworded accordingly.'
        - source: haiku
          severity: HIGH
          summary: 'Claimless attribution table was undecided (session_files vs nullable feature_id). RESOLVED: session_files table; rationale recorded in decisions_notes.'
      decisions_notes: |
        **Trigger:** heartbeat-recency derivation (all harnesses); PostToolUse
        claimless else-branch (posttooluse.go:134-138); Codex session-end IF it
        exists.
        **State:** new session_files table (session_id, file_path, operation,
        last_seen, UNIQUE(session_id,file_path)) — chosen over nullable
        feature_id because feature_files.feature_id is NOT NULL + UNIQUE
        (schema.go:301-311).
        **Payload:** liveness boolean derived from heartbeat age.
        **Track:** trk-97f85b3b. Folds bug-6c3e8252.
        **Rejected:** relaxing feature_files (UNIQUE collision for empty
        feature_id — DESIGN+FEASIBILITY danger); trusting sessions.status
        (unreliable for non-Claude — bug-6c3e8252 root cause); assuming Codex
        has SessionEnd (manifest line 68 is claude-only; Codex has no
        session-end event — must verify Codex CLI lifecycle).
    - id: slice-5
      num: 5
      title: Tier 4 — Kanban work-board execution visibility
      what: |
        Promote the dashboard Work/Kanban view from a static work-item list into
        the user-facing coordination surface for concurrent CLIs. Extend
        /api/features with derived active-session/work-owner data from
        active_work_items + sessions + claims, step counters already stored on
        features, recent move/start/complete/add-step activity, and the file
        overlap signals from slices 1-4. Render those signals directly on
        Kanban cards and track groups: active CLI/model/session badge, step
        progress, last activity age, last touched file, overlap/conflict badge,
        and moved/reassigned markers. Keep card data read-only; canonical
        mutations still go through wipnote CLI commands and existing HTML
        work-item files.

        Define the cross-harness step contract explicitly. Claude TaskCreated /
        TaskCompleted continues to drive hook-only add-task-step /
        complete-task-step. Codex TaskStarted / TaskComplete and Gemini tool or
        session events must either map to the same canonical hidden commands
        when a work item is active, or be documented as unsupported with a
        visible dashboard "steps not live for this harness" state. Do not let a
        user infer that a stalled 0/N checklist is live if the harness cannot
        emit step events.
      why: |
        The first four slices give agents better file/session awareness, but the
        user still has to infer actual work progress from separate panels. The
        WAC Kanban board already groups work by status and track; this slice
        makes it the single glanceable answer to "what is each CLI working on,
        what moved, what step is running, and where are conflicts?"
      files:
        - cmd/wipnote/api.go
        - cmd/wipnote/api_feature_activity.go
        - cmd/wipnote/dashboard/js/app.js
        - cmd/wipnote/dashboard/css/components.css
        - cmd/wipnote/workitem_modify.go
        - cmd/wipnote/workitem.go
        - internal/hooks/task_tracking.go
        - internal/hooks/missing_events.go
        - packages/plugin-core/manifest.json
      deps:
        - 1
        - 2
        - 4
      done_when:
        - Kanban cards for in-progress work items show active CLI/session/model and claim lease freshness when present
        - Kanban cards show step progress (steps_completed/steps_total) without opening detail
        - Kanban cards show last activity age and last touched file, derived from feature activity and session/file data
        - Work items with live file overlap show the same conflict badge used by `wipnote who`
        - Track-group headers show active count, blocked/stale count, recently moved count, and done progress
        - Work detail shows step provenance (agent/CLI/session/timestamp) for task-created and task-completed steps
        - Start/complete/move/add-step/complete-task-step mutations are visible in the dashboard after refresh or the existing polling/SSE path
        - Cross-harness step tracking behavior is tested or explicitly surfaced as unsupported per harness; no dashboard state implies live step tracking when events are unavailable
      effort: L
      risk: Med
      tests: |
        API: TestFeaturesHandler_WorkBoardSignals — active sessions, step counters, last activity, moved/reassigned metadata
        Dashboard: renderKanban card unit/DOM test or focused browser smoke validates owner badges, progress, conflict, and no text overflow
        Hook: TestCodexTaskLifecycleStepMapping or explicit unsupported-state test, depending on actual Codex/Gemini events
        Regression: existing work detail still renders full step list and feature activity panels
      complexity: complex
      approved: true
      comment: ""
      questions:
        - id: q-board-source
          text: Should the Kanban board be the primary user-facing status surface?
          answer: Yes — sessions/files panels support diagnosis, but Work/Kanban is the single glanceable progress surface for users.
        - id: q-board-mutations
          text: Should dashboard drag/drop move work items between columns or tracks?
          answer: Not in this plan. Keep the dashboard read-only and reflect CLI mutations first; interactive board mutations can be a later slice.
      critic_revisions:
        - source: codex
          severity: HIGH
          summary: 'Original plan made agent file visibility first-class but did not require Kanban cards or track groups to surface active work, step progress, movement, or conflicts. RESOLVED: slice-5 adds board/API acceptance criteria.'
        - source: codex
          severity: HIGH
          summary: 'Cross-harness step execution visibility was undefined; current TaskCreated/TaskCompleted hooks are Claude-only while Codex/Gemini lifecycle differs. RESOLVED: slice-5 requires explicit mapping or visible unsupported state per harness.'
        - source: codex
          severity: MED
          summary: 'Work-item movement via move/start/complete/add-step existed but was not part of the dashboard contract. RESOLVED: slice-5 requires moved/reassigned and mutation freshness visibility.'
      decisions_notes: |
        **Trigger:** dashboard /api/features load/refresh and existing
        feature-activity reads; hook-driven step events when available.
        **State:** derived from existing work-item HTML/SQLite tables,
        active_work_items, sessions, claims, feature activity, and session/file
        data from slices 1-4. No dashboard-authored canonical work-item writes.
        **Payload:** card-level owner/session/model, progress, last activity,
        last file, conflict, movement, and track aggregate fields.
        **Track:** trk-cd61bbae and trk-97f85b3b.
        **Rejected:** drag/drop mutation in this plan — first make existing CLI
        movement visible and trustworthy; interactive mutation can follow after
        the read model is stable.
questions: []
critique:
    reviewed_at: "2026-05-16"
    reviewers:
        - Haiku (design)
        - Sonnet (feasibility)
    assumptions:
        - id: A1
          status: verified
          text: feature_files has a nullable session_id column
          evidence: internal/db/schema.go:301-311
        - id: A2
          status: verified
          text: claims.write_scope JSON + models.WriteScope exist but are never populated in production
          evidence: internal/models/claim.go:38-44; read-only at cmd/wipnote/claim.go:139-141
        - id: A3
          status: falsified
          text: claim heartbeat UPDATE fires in PostToolUse (slice-3 original premise)
          evidence: HeartbeatClaimByWorkItem is in internal/hooks/pretooluse.go:242; PostToolUse has zero claim UPDATEs — slice-3 redesigned to PreToolUse
        - id: A4
          status: falsified
          text: Codex has a SessionEnd hook to migrate
          evidence: packages/plugin-core/manifest.json:68 SessionEnd is claude-only; no Codex Stop/SessionEnd — slice-4 reframed around heartbeat-recency liveness
        - id: A5
          status: falsified
          text: feature_files can hold claimless (empty feature_id) rows
          evidence: schema.go:301-311 feature_id NOT NULL + UNIQUE(feature_id,file_path) — slice-4 adds a session_files table instead
        - id: A6
          status: questionable
          text: slice-2 overlap SELECT is fully indexed
          evidence: schema.go:433-434 only idx_feature_files_path(file_path); no (file_path,last_seen) — slice-2 now adds the composite index + migration
    critics:
        - title: DESIGN CRITIC
          sections:
            - heading: Dependency graph
              items:
                - badge: slice-2 dep
                  kind: warn
                  text: slice-2 overlap ⚠ false-fires on ghost sessions without slice-4 honest-liveness; deps corrected to [1,4].
            - heading: Lifecycle gaps
              items:
                - badge: write_scope
                  kind: warn
                  text: slice-3 reindex/teardown/release lifecycle was undefined; now cleared on release/expiry and reset on reindex.
                - badge: claimless schema
                  kind: danger
                  text: feature_files UNIQUE blocks claimless rows; slice-4 now adds a session_files table.
            - heading: Cross-harness
              items:
                - badge: Codex end
                  kind: danger
                  text: Codex has no SessionEnd; slice-4 reframed so heartbeat-recency liveness is primary and Codex session-end is contingent.
        - title: FEASIBILITY CRITIC
          sections:
            - heading: Cited facts
              items:
                - badge: slice-1
                  kind: success
                  text: All slice-1 schema/API facts verified at file:line; slice-1 needs no rework.
                - badge: heartbeat
                  kind: danger
                  text: Heartbeat is PreToolUse not PostToolUse (pretooluse.go:242); slice-3 redesigned to widen the existing PreToolUse UPDATE.
            - heading: Index realism
              items:
                - badge: no composite idx
                  kind: danger
                  text: Only idx_feature_files_path(file_path) exists; slice-2 now adds idx_feature_files_path_seen(file_path,last_seen) + migration.
            - heading: Reuse
              items:
                - badge: config pattern
                  kind: info
                  text: No internal/config package; slice-2 mirrors task_completion_gate.go:77-96 local-read pattern.
    risks:
