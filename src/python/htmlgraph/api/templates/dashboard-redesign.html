<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HtmlGraph Dashboard - Agent Activity & Orchestration</title>
    <script src="/static/htmx.min.js"></script>
    <script src="/static/idiomorph-ext.min.js"></script>
    <link rel="stylesheet" href="/static/style-redesign.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- HEADER -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">▲</span>
                    <span>HtmlGraph</span>
                </div>
                <div class="header-stats">
                    <div class="stat-badge">
                        <span class="stat-label">Events</span>
                        <span class="stat-value" id="event-count">0</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Agents</span>
                        <span class="stat-value" id="agent-count">0</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Sessions</span>
                        <span class="stat-value" id="session-count">0</span>
                    </div>
                    <div class="ws-indicator">
                        <div class="ws-dot connected" id="ws-indicator"></div>
                        <span id="ws-status">Connected</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- NAVIGATION TABS -->
        <nav class="tabs-navigation">
            <button class="tab-button active" data-tab="activity"
                    hx-get="/views/activity-feed"
                    hx-target="#content-area"
                    hx-trigger="click">
                <span class="tab-icon">▤</span>
                ACTIVITY
            </button>
            <button class="tab-button" data-tab="orchestration"
                    hx-get="/views/orchestration"
                    hx-target="#content-area"
                    hx-trigger="click">
                <span class="tab-icon">◊</span>
                ORCHESTRATION
            </button>
            <button class="tab-button" data-tab="work-items"
                    hx-get="/views/work-items"
                    hx-target="#content-area"
                    hx-trigger="click">
                <span class="tab-icon">█</span>
                WORK ITEMS
            </button>
            <button class="tab-button" data-tab="agents"
                    hx-get="/views/agents"
                    hx-target="#content-area"
                    hx-trigger="click">
                <span class="tab-icon">◆</span>
                AGENTS
            </button>
            <button class="tab-button" data-tab="metrics"
                    hx-get="/views/metrics"
                    hx-target="#content-area"
                    hx-trigger="click">
                <span class="tab-icon">▼</span>
                METRICS
            </button>
        </nav>

        <!-- CONTENT AREA -->
        <main class="content-area" id="content-area">
            <div class="loading-indicator">
                <div class="spinner"></div>
                <p>Loading dashboard...</p>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script>
        let eventCount = 0;
        let agentSet = new Set();
        let sessionCount = 0;
        let processedEventIds = new Set();
        let wsConnected = false;
        let activeView = 'activity-feed';
        let activityFeedReady = false;

        // Load initial stats from server
        async function loadInitialStats() {
            try {
                const response = await fetch('/api/initial-stats');
                const data = await response.json();

                eventCount = data.total_events || 0;
                sessionCount = data.total_sessions || 0;

                if (data.agents) {
                    data.agents.forEach(agent => agentSet.add(agent));
                }

                document.getElementById('event-count').textContent = eventCount;
                document.getElementById('agent-count').textContent = agentSet.size;
                document.getElementById('session-count').textContent = sessionCount;

                console.log('Initial stats loaded:', data);
            } catch (error) {
                console.error('Failed to load initial stats:', error);
            }
        }

        // Initialize dashboard on load
        document.addEventListener('DOMContentLoaded', function() {
            loadInitialStats();
            // htmx.ajax() does NOT return a Promise in HTMX 1.x — use htmx:afterSettle instead.
            // { once: true } auto-removes the listener after first fire; activityFeedReady
            // guards re-entry for subsequent tab-switch reloads via onTabFeedReady.
            document.body.addEventListener('htmx:afterSettle', function onFeedReady(evt) {
                const target = evt.detail.target;
                // Only fire once when the activity-feed partial first lands in #content-area
                if (target && (target.id === 'content-area' || target.classList.contains('activity-feed-view'))) {
                    if (!activityFeedReady) {
                        activityFeedReady = true;
                        initActivityFeedSSE();
                    }
                }
            }, { once: true });
            htmx.ajax('GET', '/views/activity-feed', {target: '#content-area'});
            connectWebSocket();
        });

        // Tab switching — update activeView so refreshActivityFeed() knows which tab is visible
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.tab-button').forEach(b => {
                    b.classList.remove('active');
                });
                this.classList.add('active');
                const tab = this.dataset.tab;
                // Map tab data-tab attribute to view name used by refreshActivityFeed
                activeView = (tab === 'activity') ? 'activity-feed' : tab;
                // Mark feed as not ready when switching away; it becomes ready after HTMX loads
                if (activeView !== 'activity-feed') {
                    activityFeedReady = false;
                } else {
                    // Switching back to activity feed — mark ready after content loads.
                    // htmx.ajax() doesn't return a Promise in HTMX 1.x; use a one-shot
                    // htmx:afterSettle listener instead.
                    document.body.addEventListener('htmx:afterSettle', function onTabFeedReady(evt) {
                        const target = evt.detail.target;
                        if (target && (target.id === 'content-area' || target.classList.contains('activity-feed-view'))) {
                            document.body.removeEventListener('htmx:afterSettle', onTabFeedReady);
                            activityFeedReady = true;
                        }
                    });
                    htmx.ajax('GET', '/views/activity-feed', {target: '#content-area'});
                }
            });
        });

        // WebSocket Connection
        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(wsProtocol + '//' + window.location.host + '/ws/events');

            ws.onopen = function(event) {
                console.log('WebSocket connected');
                wsConnected = true;
                updateWSStatus(true);
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'event') {
                        if (processedEventIds.has(data.event_id)) {
                            return;
                        }
                        processedEventIds.add(data.event_id);

                        eventCount++;
                        if (data.agent_id) {
                            agentSet.add(data.agent_id);
                        }

                        document.getElementById('event-count').textContent = eventCount;
                        document.getElementById('agent-count').textContent = agentSet.size;

                        const badge = document.getElementById('event-count').parentElement;
                        badge.classList.add('pulse');
                        setTimeout(() => badge.classList.remove('pulse'), 500);

                        // Feed updates are now handled by SSE (/activity-feed/stream).
                        // WebSocket is kept for presence / cost alerts only.
                    }
                } catch (e) {
                    console.error('WebSocket message error:', e);
                }
            };

            ws.onerror = function(event) {
                console.error('WebSocket error:', event);
                updateWSStatus(false);
            };

            ws.onclose = function(event) {
                console.log('WebSocket disconnected, reconnecting in 3s...');
                updateWSStatus(false);
                setTimeout(connectWebSocket, 3000);
            };
        }

        function updateWSStatus(isConnected) {
            wsConnected = isConnected;
            const indicator = document.getElementById('ws-indicator');
            const status = document.getElementById('ws-status');
            if (indicator) {
                indicator.classList.toggle('connected', isConnected);
                indicator.classList.toggle('disconnected', !isConnected);
            }
            if (status) {
                status.textContent = isConnected ? 'Connected' : 'Disconnected';
            }
        }

        /**
         * Debounced feed refresh — prevents rapid-fire HTMX swaps when many
         * low-signal tool events (Read, Bash, Grep) arrive in quick succession.
         */
        let _feedRefreshTimer = null;
        function debouncedFeedRefresh() {
            if (_feedRefreshTimer) clearTimeout(_feedRefreshTimer);
            _feedRefreshTimer = setTimeout(() => {
                _feedRefreshTimer = null;
                refreshActivityFeed();
            }, 800);
        }

        /**
         * Refresh the activity feed with a full reload into #content-area.
         *
         * The old delta approach (/views/activity-feed/delta?since=<event_id>)
         * only returned rows for brand-new UserQuery events, leaving tool events
         * within an ongoing session invisible. Full reload always shows current state.
         *
         * Expand state is saved/restored via the existing htmx:beforeSwap /
         * htmx:afterSettle handlers (window._htmxFeedExpandedState).
         *
         * Called by the SSE handler when a feed-update event arrives.
         */
        function refreshActivityFeed() {
            if (activeView !== 'activity-feed' || !activityFeedReady) return;

            // Full reload — the htmx:beforeSwap handler saves expand state first,
            // and htmx:afterSettle restores it after the swap completes.
            htmx.ajax('GET', '/views/activity-feed', {target: '#content-area'});
        }

        /**
         * Connect to the SSE endpoint for live activity feed updates.
         * When the server detects new events it sends a feed-update event,
         * which triggers refreshActivityFeed() to prepend only the new rows.
         *
         * Uses a reconnect loop with 5-second delay on error/close.
         */
        function initActivityFeedSSE() {
            let es;
            function connect() {
                es = new EventSource('/activity-feed/stream');
                es.addEventListener('feed-update', function() {
                    debouncedFeedRefresh();
                });
                es.onerror = function() {
                    es.close();
                    setTimeout(connect, 5000);
                };
            }
            connect();
        }

        // Preserve expansion state across HTMX feed refreshes
        document.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.target && evt.detail.target.classList.contains('activity-feed-view')) {
                // toggleChildren() marks the .expand-icon, not the row
                const expanded = new Set();
                document.querySelectorAll('.activity-row .expand-icon.expanded').forEach(icon => {
                    const row = icon.closest('[data-event-id]');
                    if (!row) return;
                    const eid = row.dataset.eventId;
                    if (row.classList.contains('parent-row')) {
                        expanded.add(eid);
                    } else if (row.classList.contains('depth-1')) {
                        expanded.add('child:' + eid);
                    }
                });
                window._htmxFeedExpandedState = Array.from(expanded);
            }
        });

        document.addEventListener('htmx:afterSettle', function(evt) {
            if (!window._htmxFeedExpandedState || !window._htmxFeedExpandedState.length) return;

            const expandedIds = new Set(window._htmxFeedExpandedState);
            window._htmxFeedExpandedState = null;

            // Use document query because outerHTML swap detaches the original target
            const feedContainer = document.querySelector('.activity-feed-view');
            if (!feedContainer) return;

            // Re-expand parent rows using handleParentClick so HTMX lazy-load is re-triggered
            feedContainer.querySelectorAll('.parent-row').forEach(row => {
                if (expandedIds.has(row.dataset.eventId)) {
                    handleParentClick(row);
                }
            });
            // Re-expand depth-1 child rows
            feedContainer.querySelectorAll('.child-row.depth-1').forEach(row => {
                if (expandedIds.has('child:' + row.dataset.eventId)) {
                    handleParentClick(row);
                }
            });
        });

        /**
         * Format timestamp to readable format (HH:MM:SS)
         */
        function formatTimestamp(timestamp) {
            try {
                const date = new Date(timestamp);
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                return `${hours}:${minutes}:${seconds}`;
            } catch (e) {
                return timestamp;
            }
        }

        /**
         * Escape HTML special characters to prevent XSS
         */
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Highlight an element briefly with a background color animation
         */
        function highlightElement(element) {
            if (!element) return;
            element.style.transition = 'background-color 0.3s ease';
            element.style.backgroundColor = 'rgba(163, 230, 53, 0.2)';
            setTimeout(() => {
                element.style.backgroundColor = '';
            }, 500);
        }

        function highlightRow(row) {
            if (row) {
                row.classList.add('new-event-highlight');
                setTimeout(() => {
                    row.classList.remove('new-event-highlight');
                }, 2000);
            }
        }

        function convertTimestampsToLocal() {
            const timestampElements = document.querySelectorAll('[data-utc-time]');
            timestampElements.forEach(element => {
                const utcTime = element.getAttribute('data-utc-time');
                if (utcTime) {
                    try {
                        const date = new Date(utcTime.replace(' ', 'T') + 'Z');
                        const localTime = new Intl.DateTimeFormat('en-US', {
                            year: 'numeric',
                            month: '2-digit',
                            day: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit',
                            hour12: false,
                            timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                        }).format(date);
                        element.textContent = localTime;
                        element.setAttribute('title', `UTC: ${utcTime} | Local: ${localTime}`);
                    } catch (err) {
                        console.warn('Failed to convert timestamp:', utcTime, err);
                    }
                }
            });
        }

        // Convert timestamps after HTMX loads content
        document.body.addEventListener('htmx:afterSettle', function(evt) {
            if (evt.detail.target.id === 'content-area') {
                if (typeof convertTimestampsToLocal === 'function') {
                    convertTimestampsToLocal();
                }
            }
        });

        // Toggle child rows visibility (for expandable tracing)
        function toggleChildren(parentRow) {
            const eventId = parentRow.dataset.eventId;
            const children = document.querySelectorAll(`[data-parent="${eventId}"]`);
            const expandIcon = parentRow.querySelector('.expand-icon');

            children.forEach(child => {
                child.classList.toggle('hidden');
            });

            if (expandIcon) {
                expandIcon.classList.toggle('expanded');
            }
        }

        // Expand all parent rows
        function expandAll() {
            document.querySelectorAll('.parent-row.has-children').forEach(row => {
                const eventId = row.dataset.eventId;
                const children = document.querySelectorAll(`[data-parent="${eventId}"]`);
                const expandIcon = row.querySelector('.expand-icon');

                children.forEach(child => {
                    child.classList.remove('hidden');
                });

                if (expandIcon) {
                    expandIcon.classList.add('expanded');
                }
            });
        }

        // Collapse all parent rows
        function collapseAll() {
            document.querySelectorAll('.child-row').forEach(child => {
                child.classList.add('hidden');
            });
            document.querySelectorAll('.expand-icon').forEach(icon => {
                icon.classList.remove('expanded');
            });
        }

    </script>

    <style>
        .new-event-highlight {
            animation: highlightPulse 2s ease-out;
        }

        @keyframes highlightPulse {
            0% {
                background-color: rgba(205, 255, 0, 0.1);
                border-left-color: #CDFF00 !important;
            }
            100% {
                background-color: transparent;
                border-left-color: transparent !important;
            }
        }

        /* Activity Feed Table Styles */
        .activity-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
        }

        .activity-table thead {
            background: var(--bg-darker);
        }

        .activity-table th {
            padding: var(--spacing-lg);
            text-align: left;
            color: var(--accent-lime);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-subtle);
        }

        .activity-table td {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-primary);
        }

        .activity-row:hover {
            background: var(--bg-hover);
        }

        .activity-row.parent-row {
            font-weight: 500;
        }

        .activity-row.child-row {
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.95rem;
        }

        .event-type-badge {
            margin-right: var(--spacing-sm);
            font-size: 1.1rem;
        }

        .agent-badge {
            display: inline-flex;
            align-items: center;
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(205, 255, 0, 0.1);
            border: 1px solid rgba(205, 255, 0, 0.3);
            border-radius: 2px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-lime);
        }

        .agent-badge.agent-claude {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            color: var(--agent-claude);
        }

        .agent-badge.agent-gemini {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--agent-gemini);
        }

        .child-indicator {
            margin-left: var(--spacing-md);
            color: var(--text-muted);
        }

        .tool-name {
            color: var(--accent-lime);
            font-size: 0.9rem;
        }

        .event-id-code {
            color: var(--accent-lime);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            max-width: 200px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: var(--spacing-md);
        }

        .empty-state small {
            color: var(--text-secondary);
        }

        /* New column widths - Input/Output are flexible, others fixed */
        .col-agent { width: 120px; }
        .col-tool { width: 100px; }
        .col-input { width: auto; }
        .col-output { width: auto; }
        .col-timestamp { width: 140px; }

        /* Make table use fixed layout for predictable column widths */
        .activity-table {
            table-layout: fixed;
        }

        /* Expandable tracing structure */
        .expand-icon {
            cursor: pointer;
            display: inline-block;
            margin-right: 0.5rem;
            transition: transform 0.2s ease;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .expand-icon.expanded {
            transform: rotate(90deg);
        }

        .parent-row.has-children {
            cursor: pointer;
        }

        .child-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .child-row.hidden {
            display: none;
        }

        /* Nested event children container styles */
        .event-children {
            display: flex;
            flex-direction: column;
            margin-top: 0;
            border-left: 1px solid var(--border-subtle);
            padding-left: var(--spacing-sm);
        }

        .child-event-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.1);
            font-size: 0.9rem;
            color: var(--text-primary);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .child-event-row:hover {
            background: rgba(0, 0, 0, 0.15);
            border-color: var(--border-subtle);
        }

        .child-event-row.depth-0 {
            margin-left: 0;
        }

        .child-event-row.depth-1 {
            margin-left: 20px;
        }

        .child-event-row.depth-2 {
            margin-left: 40px;
        }

        .child-event-row.depth-3 {
            margin-left: 60px;
        }

        .child-event-row.depth-4 {
            margin-left: 80px;
        }

        .child-event-row.depth-5 {
            margin-left: 100px;
        }

        .tree-connector {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: monospace;
            flex-shrink: 0;
        }

        .child-tool-name {
            font-weight: 600;
            color: var(--accent-lime);
            flex-shrink: 0;
        }

        .child-summary {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .child-agent-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(205, 255, 0, 0.1);
            border: 1px solid rgba(205, 255, 0, 0.3);
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-lime);
            flex-shrink: 0;
        }

        .child-agent-badge.agent-claude {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            color: var(--agent-claude);
        }

        .child-agent-badge.agent-gemini {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--agent-gemini);
        }

        .model-indicator {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .delegation-arrow {
            color: var(--text-muted);
            font-weight: bold;
            flex-shrink: 0;
        }

        .spawner-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #8B5CF6;
            flex-shrink: 0;
        }

        .spawner-badge.spawner-gemini {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: #3B82F6;
        }

        .spawner-badge.spawner-codex {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.4);
            color: #22C55E;
        }

        .spawner-badge.spawner-copilot {
            background: rgba(251, 146, 60, 0.15);
            border-color: rgba(251, 146, 60, 0.4);
            color: #FB923C;
        }

        .cost-badge {
            font-size: 0.7rem;
            opacity: 0.9;
            margin-left: 2px;
        }

        .child-duration {
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            font-family: monospace;
        }

        .child-timestamp {
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-shrink: 0;
            font-family: monospace;
        }

        @media (max-width: 1024px) {
            .col-agent { width: 100px; }
            .col-tool { width: 90px; }
            .col-timestamp { width: 120px; }

            .activity-table th,
            .activity-table td {
                padding: var(--spacing-md) var(--spacing-sm);
                font-size: 0.9rem;
            }

            .truncate {
                max-width: 100%;
            }

            .child-event-row {
                flex-wrap: wrap;
                gap: var(--spacing-xs);
                padding: var(--spacing-sm);
            }

            .child-summary {
                flex-basis: 100%;
                order: 3;
            }
        }
    </style>
</body>
</html>
