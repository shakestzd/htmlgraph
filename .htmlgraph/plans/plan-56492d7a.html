ght:100%;width:100%;border-radius:6px;transition:width .3s\"\u003E\u003C/div\u003E\u003C/div\u003E\u003Cmarimo-ui-element object-id='iLit-1' random-id='a89724d1-e5b8-8eba-3e2b-f236a2cad1d6'\u003E\u003Cmarimo-table data-initial-value='[]' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Decisions Made\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-data='\u0026quot;[{\u0026#92;\u0026quot;Question\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Where should the chat widget appear in the notebook?\u0026#92;\u0026quot;,\u0026#92;\u0026quot;Decision\u0026#92;\u0026quot;:{\u0026#92;\u0026quot;mimetype\u0026#92;\u0026quot;:\u0026#92;\u0026quot;text/markdown\u0026#92;\u0026quot;,\u0026#92;\u0026quot;data\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;paragraph\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;floating-sidebar\u0026lt;/strong\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026#92;\u0026quot;}},{\u0026#92;\u0026quot;Question\u0026#92;\u0026quot;:\u0026#92;\u0026quot;How much plan context should be injected into the system prompt?\u0026#92;\u0026quot;,\u0026#92;\u0026quot;Decision\u0026#92;\u0026quot;:{\u0026#92;\u0026quot;mimetype\u0026#92;\u0026quot;:\u0026#92;\u0026quot;text/markdown\u0026#92;\u0026quot;,\u0026#92;\u0026quot;data\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;paragraph\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;full-plan\u0026lt;/strong\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026#92;\u0026quot;}},{\u0026#92;\u0026quot;Question\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Should chat history persist across notebook restarts?\u0026#92;\u0026quot;,\u0026#92;\u0026quot;Decision\u0026#92;\u0026quot;:{\u0026#92;\u0026quot;mimetype\u0026#92;\u0026quot;:\u0026#92;\u0026quot;text/markdown\u0026#92;\u0026quot;,\u0026#92;\u0026quot;data\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;paragraph\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;persist\u0026lt;/strong\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026#92;\u0026quot;}},{\u0026#92;\u0026quot;Question\u0026#92;\u0026quot;:\u0026#92;\u0026quot;What should happen when claude CLI is not available?\u0026#92;\u0026quot;,\u0026#92;\u0026quot;Decision\u0026#92;\u0026quot;:{\u0026#92;\u0026quot;mimetype\u0026#92;\u0026quot;:\u0026#92;\u0026quot;text/markdown\u0026#92;\u0026quot;,\u0026#92;\u0026quot;data\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026#92;\u0026#92;\u0026quot;paragraph\u0026#92;\u0026#92;\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;callout-with-fallback\u0026lt;/strong\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026#92;\u0026quot;}}]\u0026quot;' data-total-rows='4' data-total-columns='2' data-max-columns='50' data-banner-text='\u0026quot;\u0026quot;' data-pagination='false' data-page-size='10' data-show-filters='false' data-show-download='false' data-show-column-summaries='false' data-show-data-types='true' data-show-page-size-selector='false' data-sho
