    risks:
        - risk: Concurrent flock writers (ingest render + live PostToolUse append + sweep append) may not all land events in the final file. The existing flock path is proven for single-writer sequences but the three-writer scenario introduces new contention. Could manifest as lost events or torn writes.
          severity: High
          mitigation: Slice 4's integration test MUST verify all N events land in the file (parsed via goquery, matched by data-event-id), not just that the writes completed without error. Spawn 20+ concurrent goroutines across all three writer types targeting the same session file.
        - risk: Schema migration for agent_events.reason column doesn't run on upgraded databases, causing sweep logic to fail at runtime when setting reason='swept'
          severity: Medium
          mitigation: Add the ALTER TABLE in the idempotent migration block at schema.go:Open() which runs on every database open. Test against a pre-migration schema snapshot to verify the migration succeeds.
        - risk: Ingest silently ignores HTML render errors via debugLog, re-creating Gap 1 for individual failed sessions
          severity: Low
          mitigation: Document the decision in the constraint — HTML render failure is non-fatal because SQLite still writes and the session can be recovered via the backfill migration. Add a debug-log line indicating render completion so users can verify the path ran.
        - risk: 5-minute orphan threshold is a constant (not a flag) and may be wrong for unusual environments (slow tools, long-running WebFetch)
          severity: Low
          mitigation: Start with 5 minutes as a constant in internal/hooks/. If tuning becomes necessary based on user reports, the constant can be changed in a follow-up release without a CLI migration.
        - risk: JSONL-first backfill could render incorrect HTML if the transcript file is corrupted or partially written
          severity: Low
          mitigation: Fallback to SQLite if JSONL parse fails. Report parse failures in the migration output so users can investigate. This is a one-shot migration and failures are recoverable by re-running.
        - risk: FinalizeSessionHTML races with an in-flight sweep's append because finalize currently does not use flock
          severity: Medium
          mitigation: Slice 2 wraps FinalizeSessionHTML in the same flock acquisition as AppendEventToSessionHTML. One-line change to an existing function.
    synthesis: |-
        Plan is BUILDABLE WITH MINOR CHANGES. Two assumptions were falsified by the feasibility critic and required concrete corrections:

        1. (A6) `createSessionHTML`, `appendEventToSessionHTML`, `sessionEvent`, and `summariseInput` are unexported — cross-package reuse from `cmd/htmlgraph/` needs an explicit export pre-step. Slice 1 now includes this as step (0) with the full symbol list.

        2. (A7) The `reason` column on `agent_events` does not exist — slice 2 needs an explicit `ALTER TABLE` migration in `schema.go:Open()`. Slice 2 now includes this as step (0).

        One framing error (A5) was corrected: the original plan said live sessions use structurally-open HTML while ingest sessions use closed HTML. Both actually use structurally-complete files with closing tags — the difference is the append mechanism (flock + `</ol>` marker insertion for live, batch write for ingest).

        High-severity risk R1 (concurrent flock writers) is covered by slice 4's explicit concurrent-writer test that verifies ALL N events land in the final file, not just 'no crash'. Medium-severity risks R2 (migration enforcement) and R6 (SessionEnd race) are addressed by additions to slices 2 and the FinalizeSessionHTML flock wrap. Low risks are documented in constraints or accepted.

        Verdict: BUILDABLE AS WRITTEN at v2. All 5 questions answered pending human review. Scope correctly excludes performance optimization and mid-session header refresh per the user's direction. Ready to open for human review.

        **v3 UPDATE (2026-04-10):** Both load-bearing pre-steps have been resolved in code BEFORE finalization, not deferred to slice execution. Commit landed the 5-symbol export (internal/hooks) and the reason-column ALTER TABLE migration (internal/db/schema.go). All 19 Go packages build, vet, and test clean. Slice 1 step (0) and slice 2 step (0) are now confirmations of a completed state rather than TODO work. This de-risks the plan execution by proving the refactor holds before committing to any slice implementation.
