questions:
    - id: q-verification-spike
      text: Should slice 1 be a committed SPIKE that blocks everything, or a non-blocking verification we do in parallel with slice 2 coding?
      description: The research confirmed `event.Source` is declared in the CloudEvent struct but has zero usage anywhere in htmlgraph's codebase — no log line, no read, no downstream action. We have no empirical evidence Claude Code actually populates this field in practice. Slice 1 is designed as a verification spike to confirm the field is non-empty before any schema or write-path work commits to using it. Option (a) treats it as a hard blocker — nothing ships until the field is verified. Option (b) treats it as parallel work that can be verified while slice 2 is being built, with the understanding that slice 2 might need to pivot if the verification fails. Option (a) is slower but safer; option (b) is faster but carries pivot risk. Given the launch timeline (this plan is the differentiator), safer is better — if we ship the wrong architecture and discover the field is empty at slice 3, we waste significant work.
      recommended: hard-blocker
      options:
        - key: hard-blocker
          label: 'A: Hard blocker — slice 1 must produce non-empty source evidence before slice 2 can start. Safest, slightly slower'
        - key: parallel-verification
          label: 'B: Parallel verification — slice 2 starts while slice 1 runs concurrently. Faster but risks rework if verification fails'
        - key: trust-struct-field
          label: 'C: Trust the struct field exists for a reason — skip slice 1 entirely and commit to slice 2 directly. Fastest, highest risk'
      answer: null
    - id: q-prerequisite-feat-195fcccc
      text: How do we handle feat-195fcccc step 4 (Wire SessionStart matcher startup|resume|clear|compact)?
      description: '**Updated after sonnet feasibility critique.** The prior framing was wrong: the SessionStart hook already fires today with an empty matcher on ALL session start events. The `matcher` field in `hooks.json` is for tool-name pattern matching (e.g., `Bash`, `Edit`), NOT for filtering on the CloudEvent.Source field. Every SessionStart event — startup, resume, clear, compact — already reaches the Go hook handler today. The real question is whether Claude Code populates `event.Source` with those string values in the JSON payload, and that''s what slice 1 of THIS plan resolves via instrumentation. Option (a) still waits for the original feature to ship, but that''s pointless since its step 4 would be a no-op. Option (b) absorbs feat-195fcccc step 4 into slice 1 of this plan and closes the original feature step as superseded — the instrumentation line in slice 1 IS the wiring. Option (c) marks feat-195fcccc step 4 as obsolete without touching this plan because the matcher is already effectively ''all events''. Recommendation: B, so there''s a clean audit trail showing the work migrated rather than disappeared.'
      recommended: absorb-into-slice-1
      options:
        - key: hard-prerequisite
          label: 'A: Hard prerequisite — finish feat-195fcccc step 4 before this plan starts, add blocked_by edge'
        - key: absorb-into-slice-1
          label: 'B: Absorb feat-195fcccc step 4 into slice 1 of this plan; mark the original feature as ''superseded by plan-1b621827'''
        - key: assume-matcher-works
          label: 'C: Assume the matcher already works today; verify as part of slice 1''s spike; if broken, file a bug'
      answer: null
    - id: q-backfill-threshold
      text: What is the default time-gap threshold for the backfill heuristic?
      description: 'The backfill migration detects logical session boundaries by finding gaps between consecutive message timestamps. Too short and we split during long thinks or compile steps. Too long and we miss quick resumes where the user closed Claude Code and opened it again within a few minutes. Research on shakestzd''s 3f70c3f9 found 38 gaps > 5 minutes and 16 segments > 30 minutes. 5 minutes is too aggressive (will split during long Bash runs or complex tool calls). 30 minutes is the user''s typical ''leave and come back'' cycle. 60 minutes is safer but undercounts real resumes. Worth noting: the threshold is a backfill heuristic only — live hook data uses the ground-truth source field and isn''t affected by this choice.'
      recommended: thirty-minutes
      options:
        - key: fifteen-minutes
          label: 'A: 15 minutes — aggressive, may split long thinks and compile steps as false boundaries'
        - key: thirty-minutes
          label: 'B: 30 minutes — balanced default, matches typical ''leave and come back'' cycle'
        - key: sixty-minutes
          label: 'C: 60 minutes — conservative, undercounts quick resumes but zero false positives'
        - key: two-hours
          label: 'D: 2 hours — very conservative, only splits on overnight or lunch-length breaks'
      answer: null
    - id: q-dashboard-default
      text: Does the dashboard show logical sessions by default, or transcript sessions by default?
      description: 'After slice 7, the sessions list has two view modes: one row per logical_session (matches the user''s mental model of ''a sitting'') and one row per transcript_session (matches Claude Code''s data model). Only one can be the default, and the toggle lets the user flip. Option (a) defaults to logical — prioritizes the user''s mental model and showcases the differentiator in the first screen. Option (b) defaults to transcript — matches the data model and minimizes surprise for users familiar with Claude Code''s session concept. For the LinkedIn launch, the logical-first default is the only way the differentiator is visible in a screenshot; the user has to click a toggle to see ''16 rows for 3f70c3f9'' which is the whole point.'
      recommended: logical-default
      options:
        - key: logical-default
          label: 'A: Logical sessions by default — matches user mental model, showcases differentiator on first load'
        - key: transcript-default
          label: 'B: Transcript sessions by default — matches Claude Code data model, less surprising for users familiar with Claude Code'
        - key: per-project-preference
          label: 'C: Per-project preference stored in .htmlgraph/config — user picks once per project'
      answer: null
    - id: q-active-work-item-key
      text: Does active_work_items continue to key on (session_id, agent_id), or migrate to (logical_session_id, agent_id)?
      description: '**Updated after sonnet feasibility critique.** The critique found that changing the active_work_items key to logical_session_id would break subagent work attribution: when a subagent is dispatched with `htmlgraph feature start <id>`, it writes its claim with the transcript session_id and its own agent_id. If the parent orchestrator crosses a logical session boundary (resume), the subagent''s claim would be keyed under the old logical_id and become invisible to queries using the new logical_id. Logical sessions are an observability layer on top of transcripts — they are NOT an attribution layer. Work attribution must remain at transcript session scope because that''s the scope the subagents run under. Recommendation: keep `(session_id, agent_id)` as the PK, do not add a `logical_session_id` column at all. The dashboard can JOIN `logical_sessions` by timestamp if needed for display grouping. The hybrid option is still valid but adds unused schema.'
      recommended: keep-session-id
      options:
        - key: keep-session-id
          label: 'A: Keep (session_id, agent_id) as the key; resumed sittings share the active work item slot with the prior sitting'
        - key: migrate-to-logical
          label: 'B: Migrate to (logical_session_id, agent_id); each sitting has its own independent slot — matches mental model but breaking change'
        - key: hybrid-informational
          label: 'C: Keep (session_id, agent_id) as the key, add logical_session_id as an informational column for future queries — zero migration, forward-compatible'
      answer: null
