meta:
    id: plan-1b621827
    track_id: trk-97f85b3b
    title: Logical session splitting via hook source field
    description: 'Split monolithic Claude Code transcripts into logical user-scoped sessions using the hook CloudEvent.Source field as the ground-truth boundary signal. Adds a logical_sessions table layered over the existing sessions table — the transcript session_id stays canonical, logical_sessions tracks sittings within it. Critical prerequisite: verify Claude Code actually populates the Source field in practice (code declares it but never reads it today). Backfill for historical data falls back to time-gap heuristics because JSONL files contain no resume markers. Differentiator for the LinkedIn launch: no other Claude Code observability tool has live hook data, so no other tool can split transcripts by Claude Code''s own boundary signal.'
    created_at: "2026-04-11"
    status: draft
    created_by: claude-opus
    version: 3
design:
    problem: |-
        Claude Code's session model treats a session as workspace-scoped and resumable indefinitely. Running `claude --resume` or picking 'continue most recent' at startup opens an existing session_id and appends new messages to the same JSONL file. The file the orchestrator analyzed in shakestzd (`3f70c3f9-b6aa-4360-b751-68166bb58744.jsonl`) spans 3 days, contains 175 user messages in 16 distinct work segments separated by time gaps ranging from 5 minutes to 12 hours, and crosses three different CWDs. Claude Code thinks of this as one session. The user thinks of it as 16 sittings.

        Current htmlgraph ingest is faithful to Claude Code's data — one JSONL produces one session row in SQLite and one HTML file under `.htmlgraph/sessions/`. That's architecturally correct but produces a dashboard experience where 'show me my sessions' returns monolithic multi-day entries bundling unrelated work. AgentsView has the same limitation (verified via their docs: they store 'JSONL per session' with no splitting). Every tool in this space that parses Claude Code JSONLs directly inherits this UX problem.

        htmlgraph is the only tool with live hook data. The hook `CloudEvent` struct at `internal/hooks/runner.go:51` already declares a `Source` field with comment `// startup, resume, clear, compact`. Research on 2026-04-11 confirmed this field is declared and JSON-decoded, but has ZERO usage anywhere in the codebase — no log line, no read, no downstream action. The plan's entire premise rests on Claude Code actually populating this field on SessionStart events, which has not been empirically verified. The first slice MUST verify this before any downstream work can land.

        Backfill for historical transcripts is a separate problem. JSONL files contain NO resume markers — no `source` field, no `sessionStart: true`, no structural break. `parentUuid` chains continue across time gaps (Claude Code models resume as conversation continuity by design). The backfill must rely on time-gap heuristics and be clearly labeled as derived rather than ground-truth. Only the live hook path can provide ground-truth boundaries.
    goals:
        - '**Verify then build** — before shipping any schema or write-path changes, confirm via a one-line debug log and a real resume test that Claude Code actually populates `event.Source` as `startup` / `resume` / `clear` / `compact`. If the field is empty in practice, pivot to time-gap-only detection.'
        - '**Ground-truth logical session boundaries from live hooks** — every SessionStart event with `source == ''startup'' || source == ''resume''` creates a new `logical_sessions` row. Every subsequent PreToolUse/PostToolUse event attributes its `agent_events` row to the current logical session via `logical_session_id` lookup through the `.active-session` file.'
        - '**Heuristic backfill for historical transcripts** — a one-shot migration scans existing session HTML files, detects time gaps exceeding a configurable threshold (default: 30 minutes), and emits `logical_sessions` rows marked as `derived` in a new column so the UI can distinguish them from hook-attributed boundaries.'
        - '**HTML-canonical round-trip preserved** — logical session boundaries are represented inside session HTML files as `<div data-logical-session="N" data-source="resume" data-started-at="...">` wrappers inside the `<ol>`, chosen specifically to avoid breaking the `strings.LastIndex(content, ''</ol>'')` append mechanism. Reindex parses these wrappers to reconstruct the logical_sessions table from HTML.'
        - '**Dashboard splits by default** — the sessions list shows one row per logical_session_id, with a toggle to group by transcript for users who want the raw Claude Code view. A 3-day merged transcript with 16 sittings becomes 16 distinct dashboard rows, each with its own title derived from the first user query in that segment.'
        - '**Differentiator for launch** — concrete, demo-able claim: ''AgentsView and every other tool that reads Claude Code JSONLs shows session 3f70c3f9 as one monolithic 3-day blob. htmlgraph splits it into 16 logical sessions using the hook source field, the same signal Claude Code uses internally. Only htmlgraph can do this because only htmlgraph is in the hook stream.'''
    constraints:
        - Claude Code's session_id remains the stable identifier for transcript files. Do not rewrite or rename JSONL files. Do not modify Claude Code data under any circumstances.
        - The existing `sessions` table stays intact. `logical_sessions` is additive. Every existing query against `sessions` must continue to work unchanged.
        - HTML is canonical (established in v0.54.0 via plan-43659c92). Logical session data must be representable in the session HTML file and reconstructable via reindex. No SQLite-only state.
        - The hook layer is the ONLY component that captures `event.Source` in real time. The backfill path must do best-effort reconstruction from JSONL + timestamps and label its rows `derived` (vs `hook` for live-attributed rows). Do not claim parity between the two sources.
        - '`clear` and `compact` source values are NOT logical session boundaries per Claude Code''s official docs. They represent within-session context resets (same session_id, context erased or condensed). Only `startup` and `resume` create new logical_sessions rows.'
        - '`isCompactSummary` is a real JSONL field at parser.go:113 that Claude Code writes on auto-compaction. It is currently filtered out by the parser. It MAY be used as a secondary structural signal in future work but is out of scope for this plan.'
        - The `.active-session` file and `ActiveSessionData` struct at `internal/hooks/session_start.go:18-29` is the existing plumbing pattern for per-project hook state. Extend it with a `LogicalSessionID` field rather than introducing a new DB query on every PreToolUse/PostToolUse event.
        - The HTML append mechanism uses `strings.LastIndex(content, '</ol>')` to find the insertion point in `AppendEventToSessionHTML`. Any DOM restructuring that adds nested `</ol>` elements would silently corrupt the insertion. Use `<div>` wrappers, never `<section>` with nested `<ol>`.
        - Existing reindex round-trip acceptance test from plan-43659c92 slice 4 must continue to pass. Any new HTML structure must be reindex-parseable.
        - 'Performance budget: backfill pass over the per-project HTML corpus completes in under 2 minutes. The relevant count is `.htmlgraph/sessions/*.html` files per project, NOT the global ~/.claude/projects JSONL corpus (sonnet critique found ~1,157 top-level JSONL files total, but backfill walks HTML per-project).'
        - No changes to Claude Code itself. No protocol changes. No requirements on Claude Code version beyond what the current hook integration already needs.
        - This plan is about SPLITTING, not MERGING. No UI to join two logical sessions into one. No cross-transcript grouping.
        - 'Prerequisite dependency clarification (from sonnet feasibility critique): feat-195fcccc step 4 is framed as ''Add SessionStart matcher support'' but the SessionStart hook already fires today with an empty matcher on ALL session start events. The `matcher` field in hooks.json is tool-name pattern matching, not Source-field filtering. The real unknown that slice 1 resolves is whether Claude Code populates `event.Source` with startup/resume/clear/compact in the JSON payload. Recommendation: absorb feat-195fcccc step 4 into slice 1 of this plan and close the original feature as superseded.'
        - 'Constraint (from sonnet feasibility critique): active_work_items table keys on (session_id, agent_id) and must REMAIN keyed on session_id. Logical sessions are an observability layer on top of transcripts, not an attribution layer. Changing the active_work_items key to logical_session_id would break subagent work attribution because resume creates a new logical_id but the subagent still needs to find its claimed feature by the transcript session_id. Add `logical_session_id` as an informational column only.'
        - 'Constraint (from haiku design critique + sonnet verification): `<div>` inside `<ol>` is spec-invalid HTML5. Go''s `golang.org/x/net/html` parser (used by goquery) is spec-compliant and MAY restructure the DOM on parse, moving the `<div>` out of the `<ol>`. Slice 1 must include a pre-flight goquery parse test BEFORE slice 2 commits to this HTML shape. If the parser restructures, fall back to using `<li class=''logical-session-marker''>` boundary markers as siblings inside `<ol>` with a different insertion anchor.'
        - 'Constraint (from sonnet feasibility critique): `WriteActiveSession(sessionID, projectDir string)` currently takes only two string arguments and constructs the `ActiveSessionData` struct internally. Adding `LogicalSessionID` requires either changing the signature or routing through the struct directly. Slice 2 must explicitly include this signature change in its edits.'
    approved: false
    comment: ""
slices:
    - id: feat-8e357e10
      num: 1
      title: 'SPIKE: Verify Claude Code populates event.Source in practice'
      what: |-
        Before committing to any schema or write-path changes, empirically verify that Claude Code actually sends a non-empty `source` value in the CloudEvent payload to SessionStart hooks. Currently the field is declared at `internal/hooks/runner.go:51` but has ZERO usage anywhere in the codebase — no log line, no read, no downstream action. We have no evidence it's populated.

        **(a) Instrument the SessionStart hook.** In `internal/hooks/session_start.go:SessionStart`, add a single debug log line immediately after the CloudEvent is decoded: `debugLog(projectDir, "[session-start] source=%q transcript_path=%q", event.Source, event.TranscriptPath)`. This is a safe additive change, zero behavior modification.

        **(b) Run quality gates.** `go build ./... && go vet ./... && go test ./...` must pass.

        **(c) Rebuild the binary.** `htmlgraph build` to get the instrumented version installed.

        **(d) Generate empirical evidence.** Run the following scenarios and capture what event.Source actually contains in `.htmlgraph/debug.log`. Tightened from critique: do NOT just run one of each — run at least 3 consecutive resume cycles on the same session to ensure the field is populated reliably, not just on first fire:
          - Fresh `claude` invocation in a project with no prior session — expect `source=startup`
          - `claude --resume <id>` on an existing session — expect `source=resume` (run at least 3 consecutive resume cycles)
          - Open a running session and run `/clear` — expect `source=clear`
          - Let a session auto-compact (or run `/compact`) — expect `source=compact`
          - Capture the Claude Code version (`claude --version`) alongside the evidence so we know what version was tested

        **(e) Pre-flight HTML DOM test (from critique — blocks slice 2).** Add an isolated Go test at `internal/hooks/session_html_test.go:TestLogicalDivInsideOl_GoqueryRoundTrip` that:
          - Builds a string `<ol reversed><div data-logical-session="x#0"><li data-ts="1">a</li></div></ol>`
          - Parses it via `goquery.NewDocumentFromReader(strings.NewReader(...))`
          - Queries `ol > div[data-logical-session]` and asserts the div is STILL a direct child of `<ol>` (not restructured out)
          - Queries `ol div[data-logical-session] > li` and asserts the `<li>` is inside the div
          - If the goquery parser moves the div out of `<ol>` during parsing, the test FAILS and this plan's HTML representation must be re-designed before slice 2 starts.
        This is the cheapest way to verify the load-bearing HTML shape claim before we commit to writing it on every hook fire.

        **(f) Commit the debug log line.** Leave it in the codebase as permanent instrumentation — the cost is negligible and future debugging benefits from always-on source capture.

        **(g) Gate decision.** Slice 2 does not start until BOTH gates pass:
          - Gate 1: `event.Source` is non-empty in at least 3 consecutive resume cycles in debug.log
          - Gate 2: the goquery pre-flight test passes
        If gate 1 fails, the entire feature pivots to time-gap-only heuristics and we drop the 'only htmlgraph can do this via hooks' differentiator claim. If gate 2 fails, the HTML shape must be redesigned (alternative: `<li class='logical-session-marker'>` sibling markers) before slice 4 ships.
      why: The plan's central premise is that Claude Code populates `event.Source` and we use it as a ground-truth boundary signal. Research on 2026-04-11 showed zero evidence this field is populated in practice — it's declared in the struct but never read or logged. Without verification, slices 2 through 7 could be built on an empty value and ship a feature that does nothing. Ten minutes of instrumentation and four manual scenarios is cheap insurance that gates the entire plan.
      files:
        - internal/hooks/session_start.go
        - internal/hooks/session_html_test.go
        - .htmlgraph/debug.log
      deps: []
      done_when:
        - A single debug log line is added to `SessionStart` after CloudEvent decode, recording `event.Source` and `event.TranscriptPath`
        - '`go build ./... && go vet ./... && go test ./...` all pass'
        - '`htmlgraph build` succeeds and the instrumented binary is installed'
        - At least 3 consecutive `claude --resume` cycles are captured in debug.log with non-empty `event.Source == 'resume'` — not just one
        - All four scenarios (startup / resume / clear / compact) produce non-empty `event.Source` matching the expected value
        - Claude Code version is recorded alongside the evidence
        - Pre-flight goquery DOM test `TestLogicalDivInsideOl_GoqueryRoundTrip` exists and passes, proving `<div>` inside `<ol>` survives goquery parsing without being restructured out
        - If gate 1 fails (empty Source in any scenario), slice 1 STOPS and this plan pivots to time-gap-only — full re-scope
        - 'If gate 2 fails (goquery restructures the div out of the ol), slice 1 STOPS and the HTML shape is redesigned (alternative: `<li class=''logical-session-marker''>` sibling markers) before slice 2 starts'
        - Findings are documented in the feature HTML as a comment so future reference is easy
      effort: S
      risk: Low
      tests: |
        Unit:
          - TestLogicalDivInsideOl_GoqueryRoundTrip — pre-flight DOM shape test (blocks slice 2 if it fails)
        Integration:
          - Manual scenarios captured in `.htmlgraph/debug.log` with at least 3 consecutive resume cycles — human-in-the-loop verification with Claude Code version recorded
        Regression:
          - `go test ./internal/hooks/...` must still pass unchanged — adding a debugLog line cannot break any existing test
      approved: false
      comment: ""
    - id: feat-289ce5e0
      num: 2
      title: 'Schema: logical_sessions table + ActiveSessionData.LogicalSessionID field'
      what: |-
        Add the data model for logical sessions and the live write path triggered by SessionStart hooks. Pure additive change — no existing data types modified.

        **(a) Schema migration.** In `internal/db/schema.go:Open()`, add:
        ```sql
        CREATE TABLE IF NOT EXISTS logical_sessions (
            logical_id TEXT PRIMARY KEY,
            transcript_session_id TEXT NOT NULL,
            boundary_index INTEGER NOT NULL,
            source TEXT NOT NULL,
            origin TEXT NOT NULL DEFAULT 'hook',  -- 'hook' | 'derived'
            started_at DATETIME NOT NULL,
            ended_at DATETIME,
            event_count INTEGER DEFAULT 0,
            message_count INTEGER DEFAULT 0,
            first_user_query TEXT,
            cwd TEXT,
            created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
            UNIQUE(transcript_session_id, boundary_index)
        );
        CREATE INDEX IF NOT EXISTS idx_logical_sessions_transcript
            ON logical_sessions(transcript_session_id);
        ```
        Also add an idempotent `ALTER TABLE agent_events ADD COLUMN logical_session_id TEXT` following the existing migration pattern.

        **(b) Extend ActiveSessionData.** At `internal/hooks/session_start.go:21-29`, add a `LogicalSessionID string` field to the struct with `omitempty` JSON tag for backward compatibility on read. **IMPORTANT (from sonnet critique):** `WriteActiveSession` currently takes only `(sessionID, projectDir string)` and constructs the `ActiveSessionData` struct internally. The signature must change to accept the full struct (or a new optional `logicalSessionID string` parameter). Also update `writeEnvVars(sessionID, projectDir)` callers in `SessionStart` to pass the new value. `ReadActiveSession` is already forward-compatible (unknown fields are ignored) so old `.active-session` files still read cleanly but return empty `LogicalSessionID` until the hook layer writes it.

        **(c) SessionStart write path.** In `SessionStart`, after the existing session row upsert, check `event.Source`. If it's `startup` or `resume`, insert a new `logical_sessions` row via a new helper `CreateLogicalSession(db, transcriptSessionID, source, cwd, startedAt)` which:
          - Queries `SELECT MAX(boundary_index) FROM logical_sessions WHERE transcript_session_id = ?`
          - Inserts a new row at `max + 1` (or 0 if first) with `origin = 'hook'`
          - Generates `logical_id` as `<transcript_session_id>#<boundary_index>`
          - Returns the new logical_id
        Then update `ActiveSessionData.LogicalSessionID` to the new value and write the file.

        If `event.Source` is `clear` or `compact`, do NOT create a new logical session. Leave the active session's `LogicalSessionID` unchanged. These are within-session resets.

        **(c1) first_user_query semantics (from haiku critique gap).** The `first_user_query` column is NULL at logical_sessions row creation time (SessionStart fires before any user prompt). It is populated by the next `UserPromptSubmit` hook event for that logical session: read the logical_id from ActiveSessionData, then `UPDATE logical_sessions SET first_user_query = ? WHERE logical_id = ? AND first_user_query IS NULL`. Only the first UserPromptSubmit wins; subsequent prompts do not overwrite. Backfill (slice 5) populates this from HTML parse.

        **(c2) ended_at semantics (from haiku critique gap).** There is no explicit 'session end' event in the hook stream. `ended_at` is populated in two places: (1) when the NEXT logical session boundary fires for the same transcript_session_id — set the prior row's `ended_at` to the new row's `started_at`. (2) Lazily at read time by the dashboard query: if ended_at is NULL AND no agent_events have been inserted for this logical_id in the last 5 minutes, treat as ended and compute from the last event's timestamp. Slice 7 handles the read-time case. For now, slice 2 only writes ended_at on boundary transitions.

        **(d) Tests.** Unit tests in `internal/db/logical_sessions_test.go` for `CreateLogicalSession` covering boundary_index monotonic increment, unique constraint, the origin default. Integration test in `internal/hooks/session_start_test.go` firing SessionStart with each of the four source values and asserting the correct logical_sessions behavior.

        This slice does NOT touch the HTML layer or the PreToolUse/PostToolUse propagation. Those are in slice 3 and slice 4.
      why: The data model and the live write path are foundational. Everything downstream (propagation, HTML, backfill, reindex, dashboard) depends on the table existing and SessionStart correctly creating rows when source is `startup` or `resume`. This slice is the first place where the Source field actually affects behavior, so it's the first place where we actually depend on slice 1's verification being positive.
      files:
        - internal/db/schema.go
        - internal/db/logical_sessions.go
        - internal/db/logical_sessions_test.go
        - internal/hooks/session_start.go
        - internal/hooks/session_start_test.go
        - internal/hooks/user_prompt_submit.go
      deps:
        - 1
      done_when:
        - '`logical_sessions` table created via idempotent `CREATE TABLE IF NOT EXISTS` in `schema.go:Open()`'
        - '`agent_events.logical_session_id` column added via idempotent `ALTER TABLE ADD COLUMN`'
        - '`ActiveSessionData` struct gains a `LogicalSessionID string` field with `omitempty` JSON tag'
        - '`WriteActiveSession` signature is extended to accept LogicalSessionID (either via full struct or additional parameter) — explicit signature change, not silent'
        - '`first_user_query` is populated on the next UserPromptSubmit for each logical session via conditional UPDATE'
        - '`ended_at` is populated on boundary transitions (prior row''s ended_at = new row''s started_at)'
        - '`CreateLogicalSession` helper in `internal/db/logical_sessions.go` handles boundary_index monotonic increment, origin default, and returns the new logical_id'
        - '`SessionStart` creates a new logical_sessions row when `event.Source == ''startup'' || event.Source == ''resume''`'
        - '`SessionStart` does NOT create a new logical_sessions row when `event.Source == ''clear'' || event.Source == ''compact''` (within-session resets)'
        - '`ActiveSessionData` is updated with the new logical_id after each boundary-creating event'
        - Unit tests cover boundary_index increment, unique constraint, origin default
        - Integration test fires all four source values and asserts the correct number of logical_sessions rows
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: M
      risk: Med
      tests: |
        Unit:
          - TestCreateLogicalSession_Monotonic — consecutive calls produce boundary_index 0, 1, 2
          - TestCreateLogicalSession_UniqueConstraint — duplicate (transcript, boundary) fails
          - TestCreateLogicalSession_OriginDefault — origin defaults to 'hook'
          - TestActiveSessionData_LogicalSessionIDRoundTrip — write + read preserves field
        Integration:
          - TestSessionStart_StartupCreatesLogicalSession — source='startup' produces one row
          - TestSessionStart_ResumeCreatesNewBoundary — second SessionStart with source='resume' produces boundary_index=1
          - TestSessionStart_ClearNoBoundary — source='clear' leaves logical_sessions unchanged
          - TestSessionStart_CompactNoBoundary — source='compact' leaves logical_sessions unchanged
        Regression:
          - existing session_start tests must pass unchanged
          - `reindex_sessions` round-trip test from plan-43659c92 must still pass
      approved: false
      comment: ""
    - id: feat-71fd8e63
      num: 3
      title: Propagate logical_session_id from ActiveSessionData to agent_events
      what: |-
        Wire the `logical_session_id` attribution into every PreToolUse and PostToolUse hook event so that `agent_events.logical_session_id` is populated for all events fired after slice 2 lands.

        **(a) Read ActiveSessionData in hook handlers.** In `internal/hooks/pretooluse.go` and `internal/hooks/posttooluse.go`, read `ActiveSessionData` via `ReadActiveSession(projectDir)` at the start of each hook (or use an existing cached read if one exists) and pull the `LogicalSessionID` field.

        **(b) Extend InsertAgentEvent.** Add `logical_session_id` to the INSERT statement in whichever repo function writes `agent_events` rows. Pass through from the hook handlers.

        **(c) Populate the column.** Every new agent_events row written via hooks gets `logical_session_id = ActiveSessionData.LogicalSessionID`. If the field is empty (e.g., a session that pre-dates slice 1), write NULL — legacy rows are unattributed and will be handled by the backfill in slice 5.

        **(d) Update the session HTML write path for the marker.** This slice does NOT yet add the `<div data-logical-session>` wrapper in HTML (that's slice 4) — it only updates SQLite. Slice 4 is where we bridge the gap between SQLite writes and HTML canonicalness.

        **(e) Tests.** Update the existing PreToolUse/PostToolUse tests to assert that the `logical_session_id` field is correctly populated when `ActiveSessionData.LogicalSessionID` is set. Also test the NULL case for pre-slice-2 sessions.

        This is a small, mechanical slice. The only subtlety is ensuring the read of ActiveSessionData is efficient — it's read on every hook fire and should stay under 1ms.
      why: Without this slice, slice 2 creates logical_sessions rows but no agent_events are attributed to them. The logical_session_id column exists but is always NULL. This slice closes the loop between the SessionStart boundary creation and the per-event attribution.
      files:
        - internal/hooks/pretooluse.go
        - internal/hooks/posttooluse.go
        - internal/db/event_repo.go
        - internal/hooks/pretooluse_test.go
        - internal/hooks/posttooluse_test.go
      deps:
        - 2
      done_when:
        - PreToolUse reads `ActiveSessionData.LogicalSessionID` and passes it through to event insert
        - PostToolUse reads `ActiveSessionData.LogicalSessionID` and passes it through to event insert
        - '`InsertAgentEvent` (or equivalent) writes `logical_session_id` column'
        - Every new agent_events row has `logical_session_id` set to the current logical session ID or NULL if unset
        - Tests confirm that after a startup + resume sequence, events from before the resume have boundary_index 0 and events from after have boundary_index 1
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: S
      risk: Low
      tests: |
        Unit:
          - TestPreToolUse_PropagatesLogicalSessionID — mock ActiveSessionData with logical_id, assert inserted event has it
          - TestPostToolUse_PropagatesLogicalSessionID — same pattern
          - TestPreToolUse_NullWhenUnset — empty ActiveSessionData.LogicalSessionID -> NULL in DB
        Integration:
          - End-to-end: fire SessionStart startup -> PreToolUse -> PostToolUse, assert agent_events.logical_session_id matches the created logical_sessions row
          - Sequence: startup -> PreToolUse -> resume -> PreToolUse -> assert the two events have different logical_session_ids
        Regression:
          - All existing pre/post tests pass unchanged
      approved: false
      comment: ""
    - id: feat-a545b1bf
      num: 4
      title: 'HTML representation: <div data-logical-session> wrappers inside <ol>'
      what: |-
        Represent logical session boundaries inside the session HTML file so the HTML-canonical round-trip invariant holds for this new data type.

        **Critical constraint from research:** the existing `AppendEventToSessionHTML` uses `strings.LastIndex(content, '</ol>')` to find the insertion point. We cannot add nested `<section>` with `<ol>` inside — that would introduce additional `</ol>` tags and break the insertion. Must use `<div>` wrappers that don't contain nested `<ol>`.

        **(a) DOM shape.** Inside the existing `<ol reversed>`, each logical session is a `<div>` wrapper around its `<li>` children:
        ```html
        <ol reversed>
          <div data-logical-session="abc123#0"
               data-transcript-session="abc123"
               data-boundary-index="0"
               data-source="startup"
               data-started-at="2026-04-08T19:36:54Z">
            <li ...>...</li>
            <li ...>...</li>
          </div>
          <div data-logical-session="abc123#1"
               data-source="resume"
               data-started-at="2026-04-08T21:02:52Z">
            <li ...>...</li>
          </div>
        </ol>
        ```
        Note: `<div>` is not strictly valid HTML inside `<ol>` per the HTML5 spec (only `<li>` is permitted as direct children), but browsers tolerate it and goquery parses it fine. If strict validity matters for some downstream consumer, switch to `<li>`-wrapped groups with a nested `<ol>` (which would require rewriting the append logic to handle nested lists — worse tradeoff).

        **(b) Update `CreateSessionHTML`.** Add an initial `<div data-logical-session="<id>#0" data-source="startup" ...>` wrapper immediately inside the `<ol>` when the session is created. All subsequent events append into this div until a new logical session boundary fires.

        **(c) Update `AppendEventToSessionHTML`.** This is a material rewrite of the insertion logic, NOT a small extension (sonnet critique). The current single `strings.LastIndex(content, '</ol>')` approach becomes a two-marker scan:
          1. `strings.LastIndex(content, '</div>')` — find the last logical session wrapper's close tag
          2. Walk backward to find the enclosing `<div data-logical-session="...">` open tag
          3. Compare its `data-logical-session` attribute against the current event's logical_session_id
          4. If MATCH: insert the new `<li>` before the `</div>` (inside the current wrapper)
          5. If DIFFERENT: insert `</div><div data-logical-session="<new-id>" ...>` before inserting the `<li>`
          6. If no `<div>` exists yet (legacy HTML from before slice 4): fall back to old `strings.LastIndex('</ol>')` behavior
        Keep the flock-based read-modify-rewrite pattern — concurrency model unchanged, only the insertion anchor changes.

        **(d) Update `AppendOrphanedEvent`** (from plan-43659c92 slice 2) to respect the current logical session wrapper when writing synthetic aborted entries.

        **(e) Update `FinalizeSessionHTML`** to close any open `<div>` wrapper at session end.

        **(f) Tests.** HTML round-trip tests that verify the DOM structure parses correctly, the wrapper attributes are preserved, and multiple boundaries produce multiple divs. **(from critique):** the existing concurrent-writer test from plan-43659c92 slice 6 MUST be extended with a boundary-crossing case: two goroutines racing to append events where one is a boundary-crossing event. Assert the final HTML has exactly one clean boundary with no interleaved partial wrappers and no lost events.
      why: The HTML-canonical invariant from v0.54.0 says every SQLite row must be recoverable from HTML. Without this slice, logical_sessions exists in SQLite but has no representation in HTML — reindex would produce empty logical_sessions on rebuild. This slice is the bridge that keeps the invariant intact.
      files:
        - internal/hooks/session_html.go
        - internal/hooks/session_html_test.go
      deps:
        - 2
        - 3
      done_when:
