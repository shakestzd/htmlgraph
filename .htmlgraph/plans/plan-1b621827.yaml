    risks:
        - risk: Claude Code does not populate event.Source in practice — the entire differentiator collapses to time-gap heuristics
          severity: High
          mitigation: 'Slice 1 hard-gate: at least 3 consecutive resume cycles with non-empty Source + Claude Code version recorded. Failure = plan pivot to time-gap-only, explicit re-scope.'
        - risk: <div> inside <ol> is restructured by Go's x/net/html parser (spec-compliant), breaking HTML round-trip
          severity: High
          mitigation: Slice 1 adds pre-flight goquery test TestLogicalDivInsideOl_GoqueryRoundTrip. If it fails, fall back to <li class='logical-session-marker'> sibling markers before slice 4.
        - risk: Backfill HTML rewrite races with live hook writes, corrupting sessions
          severity: High
          mitigation: Backfill must (a) skip sessions with status='active' or recent mtime, AND (b) acquire the same flock used by the live hook path. Both safety measures required, not either-or.
        - risk: Slice 4 AppendEventToSessionHTML rewrite introduces a concurrency bug at boundary transitions
          severity: Medium
          mitigation: 'Extend plan-43659c92 slice 6 concurrent-writer test with a boundary-crossing case: two goroutines race across a logical session boundary. Assert final HTML is clean.'
        - risk: first_user_query and ended_at write semantics are undefined, leading to NULL/empty display in dashboard
          severity: Medium
          mitigation: 'Slice 2 now explicitly defines: first_user_query populated on next UserPromptSubmit (conditional UPDATE WHERE IS NULL); ended_at populated on boundary transition + lazy read-time computation in slice 7.'
        - risk: Changing active_work_items key to logical_session_id would break subagent attribution
          severity: Medium
          mitigation: Fixed by updating q-active-work-item-key recommendation to keep-session-id. Do not migrate. Logical sessions remain an observability layer.
        - risk: Backfill test uses range assertions ('8-16 rows') making regression tests useless
          severity: Low
          mitigation: 'Replaced with deterministic fixture test: hand-crafted HTML with exactly known gap distribution, assert exact boundary count and positions. shakestzd 3f70c3f9 demoted to smoke test.'
    synthesis: |-
        Plan is architecturally sound and grounded in existing patterns (ActiveSessionData, flock concurrency, HTML-canonical round-trip). Core idea (using event.Source as boundary signal) is novel and legitimately differentiates htmlgraph. However, four structural issues were identified and addressed in revision v2:

        1. Slice 1 tightened: at least 3 consecutive resume cycles + Claude Code version + pre-flight goquery DOM test. Both gates must pass before slice 2 commits.

        2. Slice 2 expanded: explicit WriteActiveSession signature change, first_user_query population on next UserPromptSubmit, ended_at population on boundary transitions.

        3. Slice 4 effort re-characterized as material rewrite (already L), with new concurrent-writer boundary-crossing test added.

        4. Slice 5 backfill hardened: flock acquired, active sessions skipped, deterministic fixture test replaces range assertions.

        Two questions had their recommended answer updated:
        - q-active-work-item-key: recommended = keep-session-id (changing would break subagent attribution).
        - q-prerequisite-feat-195fcccc: description corrected (hook already fires with empty matcher; real prerequisite is Source field population, tested by slice 1); recommendation = absorb-into-slice-1.

        Corpus size claim corrected: ~1,157 JSONL files (not 5,235); backfill operates on per-project HTML anyway.

        Slice 1 is the critical gate. Do NOT merge slices 2-7 until (a) event.Source empirically verified non-empty across 3 consecutive resume cycles and (b) goquery DOM pre-flight passes. If either gate fails, the plan re-scopes.
