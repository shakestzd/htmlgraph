      comment: ""
    - id: feat-e0d9a049
      num: 6
      title: 'Reindex round-trip: rebuild logical_sessions from HTML'
      what: |-
        Extend `htmlgraph reindex` to reconstruct the `logical_sessions` table from the session HTML `<div data-logical-session>` wrappers. Without this, HTML stops being canonical for the new data type.

        **(a) Update reindex_sessions.go.** The existing reindex path parses session HTML via goquery to rebuild the `sessions` table and `agent_events` rows. Add a new parse pass that walks `<div data-logical-session>` wrappers inside `<ol>` and emits `logical_sessions` rows with all fields reconstructed from the div attributes.

        **(b) Populate agent_events.logical_session_id.** As the reindex walks each `<li>` inside a div wrapper, attribute the event to the current logical session by writing `logical_session_id` on the corresponding agent_events row.

        **(c) Handle the transition period.** Sessions that predate slice 4 have no `<div>` wrappers in their HTML. Reindex must handle both shapes gracefully:
          - HTML with wrappers: normal reindex path
          - HTML without wrappers: no logical_sessions rows emitted; the backfill migration (slice 5) will add them separately
        No error, no warning for the no-wrapper case — it's legacy data.

        **(d) Full round-trip test.** The load-bearing acceptance test: 1) Create a test session with multiple SessionStart events (startup + resume), produce live HTML via the slices 2-4 write path. 2) Query logical_sessions table, assert N rows. 3) Nuke the logical_sessions table. 4) Run `htmlgraph reindex`. 5) Query logical_sessions again, assert the same N rows with identical attributes. This proves HTML is truly canonical for logical sessions.

        **(e) Idempotency on reindex.** Running reindex twice on the same HTML file produces the same logical_sessions rows (via upsert on the UNIQUE constraint). No duplicates.
      why: HTML-canonical means 'nuke SQLite, run reindex, get back the same state'. For sessions (from plan-43659c92) and work items (from earlier), this invariant holds. For logical sessions, without this slice, the invariant breaks — SQLite would have the logical_sessions rows but reindex wouldn't rebuild them. This slice is the load-bearing proof that HTML remains the source of truth even for the new data type.
      files:
        - cmd/htmlgraph/reindex_sessions.go
        - cmd/htmlgraph/reindex_sessions_test.go
      deps:
        - 4
        - 5
      done_when:
        - Reindex parses `<div data-logical-session>` wrappers and emits corresponding logical_sessions rows
        - Reindex populates `agent_events.logical_session_id` for each `<li>` inside a wrapper
        - Sessions with no wrappers (legacy HTML) reindex cleanly without error and without emitting logical_sessions rows
        - 'Reindex is idempotent: running twice produces no duplicates'
        - 'Full round-trip test passes: create logical_sessions via hook path -> nuke the table -> reindex -> verify identical state'
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: M
      risk: Med
      tests: |
        Unit:
          - TestReindexParseLogicalDiv — given HTML with a div wrapper, extract the attributes correctly
          - TestReindexLegacyHTMLNoError — HTML without wrappers reindexes cleanly
          - TestReindexIdempotent — running twice produces the same state
        Integration:
          - Full round-trip: hook path creates N logical sessions, nuke table, reindex, assert N rows restored identically
          - Existing reindex tests from plan-43659c92 slice 5 must still pass
        Regression:
          - The concurrent-writer acceptance test from plan-43659c92 slice 6 must still pass
      approved: false
      comment: ""
