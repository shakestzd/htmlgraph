    - id: feat-2b2f920b
      num: 5
      title: 'Backfill: reconstruct logical sessions from JSONL via time-gap heuristic'
      what: |-
        One-shot migration that backfills logical_sessions rows for every historical transcript in the corpus. Because JSONL files contain NO resume markers (verified by research), the backfill is fundamentally heuristic — it uses time gaps between consecutive messages as the boundary signal.

        **(a) New CLI subcommand.** `htmlgraph migrate logical-sessions [--project-dir <dir>] [--dry-run] [--gap-threshold <duration>]`. Default threshold: 30 minutes. Walks `.htmlgraph/sessions/*.html` for a project (or all registered projects).

        **(b) Per-transcript backfill.** For each session HTML file:
          - **Skip if the session is still active** (status='active' in sessions table, OR modified in the last 5 minutes) — from haiku critique, concurrent live writes + backfill rewrites would corrupt the HTML
          - **Acquire the same flock used by the live hook path** before reading+rewriting — from haiku critique, backfill and live writes must share the concurrency lock
          - Parse via goquery to extract all `<li data-ts='...'>` entries in timestamp order
          - Compute gaps between consecutive entries
          - For each gap > threshold, mark a logical session boundary
          - Emit `logical_sessions` rows with `origin='derived'`, `source='inferred'`, and a `first_user_query` extracted from the first user-type `<li>` after the boundary (fallback to empty string if no user message found)
          - Rewrite the session HTML file to wrap the `<li>` groups in `<div data-logical-session>` wrappers (following the shape from slice 4)
          - Populate `agent_events.logical_session_id` for the corresponding events via timestamp match (event_id + timestamp pair to disambiguate same-second events)
          - Release the flock

        **(c) Dry-run output.** `--dry-run` prints the plan without writing: for each transcript, how many logical sessions would be created, the time range of each, and the first user query in each.

        **(d) Idempotency.** Running the migration twice is a no-op on the second run — the skip-if-exists check on (transcript_session_id, boundary_index) means already-migrated transcripts are left alone. Useful for users who want to safely re-run with a different `--gap-threshold` value.

        **(e) Origin labeling.** All backfilled rows have `origin='derived'`. The dashboard shows these with a visual indicator (e.g., a `(inferred)` tag) so users know the split is heuristic rather than ground-truth. Live hook rows have `origin='hook'` and get the normal display.

        **(f) Tests.** **Deterministic fixture test (from haiku critique — must be exact, not a range):** build a hand-crafted fixture HTML with exactly known gap distribution (e.g., 20 `<li>` entries with timestamps such that 5 gaps exceed 30 minutes and 14 gaps are under 30 minutes). Assert the backfill produces EXACTLY 6 logical_sessions rows with EXACTLY the expected boundary positions. No 'within a range' assertions — the whole point of a regression test is that it breaks when behavior changes. Run shakestzd's 3f70c3f9 ONLY as an integration smoke test (behind a build tag), not as an assertion on count.

        Performance budget: backfill for the per-project HTML corpus completes in under 2 minutes. Per sonnet's corpus-size correction, the budget is measured per-project against `.htmlgraph/sessions/*.html` file count, not the raw JSONL corpus count.
      why: Historical transcripts have no live hook data — there's no source field to use as ground truth. If we ship the live path (slices 2-4) without the backfill, every user opens the dashboard and sees no logical sessions for anything created before the feature landed. Backfill closes the gap, with the explicit acknowledgment that the boundaries are heuristic rather than hook-attributed.
      files:
        - cmd/htmlgraph/migrate_logical.go
        - cmd/htmlgraph/migrate_logical_test.go
        - cmd/htmlgraph/main.go
      deps:
        - 2
        - 3
        - 4
      done_when:
        - '`htmlgraph migrate logical-sessions` subcommand exists and is registered in main.go'
        - Default gap threshold is 30 minutes; configurable via `--gap-threshold` flag
        - Parses session HTML via goquery to extract `<li data-ts>` timestamps
        - Emits one `logical_sessions` row per detected boundary, all with `origin='derived'`, `source='inferred'`
        - Rewrites the session HTML file to wrap `<li>` groups in `<div data-logical-session>` wrappers
        - Populates `agent_events.logical_session_id` for all events in each logical session
        - '`--dry-run` prints the plan without writing any files or DB rows'
        - 'Idempotent: running twice is a no-op on the second run'
        - Deterministic fixture test with hand-crafted gap distribution asserts EXACT boundary count and positions (not a range)
        - Backfill skips sessions with status='active' or mtime within last 5 minutes
        - Backfill acquires the same flock used by the live hook path before read+rewrite
        - Running on shakestzd 3f70c3f9 is an integration smoke test (build tag), not a count assertion
        - Full per-project run completes in under 2 minutes
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: L
      risk: Med
      tests: |
        Unit:
          - TestDetectBoundaries_ExactFixture — hand-crafted 20-li HTML with exactly 5 gaps > 30m, assert exactly 6 logical_sessions rows at exact positions
          - TestDetectBoundaries_ConfigurableThreshold — smaller threshold produces more boundaries (deterministic fixture, exact assertion)
          - TestRewriteHTMLWithWrappers — input HTML without wrappers, assert output has wrappers and original li elements preserved
          - TestBackfillSkipsActiveSessions — session with status='active' is untouched
          - TestBackfillUsesFlock — parallel live-write and backfill-rewrite on same file, assert no corruption (both complete, final HTML is consistent)
          - TestBackfillIdempotent — second run is a no-op
        Integration:
          - Deterministic fixture: a synthetic HTML with known gaps. Run backfill. Assert the exact number and positions of logical_sessions rows.
          - shakestzd 3f70c3f9 real-world smoke test (integration build tag): runs without crashing, produces non-zero row count, no assertion on exact count
        Regression:
          - Existing reindex_sessions round-trip still passes after a backfill rewrites the HTML
