meta:
    id: plan-1ad0496b
    track_id: trk-68655b2a
    title: Automode support — permission-mode auto + HtmlGraph guardrails
    description: |
        Add 'htmlgraph auto' as a sibling subcommand to 'htmlgraph yolo' that launches Claude Code with --permission-mode auto (Anthropic's classifier-based destructive-pattern blocker, v2.1.111+) while still applying the HtmlGraph PreToolUse guard suite. Extend the bash guard to catch patterns automode catches (curl|bash, force-push), subscribe to the new PermissionDenied hook for classifier-denial telemetry, add a consecutive-deny circuit breaker so stuck-agent retry loops escalate, and document the full mode matrix.
    created_at: "2026-04-18"
    status: draft
    created_by: claude-opus
    version: 3
design:
    problem: |
        Anthropic shipped --permission-mode auto in Claude Code v2.1.111 (2026-04-16): a classifier model pre-reviews each tool call and blocks destructive patterns (curl|bash, force-push, mass deletion, IAM grants, etc.). HtmlGraph's PreToolUse guards (work-item attribution, TDD commit, budget, UI screenshot, worktree isolation, research-first, bash-file-write blocklist) are orthogonal — domain-specific work-discipline controls automode has no concept of. Today there is no way to launch Claude with both layers active in a single command, no telemetry from the classifier, no circuit breaker for retry loops, and the HtmlGraph bash guard misses several patterns that automode catches (curl|bash, wget|sh, git push --force, tee, cp). The launchClaudeAuto() helper already exists at cmd/htmlgraph/claude.go:195 but is unreachable from any user-facing subcommand, and isYoloFromEvent() at internal/hooks/yolo_guard.go:25 only recognizes 'bypassPermissions' as a strict mode — 'auto' falls through and yolo-only guards (worktree, TDD, budget, UI, diff-review) silently disengage.
    goals:
        - '**Layered defense in one command** — `htmlgraph auto` launches Claude with `--permission-mode auto` AND the full HtmlGraph guard suite (work-item, TDD, worktree, budget, UI validation, research-first), measured by: invoking the command produces both classifier blocks and HtmlGraph hook blocks for the appropriate tool patterns.'
        - '**Bash guard parity with automode blocklist** — `bashFileWritePattern` (or a new sibling `bashDestructivePattern`) catches `curl|bash`, `wget|sh`, `git push --force`, `tee` to non-`.htmlgraph/` paths, and `cp` to source files; verified by table-driven tests in `pretooluse_test.go`.'
        - '**Classifier-denial telemetry** — Every `PermissionDenied` hook event is recorded in `agent_events` with `event_type=''permission_denied''` and the denied tool/input summary; queryable via the dashboard and `htmlgraph analytics`.'
        - '**Stuck-agent escalation** — After N consecutive `PermissionDenied` events for the same session (default 3), the next PreToolUse is hard-blocked with a circuit-breaker message instructing the user to intervene; verified by integration test.'
        - '**User-facing mode matrix** — A docs page (or extension to `docs/blog/posts/yolo-mode.md`) explains default vs `--permission-mode plan` vs `auto` vs `bypassPermissions` vs `htmlgraph yolo` vs `htmlgraph auto`, including which guards apply in each.'
    constraints:
        - Plugin source-of-truth rule — hook event matrix is declared in `packages/plugin-core/manifest.json`; `plugin/hooks/hooks.json` is generated by `htmlgraph plugin build-ports`. Never hand-edit generated files.
        - Hook state rule — gates must be reproducible across session restarts; the circuit breaker counter must read from durable state (`agent_events` SQL query), not in-memory session state.
        - Hooks must not write to stderr — debug output goes to `debug.log`. Allow returns `{}`, deny returns `{"decision":"block","reason":"..."}`.
        - '`event_type` is a CHECK enum at `internal/db/schema.go:124-129` — adding `permission_denied` requires a schema migration (SQLite ALTER TABLE rebuild pattern), or we choose a different storage approach.'
        - automode requires Anthropic Max+ plan — `htmlgraph auto` must fail gracefully on plans without auto-mode access (parse classifier-disabled error from claude CLI, or document as pre-flight requirement).
        - Existing 5 features (feat-2d2dfc12, feat-9c14a3ef, feat-fdad254b, feat-e86dbcdb, feat-85ef5a6b) are already filed on trk-68655b2a — slices map 1:1 to these features via the slice.feature_id field so finalize reuses them rather than creating duplicates.
    approved: false
    comment: ""
slices:
    - id: slice-1
      feature_id: feat-2d2dfc12
      num: 1
      title: htmlgraph auto subcommand — launch Claude with --permission-mode auto + guard suite
      what: |
        Add `cmd/htmlgraph/auto.go` exposing `htmlgraph auto` as a Cobra command, registered as a sibling to `yoloCmd()` under `claudeCmd()` at `cmd/htmlgraph/claude.go:97`. Mirror yolo's flag surface: `--dev`, `--init`, `--continue`, `--no-worktree`, `--tmux`, `--track`, `--feature`, `--resume`. The command calls the existing `launchClaudeAuto()` helper at `cmd/htmlgraph/claude.go:195` (which sets both `EnableAutoMode: true` and `PermissionMode: "auto"`). Extend `isYoloFromEvent()` at `internal/hooks/yolo_guard.go:25` to also recognize `event.PermissionMode == "auto"` as a strict mode (return true), so all yolo-gated guards (worktree, TDD commit, budget, UI validation, diff review, subagent work-item) activate under auto mode too. Update yolo's flag help text at `cmd/htmlgraph/yolo.go:64-65` to list `auto` alongside `bypassPermissions` and `acceptEdits` if relevant. Add tmux session name `htmlgraph-auto` distinct from `htmlgraph-yolo` so users can run both simultaneously.
      why: |
        Goal 1 (layered defense) is unreachable today — `launchClaudeAuto()` exists in code but is wired to no user-facing command. Without `htmlgraph auto`, users wanting both classifier protection and HtmlGraph guards must hand-craft a `claude --permission-mode auto --plugin-dir ...` invocation and lose the work-item/track/feature plumbing. The `isYoloFromEvent` extension is the single point that gates ~6 guards; missing it means auto mode silently runs without TDD/budget/worktree enforcement.
      files:
        - cmd/htmlgraph/auto.go
        - cmd/htmlgraph/claude.go
        - cmd/htmlgraph/yolo.go
        - internal/hooks/yolo_guard.go
        - internal/hooks/yolo_guard_test.go
        - cmd/htmlgraph/auto_test.go
      deps: []
      done_when:
        - '`htmlgraph auto --help` shows the same flag surface as `htmlgraph yolo` (with auto-specific tmux name).'
        - '`htmlgraph auto` invocation calls `launchClaudeAuto()` and `--permission-mode auto` appears in the resulting `claude` argv (verified by dry-run mode or unit test).'
        - Test `TestIsYoloFromEvent_AutoMode` in `yolo_guard_test.go` asserts that an event with `permission_mode="auto"` returns `true` from `isYoloFromEvent`.
        - '`go build ./... && go vet ./... && go test ./...` all pass.'
        - Pre-flight check or graceful error message when Claude returns 'auto mode requires Max plan'.
      effort: M
      risk: Med
      tests: |
        Unit (cmd/htmlgraph/auto_test.go):
          - TestAutoCmd_FlagSurface — assert all expected flags are registered
          - TestAutoCmd_BuildsClaudeArgs — dry-run produces argv containing "--permission-mode" "auto"
          - TestAutoCmd_TmuxSessionName — when --tmux, session name is "htmlgraph-auto"
        Unit (internal/hooks/yolo_guard_test.go):
          - TestIsYoloFromEvent_AutoMode — event.PermissionMode="auto" → true
          - TestIsYoloFromEvent_BypassPermissions — existing behavior preserved
          - TestIsYoloFromEvent_Default — event.PermissionMode="default" → false
          - TestIsYoloFromEvent_Plan — event.PermissionMode="plan" → false
        Integration (cmd/htmlgraph/auto_integration_test.go):
          - Dry-run launch → verify final argv contains both --permission-mode auto and HtmlGraph plugin-dir flags
        Regression: All existing TestYolo* tests must still pass — extending isYoloFromEvent must not regress bypassPermissions behavior.
      approved: false
      comment: ""
    - id: slice-2
      feature_id: feat-9c14a3ef
      num: 2
      title: Destructive bash guard — curl|bash, wget|sh, force-push, tee, cp
      what: |
        Add `bashDestructivePattern` regex to `internal/hooks/pretooluse.go` (alongside `bashFileWritePattern` at line 343) that matches: `curl ... | (bash|sh)`, `wget ... | (bash|sh)`, `git push ... --force` (and `-f`), `git push --force-with-lease` to protected branches (main/master), `tee` writing outside `.htmlgraph/`, `cp` writing to repo source files, and `chmod +x` on downloaded files. Wire a new guard `checkBashDestructiveGuard` called from `PreToolUse()` BEFORE the work-item guard so destructive intent fails fast. The guard hard-blocks (returns `{"decision":"block","reason":...}`) when in strict mode (yolo or auto), and warns-only via debug.log in default mode (consistent with classifier behavior in auto mode being authoritative). Provide a deterministic backstop for users not on Max+ who can't access automode. Anchor regexes to command shape (not substrings) per the hook state rule.
      why: |
        Goal 2 (bash guard parity). Today's bash guard catches sed/redirects/rm/mv/dd but misses pipe-from-network-to-shell and force-push — exactly the patterns automode's classifier blocks. Users on plans without automode access have zero deterministic protection from these. Even on automode, the deterministic Go guard runs first and gives a faster, citable failure (file:line) before round-tripping to the classifier.
      files:
        - internal/hooks/pretooluse.go
        - internal/hooks/pretooluse_test.go
      deps: []
      done_when:
        - Regex matches `curl https://example.com/install.sh | bash`, `wget -O - url | sh`, `git push --force origin main`, `git push -f`.
        - Regex does NOT match `htmlgraph yolo --no-worktree` (false positive check) or `git push origin feature-branch` (non-force).
        - Hard-block fires in yolo and auto modes; warn-only in default mode (verified by table-driven test).
        - Block reason cites the matched pattern category (e.g. 'pipe-to-shell', 'force-push') so users understand.
        - All existing pretooluse tests still pass.
      effort: S
      risk: Low
      tests: |
        Unit (internal/hooks/pretooluse_test.go):
          - TestBashDestructiveGuard_PipeToShell — curl|bash, wget|sh variants → block
          - TestBashDestructiveGuard_ForcePush — git push --force, -f, --force-with-lease to main → block
          - TestBashDestructiveGuard_AllowsNormalGit — git push, git push origin feature-branch → allow
          - TestBashDestructiveGuard_AllowsHtmlGraphCLI — htmlgraph commands containing 'force' string → allow
          - TestBashDestructiveGuard_StrictModeOnly — default mode logs warning but allows; yolo/auto mode blocks
          - TestBashDestructiveGuard_TeeAndCp — tee/cp variants matched correctly
        Regression: Full pretooluse_test.go suite (TestIsBashFileWrite_*, TestIsBashHtmlGraphWrite_*) must pass unchanged.
      approved: false
      comment: ""
    - id: slice-3
      feature_id: feat-fdad254b
      num: 3
      title: PermissionDenied hook → agent_events telemetry
      what: |
        Add `permission_denied` to the `event_type` CHECK enum at `internal/db/schema.go:124-129` AND `internal/db/schema.go:494-497` (current + migration paths) — SQLite ALTER TABLE rebuild pattern (create new table, copy data, drop old, rename). Add migration to `internal/db/migrations/`. Create handler `internal/hooks/permission_denied.go` mirroring `permission_request.go`: read CloudEvent from stdin, extract `tool_name`, `tool_input`, `reason`/`message`, insert via `db.InsertEvent` with `event_type="permission_denied"`. Register in `cmd/htmlgraph/hook.go:42` via `hookSubcmd("permission-denied", ..., hooks.PermissionDenied)`. Add to `packages/plugin-core/manifest.json:hooks.events` array with `targets: ["claude"]` (auto mode is Claude-only). Regenerate `plugin/hooks/hooks.json` via `htmlgraph plugin build-ports --target claude`. Handler returns `{}` (telemetry only — does not block; the deny already happened upstream).
      why: |
        Goal 3 (telemetry). Without recording PermissionDenied events, we have no visibility into what the classifier is blocking, no data to tune our deterministic guards, and no foundation for the circuit breaker (slice 4) to count. The schema migration is a one-time cost to enable a new dimension of observability.
      files:
        - packages/plugin-core/manifest.json
        - internal/db/schema.go
        - internal/db/migrations/
        - internal/hooks/permission_denied.go
        - internal/hooks/permission_denied_test.go
        - cmd/htmlgraph/hook.go
        - plugin/hooks/hooks.json
      deps: []
      done_when:
        - '`packages/plugin-core/manifest.json` includes a `PermissionDenied` event entry; `htmlgraph plugin build-ports --target claude` regenerates `plugin/hooks/hooks.json` containing it.'
        - Schema migration adds `permission_denied` to the event_type CHECK enum without breaking existing event inserts (idempotent on existing dbs).
        - Handler inserts an `agent_event` row with `event_type='permission_denied'`, `tool_name`, `input_summary`, `tool_input`, `output_summary` (the deny reason), and `session_id`.
        - '`htmlgraph hook permission-denied` accepts a CloudEvent on stdin and exits 0 with `{}` on success.'
        - Dashboard query `SELECT * FROM agent_events WHERE event_type='permission_denied'` returns recorded denials.
        - All quality gates pass.
      effort: M
      risk: Med
      tests: |
        Unit (internal/hooks/permission_denied_test.go):
          - TestPermissionDenied_InsertsEvent — handler reads stdin event, calls InsertEvent with correct fields
          - TestPermissionDenied_ReturnsEmptyJSON — does not block (always {} on success)
          - TestPermissionDenied_HandlesMissingFields — graceful when reason/tool_name absent
        Unit (internal/db/event_repo_test.go):
          - TestInsertEvent_PermissionDenied — InsertEvent accepts permission_denied event_type after migration
        Migration test (internal/db/schema_test.go):
          - TestSchema_PermissionDeniedMigration — fresh db has new enum; existing db (seeded with old schema) migrates cleanly without data loss
        Integration: end-to-end via `htmlgraph hook permission-denied` with sample CloudEvent fixture; verify row inserted.
        Regression: existing event_type values still INSERT successfully; existing migration tests pass.
      approved: false
      comment: ""
    - id: slice-4
      feature_id: feat-e86dbcdb
      num: 4
      title: Consecutive-deny circuit breaker — escalate stuck-agent retry loops
      what: |
        Extend `internal/hooks/pretooluse.go` to query `agent_events` at the start of every PreToolUse: count `permission_denied` events for the current `session_id` since the last non-denied tool_call (or in the last K minutes, whichever is shorter — tunable via constant). When count >= 3 (default), hard-block the next tool call with a circuit-breaker message: `"Circuit breaker tripped: 3 consecutive permission denials in this session. Pause and review with the user before retrying."` Reset the counter when any non-denied tool_call succeeds. Add a hidden `--reset-circuit-breaker` flag to `htmlgraph` (or a session-scoped escape hatch in `permission_denied.go`) for manual unstuck. Anchor counter to durable SQL query (per hook state rule), not in-memory state.
      why: |
        Goal 4 (escalation). Today a denied PreToolUse simply returns the block, and the agent retries indefinitely with minor variations — burning tokens, spinning forever, and obscuring the root cause. The circuit breaker forces a hard stop after a small number of denials so the user can intervene. Reading from `agent_events` (slice 3) keeps the gate reproducible across session restarts.
      files:
        - internal/hooks/pretooluse.go
        - internal/hooks/circuit_breaker.go
        - internal/hooks/circuit_breaker_test.go
        - internal/db/event_repo.go
        - cmd/htmlgraph/auto.go
      deps:
        - 3
      done_when:
        - After 3 PermissionDenied events for the same session_id with no successful tool_call between them, the 4th PreToolUse returns `{"decision":"block","reason":"Circuit breaker ..."}`.
        - 'A successful tool_call resets the counter (verified by integration test: deny, deny, allow, deny, deny → not blocked).'
        - The threshold is a named constant (e.g. `circuitBreakerThreshold = 3`) for easy tuning.
        - Counter query is a SQL aggregate against `agent_events`, not in-memory state.
        - Manual reset path documented (e.g. `htmlgraph session reset-circuit-breaker <session-id>` or equivalent).
        - All quality gates pass.
      effort: M
      risk: Med
      tests: |
        Unit (internal/hooks/circuit_breaker_test.go):
          - TestCircuitBreaker_BelowThreshold — 2 denials → no block
          - TestCircuitBreaker_AtThreshold — 3 denials → block on 4th call
          - TestCircuitBreaker_ResetByAllow — deny,deny,allow,deny,deny → no block
          - TestCircuitBreaker_PerSession — denials in session A do not affect session B
          - TestCircuitBreaker_TimeWindow — denials older than K minutes do not count
        Unit (internal/db/event_repo_test.go):
          - TestCountConsecutiveDenials_Query — SQL helper returns expected counts
        Integration: end-to-end via fixture-driven PreToolUse calls with seeded agent_events.
        Regression: PreToolUse latency does not regress measurably (add a benchmark if not present).
      approved: false
      comment: ""
    - id: slice-5
      feature_id: feat-85ef5a6b
      num: 5
      title: Mode matrix docs — yolo vs auto vs default
      what: |
        Document the full permission-mode surface. Choices: extend `docs/blog/posts/yolo-mode.md` with an "Auto mode" section, OR create a dedicated `docs/permission-modes.md` (decided via Q5 below). Cover: (1) Anthropic flags — `default`, `plan`, `acceptEdits`, `auto`, `bypassPermissions` — what each enables/blocks; (2) HtmlGraph wrappers — `htmlgraph claude` (default), `htmlgraph yolo` (--permission-mode bypassPermissions + yolo guards), `htmlgraph auto` (--permission-mode auto + yolo guards); (3) which guards apply in each mode (matrix table); (4) when to use which (decision tree); (5) PermissionDenied telemetry surface (where to find it). Update `AGENTS.md` and `CLAUDE.md` if the mode matrix changes user-facing guidance. Cross-link from blog post.
      why: |
        Goal 5 (user-facing matrix). Without docs, users will misuse modes — running yolo when auto is safer, or vice versa. The matrix becomes especially important once `htmlgraph auto` ships, because users now have a meaningful choice between two autonomous modes. Docs blocked by slice 1 so the table reflects the actually-shipping command surface.
      files:
        - docs/blog/posts/yolo-mode.md
        - docs/permission-modes.md
        - AGENTS.md
        - CLAUDE.md
      deps:
        - 1
      done_when:
        - Matrix table lists all 5 Anthropic permission modes × all HtmlGraph guards × resulting behavior.
        - 'Decision tree answers: ''I want to run autonomously and I''m on Max+'' → htmlgraph auto; ''I want to run autonomously without Max+'' → htmlgraph yolo; etc.'
        - PermissionDenied telemetry section explains how to query/view denials.
        - Cross-links from `docs/blog/posts/yolo-mode.md` and (if created) `docs/permission-modes.md`.
        - Markdown lint passes (if there's a docs lint step).
      effort: S
      risk: Low
      tests: |
        Manual: read-through with a fresh user perspective; verify matrix accuracy by cross-referencing slice 1 implementation.
        Optional automated: a docs-link checker if one is part of CI; otherwise rely on human review at finalize.
      approved: false
      comment: ""
questions:
    - id: q-strict-mode-rename
      text: Should `isYoloFromEvent` be renamed to `isStrictModeFromEvent` (or similar) when extended to recognize `auto`?
      description: |
        Today the function name implies a specific mode (yolo). Extending it to also return true for auto mode arguably misleads readers — yolo is colloquial and tied to bypassPermissions. Renaming clarifies intent but ripples through ~6 callers and a dozen `IsYoloMode` field references. The alternative is to keep the name and add a comment that "yolo" is internal shorthand for "any strict autonomous mode." We could also defer the rename until a third strict mode appears.
      recommended: extend-only
      options:
        - key: extend-only
          label: 'A: Extend only — keep `isYoloFromEvent` name; add a doc comment explaining it returns true for any strict autonomous mode (yolo OR auto). Lowest blast radius, defer rename until justified by a 3rd mode.'
        - key: rename-now
          label: 'B: Rename now — rename to `isStrictModeFromEvent` and `IsStrictMode` across all call sites. Cleanest semantics; adds ~50-100 lines of mechanical churn to slice 1.'
        - key: dual-helpers
          label: 'C: Dual helpers — keep `isYoloFromEvent` for backwards compat, add `isStrictModeFromEvent` that wraps it + auto check. Avoids churn but bifurcates the concept.'
      answer: null
    - id: q-bash-guard-default-mode
      text: Should the new destructive bash guard hard-block in default mode, or only in strict (yolo/auto) modes?
      description: |
        Patterns like `curl|bash` are dangerous regardless of mode, but a hard-block in default mode would be a behavior change for existing users running `htmlgraph claude` (no flag). Strict-mode-only is conservative but means non-Max+ users get no deterministic protection unless they opt into yolo. Hard-block-everywhere matches automode's behavior for Max+ users and gives consistent UX. A middle path is to log + show a one-line warning in default mode, hard-block in strict.
      recommended: warn-default-block-strict
      options:
        - key: warn-default-block-strict
          label: 'A: Warn in default, block in strict — non-disruptive for existing default-mode users; deterministic protection in yolo/auto. Matches the layered-defense philosophy.'
        - key: block-everywhere
          label: 'B: Block everywhere — strongest protection; opinionated default; potential breaking change for users with legitimate curl|bash workflows.'
        - key: block-strict-only
          label: 'C: Block in strict only, no warn in default — minimal change; users in default mode see no signal. Weakest option.'
      answer: null
    - id: q-circuit-breaker-reset
      text: How should the consecutive-deny circuit breaker be reset?
      description: |
        Once tripped, the circuit breaker blocks all PreToolUse calls in the session. Options: automatic reset after K minutes of session inactivity, manual reset via a CLI command, or reset on next user prompt (UserPromptSubmit hook). Each has UX tradeoffs: automatic may unblock prematurely if the agent is genuinely stuck; manual requires user action; UserPromptSubmit is natural but means a confused user retrying the same prompt could bypass the safety mechanism.
      recommended: user-prompt
      options:
        - key: user-prompt
          label: 'A: Reset on next UserPromptSubmit — natural UX (user has clearly intervened); requires UserPromptSubmit hook to also count denials reset. Risk: a user spamming the same prompt won''t be re-blocked until 3 more denials.'
        - key: manual-cli
          label: 'B: Manual CLI reset — explicit `htmlgraph session reset-circuit-breaker`. Safest but adds friction; users may not know the command exists.'
        - key: time-window
          label: 'C: Time-window reset — counter only counts denials in last K (e.g. 5) minutes. Self-healing but agents can spin around the window edge.'
        - key: hybrid
          label: 'D: Hybrid — UserPromptSubmit reset + 5-minute time window. Best UX but highest implementation cost.'
      answer: null
    - id: q-permission-denied-storage
      text: Add `permission_denied` to the agent_events CHECK enum, or store denials in a separate table?
      description: |
        The agent_events table has a CHECK enum on event_type. SQLite doesn't support modifying CHECK constraints in-place — adding a new value requires a table-rebuild migration (create new table, copy rows, drop old, rename). Alternative: a dedicated `permission_denials` table with its own schema, joined to agent_events by session_id when needed. Single-table is simpler to query (one source of truth for denial counts in slice 4) but requires migration. Two-table is migration-free but creates a parallel data model.
      recommended: extend-enum
      options:
        - key: extend-enum
          label: 'A: Extend the CHECK enum — single source of truth, simpler queries, but requires SQLite ALTER TABLE rebuild migration. Slice 4 just queries agent_events directly.'
        - key: separate-table
          label: 'B: Separate `permission_denials` table — no migration to existing schema, but slice 4 must JOIN or UNION two tables to count denials. Bifurcates event data.'
        - key: relax-check
          label: 'C: Drop the CHECK constraint entirely — most flexible but loses validation; new event_type strings can be inserted accidentally.'
      answer: null
    - id: q-docs-location
      text: Where should the mode matrix documentation live?
      description: |
        The yolo blog post (`docs/blog/posts/yolo-mode.md`) already has a good yolo-vs-auto comparison. Options: extend that post with an "auto mode" section (keeps comparison together, blog format gets dated), create a dedicated reference doc `docs/permission-modes.md` (canonical, durable, but requires cross-linking), or both (canonical doc + blog post link). Per CLAUDE.md, docs that influence user-facing behavior live close to source.
      recommended: dedicated-plus-blog-link
      options:
        - key: dedicated-plus-blog-link
          label: 'A: Dedicated `docs/permission-modes.md` reference + update blog post to link it. Canonical doc lives long; blog stays as the launch announcement.'
        - key: extend-blog
          label: 'B: Just extend `yolo-mode.md` with auto section. Lowest effort; keeps narrative together; doc decays as the blog post ages.'
        - key: agents-md-only
          label: 'C: Document in `AGENTS.md` and `CLAUDE.md` only. Closest to agent eyes but invisible to human users browsing the site.'
      answer: null
