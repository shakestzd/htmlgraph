      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#92400e;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003EStatus\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#92400e\"\u003EFinalized\u003C/div\u003E\u003C/div\u003E\u003Cdiv style=\"background:#f0f4ff;border:2px solid #93c5fd;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#1e3a5f;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003ESlices\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#1e3a5f\"\u003E6\u003C/div\u003E\u003C/div\u003E\u003Cdiv style=\"background:#f0f4ff;border:2px solid #93c5fd;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#1e3a5f;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003ECreated\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#1e3a5f\"\u003E2026-04-05\u003C/div\u003E\u003C/div\u003E\u003C/div\u003E\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;ID:\u0026lt;/strong\u0026gt; \u0026lt;code\u0026gt;plan-102b4e0e\u0026lt;/code\u0026gt; | \u0026lt;strong\u0026gt;SOURCE:\u0026lt;/strong\u0026gt; \u0026lt;code\u0026gt;/Users/shakes/DevProjects/htmlgraph/.htmlgraph/plans/plan-102b4e0e.yaml\u0026lt;/code\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cmarimo-ui-element object-id='lEQa-0' random-id='b9b006a5-9c09-4074-072b-650e5daef2a4'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;meta:\u0026#92;n  id: plan-102b4e0e\u0026#92;n  title: \u0026#x27;Planbook: standalone open-source CRISPI planning tool\u0026#x27;\u0026#92;n  description: Package the CRISPI plan notebook system as a standalone open-source\u0026#92;n    tool that any development team can use \u2014 YAML plans, marimo review, SQLite feedback,\u0026#92;n    AI critique, static HTML export.\u0026#92;n  created_at: \u0026#x27;2026-04-05\u0026#x27;\u0026#92;n  status: finalized\u0026#92;ndesign:\u0026#92;n  problem: Development teams using AI agents (Claude Code, Cursor, Copilot) jump straight\u0026#92;n    from idea to code. There is no structured plan review step where humans approve\u0026#92;n    scope, answer design questions, and see AI critique before a single line is written.\u0026#92;n    Existing tools (spec-kit, Kiro, adr-tools) are either markdown-only, IDE-locked,\u0026#92;n    or lack feedback persistence.\u0026#92;n  goals:\u0026#92;n  - Ship as pip-installable Python package with CLI entry points and optional extras\u0026#92;n  constraints:\u0026#92;n  - LiteLLM for provider flexibility \u2014 no vendor lock-in to specific LLM provider\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;nslices:\u0026#92;n- id: feat-fa5345ba\u0026#92;n  num: 1\u0026#92;n  title: YAML Schema \u0026amp; Validation Library\u0026#92;n  what: Pydantic models for CRISPI plan YAML (Plan, Slice, Question, Critique sections).\u0026#92;n    Click CLI with init/validate commands. planbook init creates starter plan.yaml\u0026#92;n    from template. Foundation for everything \u2014 all other slices consume the validated\u0026#92;n    Plan model. JSON Schema export for editor autocomplete.\u0026#92;n  why: Foundation for everything \u2014 all other slices consume the validated Plan model.\u0026#92;n    No review, export, or critique without a schema.\u0026#92;n  files:\u0026#92;n  - src/planbook/schema.py\u0026#92;n  - src/planbook/cli.py\u0026#92;n  - src/planbook/__init__.py\u0026#92;n  - templates/plan.yaml\u0026#92;n  deps: []\u0026#92;n  done_when:\u0026#92;n  - planbook init creates valid YAML. planbook validate catches missing fields\u0026#92;n  - bad types\u0026#92;n  - unknown keys. Pydantic model exports JSON Schema for editor autocomplete. ruamel.yaml\u0026#92;n    used for clear parse error positions.\u0026#92;n  effort: M\u0026#92;n  risk: Low\u0026#92;n  tests: \u0026#x27;Unit: Plan model validates valid YAML, rejects missing title, rejects unknown\u0026#92;n    fields. Unit: planbook init creates valid YAML that passes validate. Unit: JSON\u0026#92;n    Schema export matches Pydantic model. Integration: CLI init + validate roundtrip.\u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-13dfa8d0\u0026#92;n  num: 2\u0026#92;n  title: Marimo Review Notebook Template\u0026#92;n  what: Interactive plan review app launched via planbook review. Loads YAML plan,\u0026#92;n    renders sections (design, slices, questions, critique), approval checkboxes, radio\u0026#92;n    buttons. Persists feedback to SQLite on every interaction. Progress bar tracks\u0026#92;n    completion. Finalize button updates YAML status. Extracted from existing prototypes\u0026#92;n    (plan_notebook.py, plan_ui.py, dagre_widget.py).\u0026#92;n  why: This IS the product differentiator \u2014 reactive notebook review with persistent\u0026#92;n    feedback. No other tool offers interactive plan review in a local notebook. Novel\u0026#92;n    delivery mechanism for structured human review of development plans.\u0026#92;n  files:\u0026#92;n  - src/planbook/review/app.py\u0026#92;n  - src/planbook/review/ui.py\u0026#92;n  - src/planbook/review/critique_view.py\u0026#92;n  - src/planbook/review/graph.py\u0026#92;n  deps:\u0026#92;n  - 1\u0026#92;n  - 3\u0026#92;n  done_when:\u0026#92;n  - planbook review opens marimo app. All YAML sections render correctly. Checkboxes\u0026#92;n    persist across sessions via SQLite. Progress bar tracks approval percentage. Finalize\u0026#92;n    button updates YAML status to finalized.\u0026#92;n  effort: L\u0026#92;n  risk: High\u0026#92;n  tests: \u0026#x27;Unit: YAML plan renders all sections (design, slices, questions). Unit:\u0026#92;n    approval checkboxes call persist_feedback(). Unit: progress bar calculates correct\u0026#92;n    percentage. Integration: full review session \u2014 load plan, approve sections, finalize,\u0026#92;n    verify YAML status updated.\u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-99538f2f\u0026#92;n  num: 3\u0026#92;n  title: SQLite Feedback Persistence Layer\u0026#92;n  what: \u0026#x27;Feedback persistence layer: create/read/update feedback records keyed by\u0026#92;n    (plan_id, section, action). IsPlanFullyApproved() query. One .planbook.db per\u0026#92;n    project. Auto-created on first write. WAL mode enabled for concurrent marimo+CLI\u0026#92;n    access.\u0026#x27;\u0026#92;n  why: The review notebook and export both depend on persisted feedback state. Without\u0026#92;n    this, checkbox/radio state is lost between sessions. Queryable approval state\u0026#92;n    is something git alone cannot provide.\u0026#92;n  files:\u0026#92;n  - src/planbook/store.py\u0026#92;n  deps: []\u0026#92;n  done_when:\u0026#92;n  - store.persist_feedback() upserts correctly. store.get_feedback() returns structured\u0026#92;n    dict matching the plan feedback schema. store.is_fully_approved() checks all sections.\u0026#92;n    DB auto-created on first write with WAL mode.\u0026#92;n  effort: S\u0026#92;n  risk: Low\u0026#92;n  tests: \u0026#x27;Unit: persist_feedback() upserts correctly (insert then update same key).\u0026#92;n    Unit: get_feedback() returns structured dict. Unit: is_fully_approved() returns\u0026#92;n    false when any section missing. Integration: DB auto-created on first write, survives\u0026#92;n    process restart.\u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-168edce7\u0026#92;n  num: 4\u0026#92;n  title: CLI Tool (planbook init/validate/review/export)\u0026#92;n  what: \u0026#x27;Click-based CLI entry point unifying all planbook commands: init (scaffold\u0026#92;n    starter YAML), validate (Pydantic check), review (launch marimo), export (generate\u0026#92;n    HTML), critique (run AI analysis). Consistent --format flag for JSON/YAML/text\u0026#92;n    output. Error messages include fix suggestions.\u0026#x27;\u0026#92;n  why: CLI is the primary interface for solo developers. planbook must be invocable\u0026#92;n    from terminal, CI pipelines, and AI agent frameworks. Click provides subcommand\u0026#92;n    routing, help generation, and shell completion.\u0026#92;n  files:\u0026#92;n  - src/planbook/cli.py\u0026#92;n  - src/planbook/__init__.py\u0026#92;n  deps:\u0026#92;n  - 1\u0026#92;n  - 2\u0026#92;n  - 3\u0026#92;n  done_when:\u0026#92;n  - planbook --help shows all subcommands. planbook init creates valid YAML in CWD.\u0026#92;n    planbook validate reports errors with line numbers. planbook review launches marimo.\u0026#92;n    planbook export generates HTML. All commands return proper exit codes.\u0026#92;n  effort: M\u0026#92;n  risk: Low\u0026#92;n  tests: \u0026#x27;Unit: each subcommand parses args correctly. Unit: init creates valid YAML.\u0026#92;n    Unit: validate catches schema errors. Integration: full CLI workflow \u2014 init, validate,\u0026#92;n    review, export. Integration: JSON output mode for CI consumption.\u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-88914f1b\u0026#92;n  num: 5\u0026#92;n  title: AI Critique Engine\u0026#92;n  what: \u0026#x27;Dual-agent critique: two LLMs independently review the plan, then a synthesis\u0026#92;n    step merges findings. Uses LiteLLM for provider flexibility (OpenAI, Anthropic,\u0026#92;n    local models). planbook critique runs analysis, writes results to YAML critique\u0026#92;n    section. Assumption verification, risk table, and synthesis. Complexity-gated:\u0026#92;n    skip for plans with fewer than 3 slices.\u0026#x27;\u0026#92;n  why: Pre-implementation AI critique is the biggest competitive differentiator \u2014\u0026#92;n    no other tool does this. Both critics flagged that shipping without this risks\u0026#92;n    launch silence. Single-model critique in v0.1, dual-agent synthesis in v0.2.\u0026#92;n  files:\u0026#92;n  - src/planbook/critique.py\u0026#92;n  deps:\u0026#92;n  - 1\u0026#92;n  - 3\u0026#92;n  done_when:\u0026#92;n  - planbook critique calls configured model(s)\u0026#92;n  - produces assumption verification + risk table + synthesis. Results written to\u0026#92;n    plan YAML critique section. Complexity gating skips for \u0026lt;3 slices. Works with\u0026#92;n    any LiteLLM-supported provider.\u0026#92;n  effort: L\u0026#92;n  risk: High\u0026#92;n  tests: \u0026#x27;Unit: critique engine calls model (mock LiteLLM). Unit: synthesis merges\u0026#92;n    findings from two models. Unit: complexity gate skips for \u0026lt;3 slices. Unit: results\u0026#92;n    conform to critique YAML schema. Integration: critique results appear in review\u0026#92;n    notebook.\u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-3874f73d\u0026#92;n  num: 6\u0026#92;n  title: PyPI Packaging \u0026amp; CI\u0026#92;n  what: \u0026#x27;pyproject.toml with Hatch build backend and optional extras: [review] adds\u0026#92;n    marimo, [critique] adds LiteLLM. GitHub Actions for test + lint + publish to PyPI.\u0026#92;n    README with 5-minute quickstart. MIT license. JSON Schema published to SchemaStore\u0026#92;n    for editor autocomplete without installing planbook.\u0026#x27;\u0026#92;n  why: An open-source tool that is not pip-installable is not a tool. CI ensures quality\u0026#92;n    on every PR. SchemaStore publication is the highest-leverage distribution move\u0026#92;n    \u2014 free editor autocomplete for anyone.\u0026#92;n  files:\u0026#92;n  - pyproject.toml\u0026#92;n  - .github/workflows/ci.yml\u0026#92;n  - .github/workflows/release.yml\u0026#92;n  - README.md\u0026#92;n  - LICENSE\u0026#92;n  deps:\u0026#92;n  - 1\u0026#92;n  done_when:\u0026#92;n  - pip install planbook works from PyPI. pip install planbook[review] adds marimo.\u0026#92;n    pip install planbook[critique] adds LiteLLM. GitHub Actions run tests on push.\u0026#92;n    README has working quickstart. JSON Schema submitted to SchemaStore.\u0026#92;n  effort: S\u0026#92;n  risk: Low\u0026#92;n  tests: \u0026#x27;Unit: pyproject.toml valid (hatch build succeeds). Integration: pip install\u0026#92;n    planbook installs CLI entry point. Integration: pip install planbook[review] includes\u0026#92;n    marimo. Integration: pip install planbook[critique] includes litellm. CI: GitHub\u0026#92;n    Actions pass on clean checkout.\u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;nquestions:\u0026#92;n- id: q-should-planbook-be-a-python-package-cli\u0026#92;n  text: Should planbook be a Python package, CLI tool, or both?\u0026#92;n  description: Both gives maximum flexibility \u2014 solo devs use CLI, agent frameworks\u0026#92;n    import the library. cli-only is simpler but limits programmatic use. library-only\u0026#92;n    has no discoverability for new users.\u0026#92;n  recommended: both\u0026#92;n  options:\u0026#92;n  - key: both\u0026#92;n    label: \u0026#x27;A: Python package with CLI entry points (pip install planbook and import\u0026#92;n      planbook)\u0026#x27;\u0026#92;n  - key: cli-only\u0026#92;n    label: \u0026#x27;B: CLI-only via pipx (no library API)\u0026#x27;\u0026#92;n  - key: library-only\u0026#92;n    label: \u0026#x27;C: Library-only (no CLI \u2014 users call planbook.validate() etc)\u0026#x27;\u0026#92;n  answer: both\u0026#92;n- id: q-should-marimo-be-a-required-or-optional\u0026#92;n  text: Should marimo be a required or optional dependency?\u0026#92;n  description: Optional keeps the core package lightweight \u2014 validate, critique, and\u0026#92;n    export all work without marimo. Required simplifies install but forces marimo\u0026#92;n    on users who only want CLI. Peer dependency is confusing for new users.\u0026#92;n  recommended: optional\u0026#92;n  options:\u0026#92;n  - key: optional\u0026#92;n    label: \u0026#x27;A: Optional extra via pip install planbook[review] \u2014 core works without\u0026#92;n      it\u0026#x27;\u0026#92;n  - key: required\u0026#92;n    label: \u0026#x27;B: Required \u2014 marimo is the core review runtime\u0026#x27;\u0026#92;n  - key: peer\u0026#92;n    label: \u0026#x27;C: Peer dependency \u2014 user installs marimo separately\u0026#x27;\u0026#92;n  answer: optional\u0026#92;n- id: q-how-should-the-yaml-schema-be-validated\u0026#92;n  text: How should the YAML schema be validated?\u0026#92;n  description: Pydantic gives the best developer experience (autocomplete, error messages,\u0026#92;n    Python types). JSON Schema is more portable but less ergonomic. Flexible risks\u0026#92;n    silent errors. Use ruamel.yaml over PyYAML for better parse error positions.\u0026#92;n  recommended: pydantic\u0026#92;n  options:\u0026#92;n  - key: pydantic\u0026#92;n    label: \u0026#x27;A: Strict Pydantic models \u2014 reject unknown fields with clear errors\u0026#x27;\u0026#92;n  - key: flexible\u0026#92;n    label: \u0026#x27;B: Accept unknown fields with warnings \u2014 extensible but less safe\u0026#x27;\u0026#92;n  - key: json-schema\u0026#92;n    label: \u0026#x27;C: External JSON Schema file \u2014 standard tooling but no Python type safety\u0026#x27;\u0026#92;n  answer: pydantic\u0026#92;n- id: q-who-is-the-primary-target-user-for-mvp\u0026#92;n  text: Who is the primary target user for MVP?\u0026#92;n  description: Solo devs are the easiest first market \u2014 no auth/multi-user needed.\u0026#92;n    spec-kit 85k stars proves demand for plan-before-code. Teams need collaboration\u0026#92;n    features. Agent frameworks need stable API. Start narrow, expand later.\u0026#92;n  recommended: solo-devs\u0026#92;n  options:\u0026#92;n  - key: solo-devs\u0026#92;n    label: \u0026#x27;A: Solo developers using AI coding agents (simplest UX)\u0026#x27;\u0026#92;n  - key: teams\u0026#92;n    label: \u0026#x27;B: Small teams (2-5 devs) doing async plan review\u0026#x27;\u0026#92;n  - key: agent-frameworks\u0026#92;n    label: \u0026#x27;C: AI agent framework builders (machine-readable plans)\u0026#x27;\u0026#92;n  answer: solo-devs\u0026#92;n- id: q-should-ai-critique-ship-in-v0-1-or-be-de\u0026#92;n  text: Should AI critique ship in v0.1 or be deferred to v0.2?\u0026#92;n  description: \u0026#x27;Both critics flagged this as the highest-risk MVP decision. AI critique\u0026#92;n    is the biggest differentiator but also the most complex. Counter-proposal from\u0026#92;n    market critique: ship single-model critique in v0.1 (not dual-agent), dual-agent\u0026#92;n    synthesis in v0.2. Without critique, v0.1 is achievable with existing tools in\u0026#92;n    30 minutes.\u0026#x27;\u0026#92;n  recommended: single-model-v01\u0026#92;n  options:\u0026#92;n  - key: single-model-v01\u0026#92;n    label: \u0026#x27;A: Single-model critique in v0.1 \u2014 dual-agent in v0.2 (critic recommendation)\u0026#x27;\u0026#92;n  - key: defer-v02\u0026#92;n    label: \u0026#x27;B: Defer all AI critique to v0.2 \u2014 ship review loop first (original plan)\u0026#x27;\u0026#92;n  - key: full-v01\u0026#92;n    label: \u0026#x27;C: Full dual-agent critique in v0.1 (ambitious but risky)\u0026#x27;\u0026#92;n  answer: single-model-v01\u0026#92;ncritique:\u0026#92;n  reviewed_at: \u0026#x27;2026-04-05\u0026#x27;\u0026#92;n  reviewers:\u0026#92;n  - design-critic\u0026#92;n  - market-critic\u0026#92;n  assumptions:\u0026#92;n  - id: pydantic-validation\u0026#92;n    status: verified\u0026#92;n    text: Pydantic is the right validation choice\u0026#92;n    evidence: De facto standard, JSON Schema export, no credible alternative.\u0026#92;n  - id: marimo-review-ui\u0026#92;n    status: questionable\u0026#92;n    text: Marimo is viable as plan review UI\u0026#92;n    evidence: Prototype works but CDN dep breaks offline, no production precedent,\u0026#92;n      hardcoded finalize path.\u0026#92;n  - id: litellm-reliable\u0026#92;n    status: plausible\u0026#92;n    text: LiteLLM provides reliable multi-provider critique\u0026#92;n    evidence: 15k+ stars but 3 breaking changes in 12 months. Pin and wrap.\u0026#92;n  - id: solo-devs-first\u0026#92;n    status: plausible\u0026#92;n    text: Solo developers are the right first audience\u0026#92;n    evidence: spec-kit 85k stars proves demand. Agent-framework audience has different\u0026#92;n      needs.\u0026#92;n  - id: sqlite-sufficient\u0026#92;n    status: verified\u0026#92;n    text: SQLite is sufficient for feedback persistence\u0026#92;n    evidence: Single-user local-first. WAL mode. Prototype works.\u0026#92;n  - id: offline-export\u0026#92;n    status: questionable\u0026#92;n    text: Static HTML export works offline\u0026#92;n    evidence: dagre_widget loads d3 from CDN. Must verify with offline test.\u0026#92;n  - id: uvx-distribution\u0026#92;n    status: plausible\u0026#92;n    text: uv/uvx eliminates packaging friction\u0026#92;n    evidence: Fast, isolated. marimo in uvx untested. SchemaStore is higher leverage.\u0026#92;n  critics: []\u0026#92;n  risks:\u0026#92;n  - risk: CDN dependency breaks offline\u0026#92;n    severity: High\u0026#92;n    mitigation: Bundle d3 inline or replace with SVG renderer.\u0026#92;n  - risk: Finalize path breaks when packaged\u0026#92;n    severity: High\u0026#92;n    mitigation: Use importlib.resources.\u0026#92;n  - risk: spec-kit competitive absorption\u0026#92;n    severity: High\u0026#92;n    mitigation: Launch with AI critique in v0.1.\u0026#92;n  - risk: No launch timeline\u0026#92;n    severity: High\u0026#92;n    mitigation: 4-week ship date.\u0026#92;n  - risk: Schema lock-in\u0026#92;n    severity: Medium\u0026#92;n    mitigation: Add schema_version field.\u0026#92;n  - risk: LiteLLM breaking changes\u0026#92;n    severity: Medium\u0026#92;n    mitigation: Pin version, wrap in llm.py.\u0026#92;n  - risk: Sustainability deferred\u0026#92;n    severity: Medium\u0026#92;n    mitigation: Decide before Slice 1.\u0026#92;n  - risk: Status enum drift\u0026#92;n    severity: Low\u0026#92;n    mitigation: Update renderer dict.\u0026#92;n  synthesis: \u0026#x27;Architecturally sound with genuinely vertical slices. Four issues: CDN\u0026#92;n    breaks offline, finalize path breaks in package, sustainability must be decided\u0026#92;n    pre-Slice 1, no ship date. Reorder: 1-\u0026gt;3-\u0026gt;4-\u0026gt;6-\u0026gt;5-\u0026gt;2.\u0026#x27;\u0026#92;n\u0026quot;' data-label='null' data-language='\u0026quot;yaml\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='true' data-show-copy-button='true' data-debounce='false'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "07c6edef5b4a74a036530964ba56f80f", "console": [], "id": "Xref", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"dependency-graph\"\u003EDependency Graph\u003C/h3\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='Xref-0' random-id='ab17f633-eb0a-2c6d-ce30-024808adf95b'\u003E\u003Cmarimo-anywidget data-initial-value='{\u0026quot;model_id\u0026quot;:\u0026quot;101bfb97da274dfd9f4bec6d0357fb9d\u0026quot;}' data-label='null' data-js-url='\u0026quot;data:text/javascript;base64,CiAgICBhc3luYyBmdW5jdGlvbiByZW5kZXIoeyBtb2RlbCwgZWwgfSkgewogICAgICBjb25zdCBkMyA9IGF3YWl0IGl C/div\u003E"}, "type": "data"}]}, {"code_hash": "e9991a84aea1705155327ccca949490f", "console": [], "id": "SFPL", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"a-design-discussion\"\u003EA. Design Discussion\u003C/h2\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"problem\"\u003EProblem\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EDevelopment teams using AI agents (Claude Code, Cursor, Copilot) jump straight from idea to code. There is no structured plan review step where humans approve scope, answer design questions, and see AI critique before a single line is written. Existing tools (spec-kit, Kiro, adr-tools) are either markdown-only, IDE-locked, or lack feedback persistence.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"goals\"\u003EGoals\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003EShip as pip-installable Python package with CLI entry points and optional extras\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"constraints\"\u003EConstraints\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003ELiteLLM for provider flexibility \u2014 no vendor lock-in to specific LLM provider\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='SFPL-0' random-id='6f9d829b-7d1e-1ae2-4a42-ebc8a3ca965d'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve design\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Add Comments\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cmarimo-ui-element object-id='SFPL-1' random-id='549eb0ec-3011-6c59-7ae2-f07f6c47ac16'\u003E\u003Cmarimo-text-area data-initial-value='\u0026quot;\u0026quot;' data-label='null' data-placeholder='\u0026quot;Comments on design...\u0026quot;' data-disabled='false' data-debounce='true' data-full-width='true'\u003E\u003C/marimo-text-area\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "0ca89a5657a3e8dac86c88400543f985", "console": [], "id": "BYtC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "aab6cf64d49315031c7de9af8dda418a", "console": [], "id": "RGSE", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"b-vertical-slices\"\u003EB. Vertical Slices\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EApprove slices individually.\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 1: YAML Schema \u0026amp;amp; Validation Library\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 2: Marimo Review Notebook Template\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 3: SQLite Feedback Persistence Layer\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 4: CLI Tool (planbook init/validate/review/export)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 5: AI Critique Engine\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 6: PyPI Packaging \u0026amp;amp; CI\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='true'\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='RGSE-6' random-id='0c5ba64c-5f2f-4482-41ad-d160e35d41da'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(245,158,11,0.15);color:#f59e0b;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: M\u003C/span\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: Low\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Pydantic models for CRISPI plan YAML (Plan, Slice, Question, Critique sections). Click CLI with init/validate commands. planbook init creates starter plan.yaml from template. Foundation for everything \u2014 all other slices consume the validated Plan model. JSON Schema export for editor autocomplete.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E Foundation for everything \u2014 all other slices consume the validated Plan model. No review, export, or critique without a schema.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Esrc/planbook/schema.py\u003C/code\u003E, \u003Ccode\u003Esrc/planbook/cli.py\u003C/code\u003E, \u003Ccode\u003Esrc/planbook/__init__.py\u003C/code\u003E, \u003Ccode\u003Etemplates/plan.yaml\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eplanbook init creates valid YAML. planbook validate catches missing fields\u003C/li\u003E\n\u003Cli\u003Ebad types\u003C/li\u003E\n\u003Cli\u003Eunknown keys. Pydantic model exports JSON Schema for editor autocomplete. ruamel.yaml used for clear parse error positions.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-gdscript codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"n\"\u003EUnit\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EPlan\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Emodel\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Evalidates\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Evalid\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EYAML\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Erejects\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Emissing\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etitle\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Erejects\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eunknown\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Efields\u003C/span\u003 "\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Interactive plan review app launched via planbook review. Loads YAML plan, renders sections (design, slices, questions, critique), approval checkboxes, radio buttons. Persists feedback to SQLite on every interaction. Progress bar tracks completion. Finalize button updates YAML status. Extracted from existing prototypes (plan_notebook.py, plan_ui.py, dagre_widget.py).\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E This IS the product differentiator \u2014 reactive notebook review with persistent feedback. No other tool offers interactive plan review in a local notebook. Novel delivery mechanism for structured human review of development plans.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Esrc/planbook/review/app.py\u003C/code\u003E, \u003Ccode\u003Esrc/planbook/review/ui.py\u003C/code\u003E, \u003Ccode\u003Esrc/planbook/review/critique_view.py\u003C/code\u003E, \u003Ccode\u003Esrc/planbook/review/graph.py\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eplanbook review opens marimo app. All YAML sections render correctly. Checkboxes persist across sessions via SQLite. Progress bar tracks approval percentage. Finalize button updates YAML status to finalized.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E YAML Schema \u0026amp; Validation Library, SQLite Feedback Persistence Layer\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-gdscript codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"n\"\u003EUnit\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EYAML\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eplan\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Erenders\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eall\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Esections\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Edesign\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eslices\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Equestions\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EUnit\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eapproval\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Echeckboxes\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ecall\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epersist_feedback\u003C/span\u003E\u003Cspan class=\"p\"\u003E()\u003C/span\u003E\u003Cspan class=\"o\"\ an\u003E\u003Cspan class=\"n\"\u003EYAML\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Estatus\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eupdated\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='RGSE-8' random-id='e4509d20-df30-ea8b-0669-660bb61dd7ec'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: S\u003C/span\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: Low\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Feedback persistence layer: create/read/update feedback records keyed by (plan_id, section, action). IsPlanFullyApproved() query. One .planbook.db per project. Auto-created on first write. WAL mode enabled for concurrent marimo+CLI access.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E The review notebook and export both depend on persisted feedback state. Without this, checkbox/radio state is lost between sessions. Queryable approval state is something git alone cannot provide.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Esrc/planbook/store.py\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Estore.persist_feedback() upserts correctly. store.get_feedback() returns structured dict matching the plan feedback schema. store.is_fully_approved() checks all sections. DB auto-created on first write with WAL mode.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-scdoc codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EUnit: persist_feedback() upserts correctly (insert then update same key). Unit: get_feedback() returns structured dict. Unit: is_fully_approved() returns false when any section missing. Integration: DB auto-created on first write, survives process restart.\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='RGSE-9' random-id='00dab1f2-bd04-3b5c-cd58-e3a7fb334d28'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(245,158,11,0.15);color:#f59e0b;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: M\u003C/span\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: Low\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Click-based CLI entry point unifying all planbook commands: init (scaffold starter YAML), validate (Pydantic check), review (launch marimo), export (generate HTML), critique (run AI analysis). Consistent --format flag for JSON/YAML/text output. Error messages include fix suggestions.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E CLI is the primary interface for solo developers. planbook must be invocable from terminal, CI pipelines, and AI agent frameworks. Click provides subcommand routing, help generation, and shell completion.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Esrc/planbook/cli.py\u003C/code\u003E, \u003Ccode\u003Esrc/planbook/__init__.py\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eplanbook --help shows all subcommands. planbook init creates valid YAML in CWD. planbook validate reports errors with line numbers. planbook review launches marimo. planbook export generates HTML. All commands return proper exit codes.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E YAML Schema \u0026amp; Validation Library, Marimo Review Notebook Template, SQLite Feedback Persistence Layer\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-gdscript codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"n\"\u003EUnit\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eeach\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Esubcommand\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eparses\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eargs\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ecorrectly\u003C/span\u003E\u003Cspan \u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ereview\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eexport\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EIntegration\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EJSON\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoutput\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Emode\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Efor\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECI\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Econsumption\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='RGSE-10' random-id='b1777534-70ad-8fb9-0517-6b2192191295'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(220,38,38,0.15);color:#dc2626;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: L\u003C/span\u003E\u003Cspan style=\"background:rgba(220,38,38,0.15);color:#dc2626;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: High\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Dual-agent critique: two LLMs independently review the plan, then a synthesis step merges findings. Uses LiteLLM for provider flexibility (OpenAI, Anthropic, local models). planbook critique runs analysis, writes results to YAML critique section. Assumption verification, risk table, and synthesis. Complexity-gated: skip for plans with fewer than 3 slices.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E Pre-implementation AI critique is the biggest competitive differentiator \u2014 no other tool does this. Both critics flagged that shipping without this risks launch silence. Single-model critique in v0.1, dual-agent synthesis in v0.2.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Esrc/planbook/critique.py\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eplanbook critique calls configured model(s)\u003C/li\u003E\n\u003Cli\u003Eproduces assumption verification + risk table + synthesis. Results written to plan YAML critique section. Complexity gating skips for \u0026lt;3 slices. Works with any LiteLLM-supported provider.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E YAML Schema \u0026amp; Validation Library, SQLite Feedback Persistence Layer\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-teratermmacro codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"nv\"\u003EUnit\u003C/span\u003E:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Ecritique\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eengine\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Ecalls\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Emodel\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"ss\"\u003E(\u003C/span\u003E\u003Cspan class=\"nv\"\u003Emock\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003ELiteLLM\u003C/span\u003E\u003Cspan class=\"ss\"\u003E)\u003C/span\u003E.\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003EUnit\u003C/span\u003E:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Esynthesis\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Emerges\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Efindings\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Efrom\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Etwo\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Emodels\u003C/span\u003E.\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003EUnit\u003C/span\u003E:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Ecomplexity\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Egate\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eskips\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Efor\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026lt;\u003C/span\u003E\u003Cspan class=\"mi\"\u003E3\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eslices\u003C/span\u003E.\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003EUnit\u003C/span\u003E:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eresults\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Econform\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eto\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Ecritique\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003EYAML\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eschema\u003C/span\u003E.\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003EIntegration\u003C/span\u003E:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Ecritique\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eresults\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eappear\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Ein\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Ereview\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Enotebook\u003C/span\u003E.\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='RGSE-11' random-id='7925b93d-17f8-feff-b2a0-4b4886e77cc8'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: S\u003C/span\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: Low\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E pyproject.toml with Hatch build backend and optional extras: [review] adds marimo, [critique] adds LiteLLM. GitHub Actions for test + lint + publish to PyPI. README with 5-minute quickstart. MIT license. JSON Schema published to SchemaStore for editor autocomplete without installing planbook.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E An open-source tool that is not pip-installable is not a tool. CI ensures quality on every PR. SchemaStore publication is the highest-leverage distribution move \u2014 free editor autocomplete for anyone.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Epyproject.toml\u003C/code\u003E, \u003Ccode\u003E.github/workflows/ci.yml\u003C/code\u003E, \u003Ccode\u003E.github/workflows/release.yml\u003C/code\u003E, \u003Ccode\u003EREADME.md\u003C/code\u003E, \u003Ccode\u003ELICENSE\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Epip install planbook works from PyPI. pip install planbook[review] adds marimo. pip install planbook[critique] adds LiteLLM. GitHub Actions run tests on push. README has working quickstart. JSON Schema submitted to SchemaStore.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E YAML Schema \u0026amp; Validation Library\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-tsql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"nl\"\u003EUnit\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epyproject\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Etoml\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Evalid\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ehatch\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ebuild\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Esucceeds\u003C/span\u003E\u003Cspan class=\"p\"\u003E).\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nl\"\u003EIntegration\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epip\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Einstall\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eplanbook\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Einstalls\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECLI\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eentry\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epoint\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nl\"\u003EIntegration\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epip\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Einstall\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eplanbook\u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Ereview\u003C/span\u003E\u003Cspan class=\"o\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eincludes\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Emarimo\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nl\"\u003EIntegration\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epip\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Einstall\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eplanbook\u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecritique\u003C/span\u003E\u003Cspan class=\"o\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eincludes\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Elitellm\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nl\"\u003ECI\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EGitHub\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EActions\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epass\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eon\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eclean\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Echeckout\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "9962cc8772f3a923cadf7f921f36cd61", "console": [], "id": "Kclp", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "7e1cbf942be93b2b58c3a7d108c2da80", "console": [], "id": "emfo", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"c-open-questions\"\u003EC. Open Questions\u003C/h2\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQ1. Should planbook be a Python package, CLI tool, or both?\u003C/strong\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EBoth gives maximum flexibility \u2014 solo devs use CLI, agent frameworks import the library. cli-only is simpler but limits programmatic use. library-only has no discoverability for new users.\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='emfo-5' random-id='209bdbd8-b008-6219-9b04-a01a03fec3be'\u003E\u003Cmarimo-radio data-initial-value='\u0026quot;A: Python package with CLI entry points (pip install planbook and import planbook) \u2b50 recommended\u0026quot;' data-label='null' data-options='[\u0026quot;A: Python package with CLI entry points (pip install planbook and import planbook) \u2b50 recommended\u0026quot;,\u0026quot;B: CLI-only via pipx (no library API)\u0026quot;,\u0026quot;C: Library-only (no CLI \u2014 users call planbook.validate() etc)\u0026quot;]' data-inline='false' data-disabled='false'\u003E\u003C/marimo-radio\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQ2. Should marimo be a required or optional dependency?\u003C/strong\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EOptional keeps the core package lightweight \u2014 validate, critique, and export all work without marimo. Required simplifies install but forces marimo on users who only want CLI. Peer dependency is confusing for new users.\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='emfo-6' random-id='2e592cab-e421-cc16-88a3-cc3d53c4cce9'\u003E\u003Cmarimo-radio data-initial-value='\u0026quot;A: Optional extra via pip install planbook[review] \u2014 core works without it \u2b50 recommended\u0026quot;' data-label='null' data-options='[\u0026quot;A: Optional extra via pip install planbook[review] \u2014 core works without it \u2b50 recommended\u0026quot;,\u0026quot;B: Required \u2014 marimo is the core review runtime\u0026quot;,\u0026quot;C: Peer dependency \u2014 user installs marimo separately\u0026quot;]' data-inline='false' data-disabled='false'\u003E\u003C/marimo-radio\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQ3. How should the YAML schema be validated?\u003C/strong\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EPydantic gives the best developer experience (autocomplete, error messages, Python types). JSON Schema is more portable but less ergonomic. Flexible risks silent errors. Use ruamel.yaml over PyYAML for better parse error positions.\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='emfo-7' random-id='8b3710a6-a14d-8e5e-406c-b16a421a528c'\u003E\u003Cmarimo-radio data-initial-value='\u0026quot;A: Strict Pydantic models \u2014 reject unknown fields with clear errors \u2b50 recommended\u0026quot;' data-label='null' data-options='[\u0026quot;A: Strict Pydantic models \u2014 reject unknown fields with clear errors \u2b50 recommended\u0026quot;,\u0026quot;B: Accept unknown fields with warnings \u2014 extensible but less safe\u0026quot;,\u0026quot;C: External JSON Schema file \u2014 standard tooling but no Python type safety\u0026quot;]' data-inline='false' data-disabled='false'\u003E\u003C/marimo-radio\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQ4. Who is the primary target user for MVP?\u003C/strong\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003ESolo devs are the easiest first market \u2014 no auth/multi-user needed. spec-kit 85k stars proves demand for plan-before-code. Teams need collaboration features. Agent frameworks need stable API. Start narrow, expand later.\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='emfo-8' random-id='30694872-65d0-a551-8ce8-4f0ff73d6f19'\u003E\u003Cmarimo-radio data-initial-value='\u0026quot;A: Solo developers using AI coding agents (simplest UX) \u2b50 recommended\u0026quot;' data-label='null' data-options='[\u0026quot;A: Solo developers using AI coding agents (simplest UX) \u2b50 recommended\u0026quot;,\u0026quot;B: Small teams (2-5 devs) doing async plan review\u0026quot;,\u0026quot;C: AI agent framework builders (machine-readable plans)\u0026quot;]' data-inline='false' data-disabled='false'\u003E\u003C/marimo-radio\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EQ5. Should AI critique ship in v0.1 or be deferred to v0.2?\u003C/strong\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EBoth critics flagged this as the highest-risk MVP decision. AI critique is the biggest differentiator but also the most complex. Counter-proposal from market critique: ship single-model critique in v0.1 (not dual-agent), dual-agent synthesis in v0.2. Without critique, v0.1 is achievable with existing tools in 30 minutes.\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='emfo-9' random-id='bd7319f8-821f-a5c2-386e-298f78ec3ebf'\u003E\u003Cmarimo-radio data-initial-value='\u0026quot;A: Single-model critique in v0.1 \u2014 dual-agent in v0.2 (critic recommendation) \u2b50 recommended\u0026quot;' data-label='null' data-options='[\u0026quot;A: Single-model critique in v0.1 \u2014 dual-agent in v0.2 (critic recommendation) \u2b50 recommended\u0026quot;,\u0026quot;B: Defer all AI critique to v0.2 \u2014 ship review loop first (original plan)\u0026quot;,\u0026quot;C: Full dual-agent critique in v0.1 (ambitious but risky)\u0026quot;]' data-inline='false' data-disabled='false'\u003E\u003C/marimo-radio\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "3b211a732dc20df56ad00e69f41000f0", "console": [], "id": "Hstk", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "6ac27e1a8eaae3d98a16ee65b988b835", "console": [], "id": "nWHF", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"d-ai-critique-results\"\u003ED. AI Critique Results\u003C/h3\u003E\u003C/span\u003E\u003Cdiv style=\"border:1px solid var(--marimo-monochrome-200,#333);border-radius:8px;padding:16px\"\u003E\u003Cp style=\"color:#16a34a;font-size:.85rem;margin:0 0 16px\"\u003E\u0026#10003; Critique complete \u2014 design-critic + market-critic reviewed 2026-04-05\u003C/p\u003E\u003Ch4 style=\"text-transform:uppercase;letter-spacing:.04em;font-size:.75rem;margin:0 0 8px\"\u003EASSUMPTION VERIFICATION\u003C/h4\u003E\u003Cdiv style=\"display:flex;align-items:center;gap:8px;padding:6px 0\"\u003E\u003Cspan style=\"background:#dcfce7;color:#166534;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EVerified\u003C/span\u003E \u003Cspan\u003E\u003Cstrong\u003Epydantic-validation:\u003C/strong\u003E Pydantic is the right validation choice \u2014 \u003Ccode\u003EDe facto standard, JSON Schema export, no credible alternative.\u003C/code\u003E\u003C/span\u003E\u003C/div\u003E\n\u003Cdiv style=\"display:flex;align-items:center;gap:8px;padding:6px 0\"\u003E\u003Cspan style=\"background:#ffedd5;color:#9a3412;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EQuestionable\u003C/span\u003E \u003Cspan\u003E\u003Cstrong\u003Emarimo-review-ui:\u003C/strong\u003E Marimo is viable as plan review UI \u2014 \u003Ccode\u003EPrototype works but CDN dep breaks offline, no production precedent, hardcoded finalize path.\u003C/code\u003E\u003C/span\u003E\u003C/div\u003E\n\u003Cdiv style=\"display:flex;align-items:center;gap:8px;padding:6px 0\"\u003E\u003Cspan style=\"background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EPlausible\u003C/span\u003E \u003Cspan\u003E\u003Cstrong\u003Elitellm-reliable:\u003C/strong\u003E LiteLLM provides reliable multi-provider critique \u2014 \u003Ccode\u003E15k+ stars but 3 breaking changes in 12 months. Pin and wrap.\u003C/code\u003E\u003C/span\u003E\u003C/div\u003E\n\u003Cdiv style=\"display:flex;align-items:center;gap:8px;padding:6px 0\"\u003E\u003Cspan style=\"background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EPlausible\u003C/span\u003E \u003Cspan\u003E\u003Cstrong\u003Esolo-devs-first:\u003C/strong\u003E Solo developers are the right first audience \u2014 \u003Ccode\u003Espec-kit 85k stars proves demand. Agent-framework audience has different needs.\u003C/code\u003E\u003C/span\u003E\u003C/div\u003E\n\u003Cdiv style=\"display:flex;align-items:center;gap:8px;padding:6px 0\"\u003E\u003Cspan style=\"background:#dcfce7;color:#166534;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EVerified\u003C/span\u003E \u003Cspan\u003E\u003Cstrong\u003Esqlite-sufficient:\u003C/strong\u003E SQLite is sufficient for feedback persistence \u2014 \u003Ccode\u003ESingle-user local-first. WAL mode. Prototype works.\u003C/code\u003E\u003C/span\u003E\u003C/div\u003E\n\u003Cdiv style=\"display:flex;align-items:center;gap:8px;padding:6px 0\"\u003E\u003Cspan style=\"background:#ffedd5;color:#9a3412;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EQuestionable\u003C/span\u003E \u003Cspan\u003E\u003Cstrong\u003Eoffline-export:\u003C/strong\u003E Static HTML export works offline \u2014 \u003Ccode\u003Edagre_widget loads d3 from CDN. Must verify with offline test.\u003C/code\u003E\u003C/span\u003E\u003C/div\u003E\n\u003Cdiv style=\"display:flex;align-items:center;gap:8px;padding:6px 0\"\u003E\u003Cspan style=\"background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EPlausible\u003C/span\u003E \u003Cspan\u003E\u003Cstrong\u003Euvx-distribution:\u003C/strong\u003E uv/uvx eliminates packaging friction \u2014 \u003Ccode\u003EFast, isolated. marimo in uvx untested. SchemaStore is higher leverage.\u003C/code\u003E\u003C/span\u003E\u003C/div\u003E\n\u003Ch4 style=\"text-transform:uppercase;letter-spacing:.04em;font-size:.75rem;margin:16px 0 8px\"\u003ERISK ASSESSMENT\u003C/h4\u003E\u003Ctable style=\"width:100%;font-size:.85rem;border-collapse:collapse\"\u003E\u003Cthead\u003E\u003Ctr\u003E\u003Cth style=\"text-align:left;padding:6px 8px;border-bottom:1px solid var(--marimo-monochrome-200,#ccc)\"\u003ERisk\u003C/th\u003E\u003Cth style=\"text-align:left;padding:6px 8px;border-bottom:1px solid var(--marimo-monochrome-200,#ccc)\"\u003ESeverity\u003C/th\u003E\u003Cth style=\"text-align:left;padding:6px 8px;border-bottom:1px solid var(--marimo-monochrome-200,#ccc)\"\u003EMitigation\u003C/th\u003E\u003C/tr\u003E\u003C/thead\u003E\u003Ctbody\u003E\u003Ctr\u003E\u003Ctd\u003ECDN dependency breaks offline\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EHigh\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003EBundle d3 inline or replace with SVG renderer.\u003C/td\u003E\u003C/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003EFinalize path breaks when packaged\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EHigh\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003EUse importlib.resources.\u003C/td\u003E\u003C/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003Espec-kit competitive absorption\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EHigh\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003ELaunch with AI critique in v0.1.\u003C/td\u003E\u003C/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003ENo launch timeline\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EHigh\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003E4-week ship date.\u003C/td\u003E\u003C/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003ESchema lock-in\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EMedium\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003EAdd schema_version field.\u003C/td\u003E\u003C/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003ELiteLLM breaking changes\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EMedium\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003EPin version, wrap in llm.py.\u003C/td\u003E\u003C/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003ESustainability deferred\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003EMedium\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003EDecide before Slice 1.\u003C/td\u003E\u003C/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003EStatus enum drift\u003C/td\u003E\u003Ctd\u003E\u003Cspan style=\"background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;white-space:nowrap\"\u003ELow\u003C/span\u003E\u003C/td\u003E\u003Ctd\u003EUpdate renderer dict.\u003C/td\u003E\u003C/tr\u003E\n\u003C/tbody\u003E\u003C/table\u003E\u003Ch4 style=\"text-transform:uppercase;letter-spacing:.04em;font-size:.75rem;margin:16px 0 8px\"\u003ESYNTHESIS\u003C/h4\u003E\u003Cp style=\"font-size:.85rem\"\u003EArchitecturally sound with genuinely vertical slices. Four issues: CDN breaks offline, finalize path breaks in package, sustainability must be decided pre-Slice 1, no ship date. Reorder: 1-\u003E3-\u003E4-\u003E6-\u003E5-\u003E2.\u003C/p\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "a10f1871b34bfbb512964856de6d651c", "console": [], "id": "iLit", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"e-feedback-summary\"\u003EE. Feedback Summary\u003C/h2\u003E\u003C/span\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.75rem'\u003E\u003Cdiv style=\"background:#f0f4ff;border:2px solid #93c5fd;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#1e3a5f;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003ESlices\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#1e3a5f\"\u003E6/6\u003C/div\u003E\u003C/div\u003E\u003Cdiv style=\"background:#dcfce7;border:2px solid #86efac;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#166534;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003EDesign\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#166534\"\u003EApproved\u003C/div\u003E\u003C/div\u003E\u003Cdiv style=\"background:#dcfce7;border:2px solid #86efac;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#166534;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003EQuestions\u003C/div\u003E\u
