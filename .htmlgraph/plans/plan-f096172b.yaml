        Amendments are how review chat produces actionable changes to plan slices. Without the management UI a reviewer has no structured way to accept or reject AI suggestions before finalizing. This is the feedback-loop closure the analysis calls "level 2 chat integration" — closing the path from discussion to dispatched work.
