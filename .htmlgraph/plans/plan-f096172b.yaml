questions:
    - id: q-chat-streaming
      text: How should the chat widget stream responses?
      description: |
        The Marimo system uses `mo.ui.chat()` with a custom streaming model function, completely abstracted by the framework. The internal replacement requires explicit infrastructure: an SSE (Server-Sent Events) endpoint in Go that proxies to Claude CLI or the Anthropic API, plus JavaScript to render bubbles and append text as events arrive. The choice between SSE and WebSocket is not just an implementation detail — it determines whether plan reviewers can cancel in-progress responses, whether the server can push amendments back to clients, and whether the chat can support future features like real-time collaboration or interrupts. SSE is simpler and HTTP-native (minimal firewall issues), but WebSocket provides bidirectional control. The Marimo system currently has no cancel capability, so SSE is sufficient today, but the decision affects extensibility.
      recommended: sse
      options:
        - key: sse
          label: 'A: SSE — Server-Sent Events (unidirectional stream, simpler, HTTP-native)'
        - key: websocket
          label: 'B: WebSocket — Bidirectional socket (supports cancel/interrupt, more complex infrastructure)'
      answer: null
    - id: q-chat-scope
      text: Should the chat widget display live Claude API responses or pre-recorded history?
      description: |
        The analysis assumes the internal chat widget will proxy directly to Claude's API (or the Claude CLI) in real-time, mirroring the Marimo behavior. However, an alternative approach is to record conversations during plan development, embed the chat history in the plan YAML as a conversation transcript, and render that history read-only in the plan review UI. This would decouple plan review from live API access, enable offline review, reduce infrastructure complexity, and align with HtmlGraph's local-first philosophy. It also means chat happens only during plan creation (when the Marimo notebook runs), not during review. The tradeoff: live chat during review is more powerful (reviewers can ask clarifying questions), but pre-recorded chat is simpler to implement and integrates more naturally with the HTML-as-canonical-store architecture.
      recommended: live_api
      options:
        - key: live_api
          label: 'A: Live Claude API — Chat widget connects to Claude API in real-time during review (current Marimo model)'
        - key: recorded_history
          label: 'B: Pre-recorded history — Conversations recorded in YAML during plan creation, displayed read-only during review (local-first)'
      answer: null
    - id: q-migration-strategy
      text: Should we remove Marimo immediately or keep it as a fallback during transition?
      description: |
        The recommendation is to migrate fully to the internal Go/HTML/JS system, but the question is tactical: should plan review immediately flag over to `htmlgraph serve` (the new internal system), or should we run both Marimo and the internal system in parallel while phasing out Marimo once the internal system proves stable? Immediate removal reduces maintenance burden and forces a single code path (reducing debugging complexity), but it risks shipping a broken plan review if the internal implementation has bugs. Gradual migration allows reviewers to use Marimo as a fallback if the new system fails, and provides time to validate the chat widget UX before cutting the old system. The decision affects release planning, testing scope, and how aggressively we remove Python infrastructure from CI/CD.
      recommended: immediate
      options:
        - key: immediate
          label: 'A: Big-bang removal — Replace `htmlgraph plan review` immediately, delete Marimo notebooks once new system ships'
        - key: gradual
          label: 'B: Gradual migration — Run both systems in parallel (e.g., `--use-marimo` flag), fade Marimo out over 2-3 releases'
      answer: null
    - id: q-planbook-dependency
      text: Does removing Marimo from htmlgraph affect the standalone Planbook tool planned in trk-84bcad47?
      description: |
        HtmlGraph and Planbook are separate concerns: htmlgraph handles session observability and plan coordination, while Planbook is a dedicated tool for narrative plan review (using Marimo according to trk-84bcad47). The current analysis assumes we remove Marimo from htmlgraph only, implying Planbook continues to depend on Marimo separately. However, if Planbook also needs a plan review UI, the internal Go/HTML/JS system could be shared between both tools, avoiding duplication and allowing us to drop Marimo entirely (and uv from the CI matrix). This is a strategic decision: do we maintain two separate chat/review frontends (one in htmlgraph, one in Planbook), or consolidate on a single internal system that serves both products? The analysis doesn't yet clarify the scope of Planbook or whether it needs real-time chat.
      recommended: clarify_planbook_scope
      options:
        - key: htmlgraph_only
          label: 'A: Htmlgraph-only — Remove Marimo from htmlgraph only; Planbook depends on Marimo separately (allows independent iteration)'
        - key: unified_frontend
          label: 'B: Unified frontend — Both htmlgraph and Planbook use the same internal Go/HTML/JS system (drops Marimo entirely)'
        - key: clarify_planbook_scope
          label: 'C: Needs clarification — Planbook scope and requirements not yet defined; defer decision until trk-84bcad47 is detailed'
      answer: null
    - id: q-cdn-dependencies
      text: Should we vendor JavaScript dependencies or continue relying on CDN for D3/dagre-d3?
      description: |
        The internal plan review system uses D3.js and dagre-d3 from a CDN for the dependency graph visualization. This is lightweight (two external requests at runtime) but introduces a network dependency and offline-unfriendliness — the graph won't render if the CDN is unavailable or if the user is offline. HtmlGraph's philosophy is local-first and no external infrastructure. Vendoring the JS files (embedding them in the binary or serving them locally) ensures offline availability and faster load times. However, it increases the binary size slightly and adds a maintenance task (updating D3 versions, checking for security vulnerabilities). Since the analysis mentions CDN as a potential liability ("Offline-first: No CDN dependency for Marimo's own assets"), this is an implicit design choice that should be surfaced and decided deliberately.
      recommended: vendor
      options:
        - key: cdn
          label: 'A: CDN — Load D3 and dagre-d3 from CDN (lighter binary, requires network)'
        - key: vendor
          label: 'B: Vendor — Embed JS files in the binary or `plugin/static/`, serve locally (offline-first, larger binary)'
      answer: null
    - id: q-dashboard-embedding
      text: How should plan review be embedded in the dashboard?
      description: |
        Plan HTML is currently a standalone page with its own shell, sidebar nav, CSS tokens, and CDN dependencies. To render inside the dashboard there are two approaches: (A) fetch a shell-stripped HTML fragment from a /render endpoint and inject it into a detail panel div, reconciling CSS tokens to use the dashboard design system — this gives full control but requires CSS migration and JS re-wiring; (B) embed the plan page in an iframe within the dashboard shell, preserving the plan's own styles and JS isolation — simpler to implement but creates a nested scrolling context, complicates inter-frame communication for SSE updates, and feels less integrated. The existing transcript-detail and work-detail panels use approach A (direct HTML injection), so approach A is consistent with dashboard patterns but has higher implementation cost for plans specifically because of the richer interactivity (chat, graphs, checkboxes).
      recommended: html_fragment
      options:
        - key: html_fragment
          label: 'A: HTML fragment — New /render endpoint returns shell-stripped HTML, inject into dashboard panel (consistent with existing patterns, requires CSS reconciliation)'
        - key: iframe
          label: 'B: Iframe embed — Load plan page in an iframe within the dashboard (simpler, preserves isolation, but nested scroll and SSE complications)'
      answer: null
