          severity: High
          mitigation: Decide iframe vs fragment strategy and create CSS migration spec BEFORE S1 begins
        - risk: SSE plan events require new infrastructure (write path + query), not just wiring
          severity: High
          mitigation: Use scoped /api/plans/{id}/events endpoint instead of adding to global stream
        - risk: S5 embedding strategy affects S1-S3 template changes; deciding late causes rework
          severity: High
          mitigation: Promote embedding strategy question to a blocker — answer before any slice starts
        - risk: Claude CLI subprocess lifecycle — goroutine leaks on abandoned chat requests
          severity: Medium
          mitigation: Use exec.CommandContext with request context; test with mock subprocess in backend_test.go
        - risk: buildFeedbackResponse() silently ignores unknown action types (chat_message)
          severity: Medium
          mitigation: Extend buildFeedbackResponse() in S1 to include chat_message rows
    synthesis: |
        The plan is structurally sound but has three critical issues to resolve before approval: (1) The dashboard embedding strategy (q-dashboard-embedding) must be answered BEFORE any slice begins, because S1 and S3 modify plan_page.gohtml and S5 may require restructuring it. (2) S4's file list is incomplete — add prototypes/plan_export.py and sample_plan.yaml. (3) SSE plan events are larger than stated — use a scoped endpoint per plan instead of modifying the global stream. Additionally, S3 effort should drop from M to S given graph node coloring is 80% done.
