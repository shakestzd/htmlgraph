        - JS panel appends streamed text in real time with auto-scroll; no full-page reload required
        - Chat history survives page refresh (loaded from plan_feedback action=chat_message rows)
        - Panel hidden gracefully when Claude CLI/API unavailable (503 response)
        - GET /api/plans/{id}/feedback includes chat_message rows in response JSON
        - go build ./... && go vet ./... && go test ./... all pass
      effort: L
      risk: Med
      tests: |
        Unit: internal/planchat/backend_test.go — mock exec.Cmd, verify session ID round-trip and
        message persistence to plan_feedback table with correct action and value fields.
        Integration: api_plans_test.go — httptest.NewRecorder, POST /api/plans/test-id/chat,
        assert Content-Type: text/event-stream and at least one data: chunk in response body.
      approved: true
      comment: ""
