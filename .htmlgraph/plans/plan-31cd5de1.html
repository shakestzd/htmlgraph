      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

: null, "disabled": false, "hide_code": false}, "id": "Hstk", "name": "_"}, {"code": "", "code_hash": "4395c80d21901fbb5e1316ef6b7ee7ef", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "nWHF", "name": "_"}, {"code": "", "code_hash": "5c6f373d4338cfb99c1499e2969c4319", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "iLit", "name": "_"}, {"code": "", "code_hash": "588487f999bd27d4f051eff644356027", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "ZHCJ", "name": "_"}, {"code": "", "code_hash": "5fa091025eb870a20a4e6d0e4c586bc3", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "ROlb", "name": "_"}, {"code": "", "code_hash": "b668d686e1742064fcc8c7a50636fb2f", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "qnkX", "name": "_"}], "metadata": {"marimo_version": "0.22.4"}, "version": "1"},
            "session": {"cells": [{"code_hash": "d9600b9421241e307b88ca530837bb3f", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "affe417ced2b2523a7dbcfe6b3432a87", "console": [], "id": "MJUe", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "c58e56716d89436a755838a8c0726a4d", "console": [], "id": "vblA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "52977bddbd3ae39d820ab3412cc575ea", "console": [], "id": "bkHC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "deda531f96d94e4de283fdb9ff31cc84", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"plan-codex-interoperability-host-neutral-core-codex-adapter\"\u003EPlan: Codex Interoperability \u2014 host-neutral core + Codex adapter\u003C/h1\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"port-htmlgraph-from-claude-only-to-host-neutral-architecture-with-a-codex-adapter-skills-agents-hooks-and-mcp-server-for-codex-compatibility-verified-against-live-openai-codex-documentation-developersopenaicomcodex\"\u003EPort HtmlGraph from Claude-only to host-neutral architecture with a Codex adapter. Skills, agents, hooks, and MCP server for Codex compatibility. Verified against live OpenAI Codex documentation (developers.openai.com/codex/).\u003C/h3\u003E\u003C/span\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.75rem'\u003E\u003Cdiv style=\"background:#fef3c7;border:2px solid #f59e0b;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#92400e;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003EStatus\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#92400e\"\u003EFinalized\u003C/div\u003E\u003C/div\u003E\u003Cdiv style=\"background:#f0f4ff;border:2px solid #93c5fd;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#1e3a5f;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003ESlices\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#1e3a5f\"\u003E6\u003C/div\u003E\u003C/div\u003E\u003Cdiv style=\"background:#f0f4ff;border:2px solid #93c5fd;border-radius:10px;padding:14px 20px;min-width:120px;text-align:center\"\u003E\u003Cdiv style=\"font-size:0.75rem;font-weight:600;color:#1e3a5f;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px\"\u003ECreated\u003C/div\u003E\u003Cdiv style=\"font-size:1.5rem;font-weight:800;color:#1e3a5f\"\u003E2026-04-05\u003C/div\u003E\u003C/div\u003E\u003C/div\u003E\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;ID:\u0026lt;/strong\u0026gt; \u0026lt;code\u0026gt;plan-31cd5de1\u0026lt;/code\u0026gt; | \u0026lt;strong\u0026gt;SOURCE:\u0026lt;/strong\u0026gt; \u0026lt;code\u0026gt;/Users/shakes/DevProjects/htmlgraph/.claude/worktrees/trk-84bcad47/.htmlgraph/plans/plan-31cd5de1.yaml\u0026lt;/code\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cmarimo-ui-element object-id='bkHC-0' random-id='2a837265-eb07-37d2-5571-079ce5aedb07'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;meta:\u0026#92;n  id: plan-31cd5de1\u0026#92;n  track_id: trk-8c4a586e\u0026#92;n  title: Codex Interoperability \u2014 host-neutral core + Codex adapter\u0026#92;n  description: \u0026#x27;Port HtmlGraph from Claude-only to host-neutral architecture with\u0026#92;n    a Codex adapter. Skills, agents, hooks, and MCP server for Codex compatibility.\u0026#92;n    Verified against live OpenAI Codex documentation (developers.openai.com/codex/).\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  created_at: \u0026#x27;2026-04-05\u0026#x27;\u0026#92;n  status: finalized\u0026#92;n  created_by: claude-opus\u0026#92;ndesign:\u0026#92;n  problem: \u0026#x27;HtmlGraph\u0026#x27;\u0026#x27;s Go binary already implements the \u0026#x27;\u0026#x27;CLI as engine\u0026#x27;\u0026#x27; pattern\u0026#92;n    \u2014 internal/ packages contain all business logic shared by both CLI commands and\u0026#92;n    hooks. cmd/htmlgraph/hook.go is a thin wrapper that reads stdin, opens DB, calls\u0026#92;n    internal/hooks/, writes stdout. Hooks even call CLI commands via selfBinary()\u0026#92;n    for operations like auto-complete. The architecture is correct. The gap is narrower\u0026#92;n    than originally scoped: Codex needs thin adapter layers that normalize its event\u0026#92;n    format and response schema into the existing internal/ types. No business logic\u0026#92;n    reimplementation is needed. Codex CLI (v0.116.0, 67K GitHub stars, Rust-based)\u0026#92;n    has 5 hook events (verified), TOML agent definitions with developer_instructions\u0026#92;n    field (verified), and MCP support via config.toml (verified). Two community bridges\u0026#92;n    exist but no native HtmlGraph Codex plugin.\u0026#x27;\u0026#92;n  goals:\u0026#92;n  - Codex users can install and use HtmlGraph for work tracking, attribution, and\u0026#92;n    quality gates\u0026#92;n  - Skills that are host-neutral (agent-context, code-quality, orchestrator-directives)\u0026#92;n    work in Codex unchanged\u0026#92;n  - MCP server exposes structured tools using official Go MCP SDK (modelcontextprotocol/go-sdk)\u0026#92;n  - Hook handler normalizes Codex\u0026#x27;s 5 events into existing Go binary via adapter pattern\u0026#92;n  - Agent definitions exist in Codex TOML format using developer_instructions field\u0026#92;n  - Maintain CLI-as-engine pattern \u2014 all new host adapters call internal/ packages\u0026#92;n    directly, enabling future hosts (Gemini CLI, OpenCode) with thin adapters only\u0026#92;n  constraints:\u0026#92;n  - Codex hooks only support 5 events with PreToolUse/PostToolUse Bash-only (verified\u0026#92;n    via docs)\u0026#92;n  - Agent TOML uses developer_instructions not system_prompt, and mcp_servers/skills.config\u0026#92;n    not tools (verified)\u0026#92;n  - Standalone MCP uses config.toml not .mcp.json; .mcp.json only within plugin bundles\u0026#92;n    (verified)\u0026#92;n  - Must not break existing Claude plugin \u2014 additive changes only\u0026#92;n  - Go binary is the single hook handler for both hosts \u2014 no code duplication\u0026#92;n  - \u0026#x27;Hook blocking response format differs: Codex uses permissionDecision/permissionDecisionReason\u0026#x27;\u0026#92;n  - \u0026#x27;All host adapters must call internal/ packages directly \u2014 no business logic duplication\u0026#92;n    (verified: architecture already supports this)\u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;nslices:\u0026#92;n- id: feat-codex-fix-docs\u0026#92;n  num: 1\u0026#92;n  title: Fix stale CODEX.md references\u0026#92;n  what: \u0026#x27;Remove references to nonexistent packages/codex-skill and docs/codex_headless.md.\u0026#92;n    Fix uv run htmlgraph to plain htmlgraph (Go binary, not Python). Update quick\u0026#92;n    start workflow to reflect current CLI. Remove Prefer uv run instruction entirely.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  why: \u0026#x27;First impression for Codex users. Stale docs erode trust. Both paths verified\u0026#92;n    nonexistent in current repo.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  files:\u0026#92;n  - CODEX.md\u0026#92;n  deps: []\u0026#92;n  done_when:\u0026#92;n  - All file paths referenced in CODEX.md exist in the repo\u0026#92;n  - No uv run prefix in any htmlgraph invocation\u0026#92;n  - Quick start commands actually work when run\u0026#92;n  effort: S\u0026#92;n  risk: Low\u0026#92;n  tests: \u0026#x27;Manual: verify every path referenced in CODEX.md exists.\u0026#92;n\u0026#92;n    Manual: run each command in CODEX.md and confirm it works.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-codex-plugin-scaffold\u0026#92;n  num: 2\u0026#92;n  title: Codex plugin scaffold with hooks.json\u0026#92;n  what: \u0026#x27;Create plugins/htmlgraph-codex/ with .codex-plugin/plugin.json manifest (required\u0026#92;n    field: name as kebab-case), skills/ directory, and .codex/hooks.json routing 5\u0026#92;n    supported events to htmlgraph hook binary. The hooks.json uses regex matchers\u0026#92;n    per Codex spec. Add marketplace entry stub at .agents/plugins/marketplace.json.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  why: \u0026#x27;Codex requires this specific layout for plugin discovery. Plugins install\u0026#92;n    to ~/.codex/plugins/cache/. Without this scaffold, nothing else can be tested.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  files:\u0026#92;n  - plugins/htmlgraph-codex/.codex-plugin/plugin.json\u0026#92;n  - plugins/htmlgraph-codex/.codex/hooks.json\u0026#92;n  - .agents/plugins/marketplace.json\u0026#92;n  deps: []\u0026#92;n  done_when:\u0026#92;n  - plugin.json has required name field in kebab-case\u0026#92;n  - hooks.json routes 5 events to htmlgraph hook binary with regex matchers\u0026#92;n  - marketplace.json stub exists for local installation\u0026#92;n  effort: S\u0026#92;n  risk: Med\u0026#92;n  tests: \u0026#x27;Unit: plugin.json validates against documented Codex schema.\u0026#92;n\u0026#92;n    Unit: hooks.json has entries for all 5 supported events.\u0026#92;n\u0026#92;n    Integration: codex plugin install from local marketplace succeeds.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-codex-skills-port\u0026#92;n  num: 3\u0026#92;n  title: Port host-neutral skills to Codex plugin\u0026#92;n  what: \u0026#x27;Copy 3 genuinely host-neutral skills into the Codex plugin: agent-context,\u0026#92;n    code-quality-skill, strategic-planning. These contain CLI commands (htmlgraph\u0026#92;n    feature start) and language-agnostic quality gates \u2014 no Claude API syntax. orchestrator-directives\u0026#92;n    requires rewriting Task()/Agent() patterns to Codex equivalents \u2014 defer to a separate\u0026#92;n    slice or strip those sections.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  why: \u0026#x27;Work attribution, quality gates, and analytics are the foundation. Without\u0026#92;n    these, Codex agents have no guidance for HtmlGraph workflows.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  files:\u0026#92;n  - plugins/htmlgraph-codex/skills/agent-context/SKILL.md\u0026#92;n  - plugins/htmlgraph-codex/skills/code-quality-skill/SKILL.md\u0026#92;n  - plugins/htmlgraph-codex/skills/strategic-planning/SKILL.md\u0026#92;n  deps:\u0026#92;n  - 2\u0026#92;n  done_when:\u0026#92;n  - 3 skills load in Codex without errors\u0026#92;n  - No Claude-specific API references remain (no Task(), no Agent())\u0026#92;n  - Work attribution workflow (feature start/complete) works via CLI\u0026#92;n  effort: S\u0026#92;n  risk: Low\u0026#92;n  tests: \u0026#x27;Unit: grep for Task() and Agent() returns zero matches in Codex skill files.\u0026#92;n\u0026#92;n    Integration: Codex agent can reference skills and follow attribution workflow.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-codex-agents-toml\u0026#92;n  num: 4\u0026#92;n  title: Agent roster in Codex TOML format\u0026#92;n  what: \u0026#x27;Re-encode 5 Claude agents as Codex TOML files under plugins/htmlgraph-codex/.codex/agents/.\u0026#92;n    Use developer_instructions field (not system_prompt) for role guidance. Use mcp_servers\u0026#92;n    and skills.config for tool access (not tools list). Map model names via config.\u0026#92;n    Required TOML fields: name, description, developer_instructions. Optional: model,\u0026#92;n    model_reasoning_effort, sandbox_mode, mcp_servers, skills.config.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  why: \u0026#x27;Codex uses TOML agent definitions with different field names than Claude.\u0026#92;n    Without re-encoded agents, Codex users have no specialized subagents for research,\u0026#92;n    coding, or testing.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  files:\u0026#92;n  - plugins/htmlgraph-codex/.codex/agents/haiku-coder.toml\u0026#92;n  - plugins/htmlgraph-codex/.codex/agents/sonnet-coder.toml\u0026#92;n  - plugins/htmlgraph-codex/.codex/agents/opus-coder.toml\u0026#92;n  - plugins/htmlgraph-codex/.codex/agents/researcher.toml\u0026#92;n  - plugins/htmlgraph-codex/.codex/agents/test-runner.toml\u0026#92;n  deps:\u0026#92;n  - 3\u0026#92;n  done_when:\u0026#92;n  - 5 TOML files parse without errors with required fields (name, description, developer_instructions)\u0026#92;n  - No system_prompt or tools fields used (use developer_instructions, mcp_servers,\u0026#92;n    skills.config)\u0026#92;n  - Each agent has equivalent role guidance from Claude markdown body\u0026#92;n  effort: M\u0026#92;n  risk: Med\u0026#92;n  tests: \u0026#x27;Unit: each TOML file has name, description, developer_instructions fields.\u0026#92;n\u0026#92;n    Unit: no system_prompt or tools fields present.\u0026#92;n\u0026#92;n    Integration: codex agent list shows all 5 agents.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-codex-hook-adapter\u0026#92;n  num: 5\u0026#92;n  title: Codex hook event adapter in Go binary\u0026#92;n  what: \u0026#x27;Add internal/hooks/codex_adapter.go \u2014 a thin normalization layer. The Go\u0026#92;n    binary already implements CLI-as-engine: internal/hooks/ contains all guard logic,\u0026#92;n    event recording, and session management. The adapter only needs to: (1) Normalize\u0026#92;n    Codex JSON field names (hook_event_name, tool_input.command) into the existing\u0026#92;n    CloudEvent struct. (2) Output permissionDecision/permissionDecisionReason format\u0026#92;n    for Codex (vs decision/reason for Claude). (3) Detect host via --host=codex CLI\u0026#92;n    flag passed in hooks.json entries. All guard logic, event recording, session management\u0026#92;n    stays unchanged \u2014 zero business logic reimplementation. Add AGENTS.md prohibiting\u0026#92;n    direct .htmlgraph/ writes (since Codex PreToolUse only fires for Bash).\u0026#x27;\u0026#92;n  why: The adapter is thin because internal/hooks/ already IS the engine. The Codex\u0026#92;n    adapter just normalizes the wire format. This is the same pattern the CLI uses\u0026#92;n    \u2014 cmd/htmlgraph/hook.go is already a thin wrapper calling internal/hooks/ functions.\u0026#92;n    Adding Codex is adding another thin wrapper, not reimplementing logic.\u0026#92;n  files:\u0026#92;n  - internal/hooks/codex_adapter.go\u0026#92;n  - internal/hooks/codex_adapter_test.go\u0026#92;n  - plugins/htmlgraph-codex/AGENTS.md\u0026#92;n  deps:\u0026#92;n  - 2\u0026#92;n  done_when:\u0026#92;n  - Codex JSON payloads normalize into CloudEvent struct correctly\u0026#92;n  - Hook blocking returns permissionDecision format for Codex, decision format for\u0026#92;n    Claude\u0026#92;n  - AGENTS.md explicitly prohibits direct .htmlgraph/ file writes\u0026#92;n  - Session tracking works (htmlgraph status shows Codex session)\u0026#92;n  effort: S\u0026#92;n  risk: High\u0026#92;n  tests: \u0026#x27;Unit: Codex PreToolUse JSON normalizes to CloudEvent with correct field\u0026#92;n    values.\u0026#92;n\u0026#92;n    Unit: Codex Stop JSON normalizes correctly.\u0026#92;n\u0026#92;n    Unit: blocking response uses permissionDecision format.\u0026#92;n\u0026#92;n    Integration: Codex session triggers SessionStart and creates session record.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;n- id: feat-codex-mcp-server\u0026#92;n  num: 6\u0026#92;n  title: HtmlGraph MCP server using official Go SDK\u0026#92;n  what: \u0026#x27;Implement MCP server as htmlgraph mcp-server subcommand using the official\u0026#92;n    modelcontextprotocol/go-sdk (v1.4.1). Each MCP tool calls the same internal/ functions\u0026#92;n    that CLI commands use \u2014 internal/workitem for feature operations, internal/db\u0026#92;n    for queries, internal/htmlparse for HTML parsing. Direct Go function calls, not\u0026#92;n    subprocess overhead. Expose tools: htmlgraph_status, htmlgraph_feature_list, htmlgraph_feature_start,\u0026#92;n    htmlgraph_feature_complete, htmlgraph_snapshot, htmlgraph_find, htmlgraph_session_link_transcript.\u0026#92;n    STDIO transport. Host-neutral \u2014 works with Claude, Codex, Cursor, any MCP client.\u0026#x27;\u0026#92;n  why: \u0026#x27;MCP tools call the same internal/ packages as CLI commands \u2014 the CLI-as-engine\u0026#92;n    pattern means zero duplication. The official Go SDK handles JSON-RPC 2.0 protocol\u0026#92;n    complexity. Host-neutral by design: one implementation serves all AI coding agents.\u0026#x27;\u0026#92;n  files:\u0026#92;n  - cmd/htmlgraph/mcp_server.go\u0026#92;n  - internal/mcp/server.go\u0026#92;n  - internal/mcp/tools.go\u0026#92;n  - plugins/htmlgraph-codex/.mcp.json\u0026#92;n  - go.mod\u0026#92;n  deps:\u0026#92;n  - 2\u0026#92;n  done_when:\u0026#92;n  - htmlgraph mcp-server starts and responds to initialize request\u0026#92;n  - 7 tools registered and callable via MCP protocol\u0026#92;n  - STDIO transport works with both Codex and Claude MCP clients\u0026#92;n  - go.mod includes modelcontextprotocol/go-sdk dependency\u0026#92;n  effort: L\u0026#92;n  risk: High\u0026#92;n  tests: \u0026#x27;Unit: each tool handler returns valid MCP response.\u0026#92;n\u0026#92;n    Unit: tool parameter validation rejects bad input.\u0026#92;n\u0026#92;n    Integration: MCP client can call htmlgraph_status and get project stats.\u0026#92;n\u0026#92;n    Integration: htmlgraph_feature_start creates a work item claim.\u0026#92;n\u0026#92;n    Integration: Codex discovers server via plugin .mcp.json.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  approved: true\u0026#92;n  comment: \u0026#x27;\u0026#x27;\u0026#92;nquestions:\u0026#92;n- id: q-codex-plugin-location\u0026#92;n  text: Where should the Codex plugin live in the repo?\u0026#92;n  description: \u0026#x27;The review doc suggests plugins/htmlgraph-codex/ as a separate directory.\u0026#92;n    Alternative: .codex/ at repo root (Codex convention for repo-local config). The\u0026#92;n    tradeoff is separation from Claude plugin vs Codex convention compliance. Codex\u0026#92;n    installs plugins to ~/.codex/plugins/cache/\u0026#36;MARKETPLACE/\u0026#36;PLUGIN/\u0026#36;VERSION/.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  recommended: separate-dir\u0026#92;n  options:\u0026#92;n  - key: separate-dir\u0026#92;n    label: \u0026#x27;A: plugins/htmlgraph-codex/ \u2014 separate from Claude plugin, explicit boundary\u0026#x27;\u0026#92;n  - key: repo-root\u0026#92;n    label: \u0026#x27;B: .codex/ at repo root \u2014 Codex convention for repo-local config\u0026#x27;\u0026#92;n  - key: shared-plugin\u0026#92;n    label: \u0026#x27;C: Extend existing plugin/ with Codex-specific subdirectories\u0026#x27;\u0026#92;n  answer: separate-dir\u0026#92;n- id: q-mcp-scope\u0026#92;n  text: Should the MCP server be Codex-only or host-neutral?\u0026#92;n  description: \u0026#x27;An MCP server using the official Go SDK works with any MCP-compatible\u0026#92;n    host (Claude, Codex, Cursor). Building host-neutral means Claude could also use\u0026#92;n    structured tools instead of shell-outs. Codex-only is faster to ship but misses\u0026#92;n    the bigger win. The official Go MCP SDK (4.3K stars, v1.4.1) handles protocol\u0026#92;n    complexity.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  recommended: host-neutral\u0026#92;n  options:\u0026#92;n  - key: host-neutral\u0026#92;n    label: \u0026#x27;A: Host-neutral \u2014 works with Claude, Codex, Cursor, any MCP client\u0026#x27;\u0026#92;n  - key: codex-only\u0026#92;n    label: \u0026#x27;B: Codex-only \u2014 wire into Codex plugin only, Claude keeps shell-outs\u0026#x27;\u0026#92;n  answer: host-neutral\u0026#92;n- id: q-go-mcp-library\u0026#92;n  text: Which Go MCP library should we use?\u0026#92;n  description: \u0026#x27;Three options exist. Official SDK (modelcontextprotocol/go-sdk, 4.3K\u0026#92;n    stars, v1.4.1, Google collab) has institutional backing. Community mark3labs/mcp-go\u0026#92;n    (8.5K stars, 1880 importers) has broader adoption and battle-testing. The official\u0026#92;n    SDK README acknowledges mcp-go as inspiration and viable alternative.\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  recommended: official-sdk\u0026#92;n  options:\u0026#92;n  - key: official-sdk\u0026#92;n    label: \u0026#x27;A: Official modelcontextprotocol/go-sdk \u2014 institutional backing, Google\u0026#92;n      collab\u0026#x27;\u0026#92;n  - key: mcp-go\u0026#92;n    label: \u0026#x27;B: mark3labs/mcp-go \u2014 broader adoption (8.5K stars), more battle-tested\u0026#x27;\u0026#92;n  - key: minimal\u0026#92;n    label: \u0026#x27;C: Minimal hand-rolled JSON-RPC \u2014 no dependency, full control\u0026#x27;\u0026#92;n  answer: official-sdk\u0026#92;n- id: q-hook-event-gap\u0026#92;n  text: How should we handle the 13 Claude hook events Codex doesn\u0026#x27;t support?\u0026#92;n  description: \u0026#x27;Codex only supports 5 events. 13 Claude events (SessionEnd, SubagentStart/Stop,\u0026#92;n    PostToolUseFailure, PreCompact, etc.) have no equivalent. The .htmlgraph write\u0026#92;n    guard is the critical safety gap \u2014 PreToolUse only fires for Bash in Codex so\u0026#92;n    Write/Edit/MultiEdit to .htmlgraph/ is unguarded. hatayama/codex-hooks exists\u0026#92;n    as a community bridge but only for side effects (cannot block).\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  recommended: graceful-degrade\u0026#92;n  options:\u0026#92;n  - key: graceful-degrade\u0026#92;n    label: \u0026#x27;A: Graceful degradation \u2014 skip unsupported events, document gaps, guard\u0026#92;n      via AGENTS.md + MCP\u0026#x27;\u0026#92;n  - key: transcript-simulate\u0026#92;n    label: \u0026#x27;B: Simulate missing events from transcript_path parsing where possible\u0026#x27;\u0026#92;n  - key: community-bridge\u0026#92;n    label: \u0026#x27;C: Adopt hatayama/codex-hooks bridge as starting point, extend for blocking\u0026#x27;\u0026#92;n  answer: graceful-degrade\u0026#92;n- id: q-skill-sync\u0026#92;n  text: How should Codex plugin skills stay in sync with Claude plugin skills?\u0026#92;n  description: \u0026#x27;Copying skills creates a fork that diverges over time. Options range\u0026#92;n    from manual copy (simple but drifts) to build-time generation (automated but adds\u0026#92;n    tooling) to symlinks (no drift but fragile across platforms).\u0026#92;n\u0026#92;n    \u0026#x27;\u0026#92;n  recommended: build-step\u0026#92;n  options:\u0026#92;n  - key: build-step\u0026#92;n    label: \u0026#x27;A: Build step copies from plugin/skills/ to plugins/htmlgraph-codex/skills/\u0026#92;n      \u2014 automated, CI-checkable\u0026#x27;\u0026#92;n  - key: symlinks\u0026#92;n    label: \u0026#x27;B: Symlinks to canonical plugin/skills/ \u2014 zero drift but fragile on Windows/in\u0026#92;n      archives\u0026#x27;\u0026#92;n  - key: manual\u0026#92;n    label: \u0026#x27;C: Manual copy \u2014 simplest, accept drift risk\u0026#x27;\u0026#92;n  answer: build-step\u0026#92;n- id: q-future-hosts\u0026#92;n  text: Should the adapter layer be formalized as an internal/adapter package?\u0026#92;n  description: Currently Claude hooks are in internal/hooks/ and the Codex adapter\u0026#92;n    would be codex_adapter.go in the same package. As more hosts are added (Gemini\u0026#92;n    CLI, OpenCode, Cursor), a dedicated internal/adapter/ package with a Host interface\u0026#92;n    could formalize the pattern. The tradeoff is premature abstraction vs clean extension\u0026#92;n    point.\u0026#92;n  recommended: same-package\u0026#92;n  options:\u0026#92;n  - key: same-package\u0026#92;n    label: \u0026#x27;A: Keep adapters in internal/hooks/ \u2014 simpler, wait for third host before\u0026#92;n      abstracting\u0026#x27;\u0026#92;n  - key: adapter-package\u0026#92;n    label: \u0026#x27;B: Create internal/adapter/ with Host interface now \u2014 cleaner but may\u0026#92;n      be premature\u0026#x27;\u0026#92;n  answer: same-package\u0026#92;ncritique:\u0026#92;n  reviewed_at: \u0026#x27;2026-04-06\u0026#x27;\u0026#92;n  reviewers:\u0026#92;n  - haiku-coder (design)\u0026#92;n  - sonnet-coder (feasibility)\u0026#92;n  assumptions:\u0026#92;n  - id: cli-as-engine-verified\u0026#92;n    status: verified\u0026#92;n    text: Go binary implements CLI-as-engine \u2014 internal/ packages contain all business\u0026#92;n      logic, hook.go is thin wrapper\u0026#92;n    evidence: cmd/htmlgraph/hook.go hookSubcmd/hookSubcmdWithProject wrappers do only\u0026#92;n      DB open + projectDir resolve, then delegate to internal/hooks/ handlers.\u0026#92;n  - id: selfbinary-subprocess-gap\u0026#92;n    status: falsified\u0026#92;n    text: Hooks call internal/ packages directly for ALL operations\u0026#92;n    evidence: posttooluse.go:219 and task_tracking.go:41 use selfBinary()+exec.Command()\u0026#92;n      for work-item operations (feature complete, add-step). These shell out to the\u0026#92;n      binary, not direct function calls. Codex adapter inherits this subprocess +\u0026#92;n      PATH dependency.\u0026#92;n  - id: codex-5-events\u0026#92;n    status: unverified\u0026#92;n    text: Codex supports exactly 5 hook events\u0026#92;n    evidence: Externally sourced from docs, not verifiable from local codebase. Must\u0026#92;n      spike against live Codex CLI before slice 5.\u0026#92;n  - id: event-count-gap-undercounted\u0026#92;n    status: falsified\u0026#92;n    text: Plan claims 13 Claude events Codex doesnt support\u0026#92;n    evidence: Go binary handles 20 hook subcommands total, not 18. The real gap is\u0026#92;n      15 unsupported events, not 13. Plan undercounts by 2.\u0026#92;n  - id: cloudevent-normalizable\u0026#92;n    status: verified\u0026#92;n    text: CloudEvent struct is the single shared type; Codex adapter can normalize\u0026#92;n      into it\u0026#92;n    evidence: runner.go lines 21-61 define CloudEvent with overlapping semantics.\u0026#92;n      Translation layer is achievable.\u0026#92;n  - id: hookresult-format-differs\u0026#92;n    status: verified\u0026#92;n    text: Claude uses decision/reason; Codex needs permissionDecision/permissionDecisionReason\u0026#92;n    evidence: HookResult struct has Decision/Reason fields. Adapter needs separate\u0026#92;n      output struct or serialization switch.\u0026#92;n  - id: no-mcp-dependency\u0026#92;n    status: verified\u0026#92;n    text: No MCP SDK in go.mod currently\u0026#92;n    evidence: go.mod has only goquery, cobra, modernc.org/sqlite. MCP is a net-new\u0026#92;n      dependency introduction.\u0026#92;n  - id: agent-context-neutral\u0026#92;n    status: verified\u0026#92;n    text: agent-context skill is host-neutral\u0026#92;n    evidence: Only htmlgraph CLI commands and language-agnostic principles. No Task()/Agent()/Claude\u0026#92;n      references.\u0026#92;n  - id: code-quality-neutral\u0026#92;n    status: verified\u0026#92;n    text: code-quality-skill is host-neutral\u0026#92;n    evidence: Only shell commands (go build, npm test, etc.). No Claude SDK references.\u0026#92;n  - id: strategic-planning-partial\u0026#92;n    status: questionable\u0026#92;n    text: strategic-planning is host-neutral\u0026#92;n    evidence: Mostly CLI commands but lines 243-244 contain /htmlgraph:execute \u2014 a\u0026#92;n      Claude Code slash command. Requires minor cleanup.\u0026#92;n  - id: codex-md-stale\u0026#92;n    status: verified\u0026#92;n    text: CODEX.md references nonexistent paths and uses wrong binary prefix\u0026#92;n    evidence: packages/codex-skill and docs/codex_headless.md absent. uv run htmlgraph\u0026#92;n      is wrong \u2014 its a Go binary.\u0026#92;n  critics:\u0026#92;n  - title: Design Review (haiku-coder)\u0026#92;n    sections:\u0026#92;n    - heading: Architecture\u0026#92;n      items:\u0026#92;n      - badge: Sound\u0026#92;n        kind: success\u0026#92;n        text: CLI-as-engine pattern correctly understood. internal/ is single source\u0026#92;n          of truth. Adapter layers follow thin-wrapper approach.\u0026#92;n      - badge: Sound\u0026#92;n        kind: success\u0026#92;n        text: \u0026#x27;Dependency sequencing correct: docs fix (1) \u2192 scaffold (2) \u2192 skills\u0026#92;n          (3) \u2192 agents (4) \u2192 adapter (5) / MCP (6).\u0026#x27;\u0026#92;n      - badge: Concern\u0026#92;n        kind: warn\u0026#92;n        text: Slice 5 rated High risk but S effort \u2014 confirm zero business logic reimplementation\u0026#92;n          before committing.\u0026#92;n      - badge: Concern\u0026#92;n        kind: warn\u0026#92;n        text: Slice 6 effort L may be optimistic. STDIO transport integration with\u0026#92;n          both Codex and Claude clients requires testing.\u0026#92;n    - heading: Gaps\u0026#92;n      items:\u0026#92;n      - badge: Critical\u0026#92;n        kind: danger\u0026#92;n        text: Skill sync drift \u2014 no build-step or CI check proposed. Slice 3 copies\u0026#92;n          once but no enforcement mechanism for ongoing sync.\u0026#92;n      - badge: Critical\u0026#92;n        kind: danger\u0026#92;n        text: Codex PreToolUse Bash-only gap means .htmlgraph/ writes from non-Bash\u0026#92;n          tools are unguarded. AGENTS.md is advisory only.\u0026#92;n      - badge: Missing\u0026#92;n        kind: warn\u0026#92;n        text: strategic-planning has /htmlgraph:execute slash command references \u2014\u0026#92;n          not fully portable. Needs cleanup before Codex port.\u0026#92;n      - badge: Missing\u0026#92;n        kind: warn\u0026#92;n        text: Test coverage requires live Codex environment. No CI-testable path for\u0026#92;n          integration tests in slices 4-6.\u0026#92;n  - title: Feasibility Review (sonnet-coder)\u0026#92;n    sections:\u0026#92;n    - heading: Codebase Verification\u0026#92;n      items:\u0026#92;n      - badge: Confirmed\u0026#92;n        kind: success\u0026#92;n        text: hook.go wrappers are genuinely thin \u2014 DB open, projectDir resolve, delegate\u0026#92;n          to internal/hooks/. Adding Codex adapter is adding another thin wrapper.\u0026#92;n      - badge: Confirmed\u0026#92;n        kind: success\u0026#92;n        text: agent-context and code-quality skills are clean. No Claude API syntax.\u0026#92;n      - badge: Confirmed\u0026#92;n        kind: success\u0026#92;n        text: CloudEvent struct fields overlap with Codex schema. Normalization achievable.\u0026#92;n      - badge: Falsified\u0026#92;n        kind: danger\u0026#92;n        text: selfBinary()+exec.Command() in posttooluse.go and task_tracking.go means\u0026#92;n          hooks shell out to the binary for work-item ops. Plan assumes direct internal/\u0026#92;n          calls but actual code has subprocess + PATH dependency.\u0026#92;n      - badge: Falsified\u0026#92;n        kind: danger\u0026#92;n        text: Plan says 13 event gap but Go binary has 20 subcommands, not 18. Real\u0026#92;n          gap is 15 unsupported events.\u0026#92;n    - heading: Risk Assessment\u0026#92;n      items:\u0026#92;n      - badge: CODEX.md\u0026#92;n        kind: danger\u0026#92;n        text: Stale CODEX.md is not cosmetic \u2014 uv run htmlgraph fails, referenced\u0026#92;n          paths dont exist. Blocks quick-start entirely. Treat as Medium severity,\u0026#92;n          not Low.\u0026#92;n      - badge: MCP Risk\u0026#92;n        kind: warn\u0026#92;n        text: No MCP dependency in go.mod. Official SDK is newer with fewer real-world\u0026#92;n          integrations. Prototype before committing to a library.\u0026#92;n      - badge: Spike Needed\u0026#92;n        kind: warn\u0026#92;n        text: Codex 5-event claim is externally sourced, unverifiable from codebase.\u0026#92;n          Spike against live Codex before slice 5. Record actual payloads with logging\u0026#92;n          adapter.\u0026#92;n  risks:\u0026#92;n  - risk: selfBinary subprocess pattern breaks adapter isolation \u2014 posttooluse and\u0026#92;n      task_tracking shell out to binary, not internal/ directly\u0026#92;n    severity: High\u0026#92;n    mitigation: Audit all selfBinary() call sites before slice 5. Refactor to direct\u0026#92;n      internal/workitem calls where possible, or document PATH requirement in Codex\u0026#92;n      plugin setup.\u0026#92;n  - risk: Codex hook event schema unverified \u2014 if field names or event structure differs\u0026#92;n      from docs, codex_adapter.go will fail at integration\u0026#92;n    severity: High\u0026#92;n    mitigation: Spike against live Codex CLI v0.116.0 before slice 2. Record actual\u0026#92;n      hook payloads with a logging adapter. Gate slices 4-6 on verified payload shapes.\u0026#92;n  - risk: MCP STDIO transport integration fails with Codex client\u0026#92;n    severity: High\u0026#92;n    mitigation: Prototype MCP server with minimal hand-roll before committing to SDK.\u0026#92;n      Test with actual Codex MCP client.\u0026#92;n  - risk: Skill sync drift \u2014 copied skills diverge from canonical plugin/skills/ over\u0026#92;n      time\u0026#92;n    severity: Medium\u0026#92;n    mitigation: Implement build-step copy in build.sh. Add CI check that fails if\u0026#92;n      generated Codex skill files differ from build output.\u0026#92;n  - risk: CODEX.md is broken today \u2014 stale paths and wrong binary prefix block documented\u0026#92;n      quick-start\u0026#92;n    severity: Medium\u0026#92;n    mitigation: Slice 1 must execute first. Block slice 2 on slice 1 completion. Add\u0026#92;n      CI test verifying CODEX.md paths exist.\u0026#92;n  - risk: Event count gap undercounted \u2014 plan says 13 but actual gap is 15 unsupported\u0026#92;n      events\u0026#92;n    severity: Low\u0026#92;n    mitigation: Update plan with correct 20-subcommand count. Reanalyze which events\u0026#92;n      are critical vs nice-to-have for Codex.\u0026#92;n  - risk: strategic-planning skill has Claude slash command references preventing\u0026#92;n      clean Codex port\u0026#92;n    severity: Low\u0026#92;n    mitigation: Strip /htmlgraph:execute references before copy to Codex plugin. Add\u0026#92;n      grep check to done_when criteria.\u0026#92;n  synthesis: \u0026#x27;The CLI-as-engine architecture is structurally verified \u2014 hook.go wrappers\u0026#92;n    are genuinely thin and internal/ is the real engine. However two falsifications\u0026#92;n    reduce confidence: (1) selfBinary()+exec.Command() in posttooluse.go and task_tracking.go\u0026#92;n    means not all hook operations call internal/ directly \u2014 they shell out, introducing\u0026#92;n    PATH dependency the adapter plan doesnt account for. (2) The event gap is 15 not\u0026#92;n    13 (20 total subcommands, not 18). Three skills are verified host-neutral (agent-context,\u0026#92;n    code-quality clean; strategic-planning needs minor slash command cleanup). CODEX.md\u0026#92;n    is demonstrably broken and should be treated as Medium not Low severity. Recommended\u0026#92;n    sequencing: fix CODEX.md immediately (slice 1), spike Codex hook payloads before\u0026#92;n    adapter work (slice 5), prototype MCP before library commitment (slice 6). The\u0026#92;n    plan is implementable with these corrections.\u0026#x27;\u0026#92;n\u0026quot;' data-label='null' data-language='\u0026quot;yaml\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='true' data-show-copy-button='true' data-debounce='false'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "157db8562669274a55d83aa3fdab2ab1", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"dependency-graph\"\u003EDependency Graph\u003C/h3\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='PKri-0' random-id='371b4747-cbea-1554-83e3-084699437943'\u003E\u003Cmarimo-anywidget data-initial-value='{\u0026quot;model_id\u0026quot;:\u0026quot;38ce2171f0914966800cfa1a2d50e371\u0026quot;}' data-label='null' data-js-url='\u0026quot;data:text/javascript;base64,CiAgICBhc3luYyBmdW5jdGlvbiByZW5kZXIoeyBtb2RlbCwgZWwgfSkgewogICAgICBjb25zdCBkMyA9IGF3YWl0IGltcG9ydCgiaHR0cHM6Ly9jZG4uanNkZWxpdnIubmV0L25wbS9kM0A3Lytlc20iKTsKICAgICAgYXdhaXQgbmV3IFByb21pc2UoKHJlc29sdmUsIHJlamVjdCkgPT4gewogICAgICAgIGlmICh3aW5kb3cuZGFncmVEMykgcmV0dXJuIHJlc29sdmUoKTsKICAgICAgICBjb25zdCBzID0gZG9jdW1lbnQuY3JlYXRlRWxlbWVudCgic2NyaXB0Iik7CiAgICAgICAgcy5zcmMgPSAiaHR0cHM6Ly9jZG4uanNkZWxpdnIubmV0L25wbS9kYWdyZS1kM0AwLjYuNC9kaXN0L2RhZ3JlLWQzLm1pbi5qcyI7CiAgICAgICAgcy5vbmxvYWQgPSByZXNvbHZlOyBzLm9uZXJyb3IgPSByZWplY3Q7CiAgICAgICAgZG9jdW1lbnQuaGVhZC5hcHBlbmRDaGlsZCh own prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"problem\"\u003EProblem\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EHtmlGraph's Go binary already implements the 'CLI as engine' pattern \u2014 internal/ packages contain all business logic shared by both CLI commands and hooks. cmd/htmlgraph/hook.go is a thin wrapper that reads stdin, opens DB, calls internal/hooks/, writes stdout. Hooks even call CLI commands via selfBinary() for operations like auto-complete. The architecture is correct. The gap is narrower than originally scoped: Codex needs thin adapter layers that normalize its event format and response schema into the existing internal/ types. No business logic reimplementation is needed. Codex CLI (v0.116.0, 67K GitHub stars, Rust-based) has 5 hook events (verified), TOML agent definitions with developer_instructions field (verified), and MCP support via config.toml (verified). Two community bridges exist but no native HtmlGraph Codex plugin.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"goals\"\u003EGoals\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003ECodex users can install and use HtmlGraph for work tracking, attribution, and quality gates\u003C/li\u003E\n\u003Cli\u003ESkills that are host-neutral (agent-context, code-quality, orchestrator-directives) work in Codex unchanged\u003C/li\u003E\n\u003Cli\u003EMCP server exposes structured tools using official Go MCP SDK (modelcontextprotocol/go-sdk)\u003C/li\u003E\n\u003Cli\u003EHook handler normalizes Codex's 5 events into existing Go binary via adapter pattern\u003C/li\u003E\n\u003Cli\u003EAgent definitions exist in Codex TOML format using developer_instructions field\u003C/li\u003E\n\u003Cli\u003EMaintain CLI-as-engine pattern \u2014 all new host adapters call internal/ packages directly, enabling future hosts (Gemini CLI, OpenCode) with thin adapters only\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"constraints\"\u003EConstraints\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003ECodex hooks only support 5 events with PreToolUse/PostToolUse Bash-only (verified via docs)\u003C/li\u003E\n\u003Cli\u003EAgent TOML uses developer_instructions not system_prompt, and mcp_servers/skills.config not tools (verified)\u003C/li\u003E\n\u003Cli\u003EStandalone MCP uses config.toml not .mcp.json; .mcp.json only within plugin bundles (verified)\u003C/li\u003E\n\u003Cli\u003EMust not break existing Claude plugin \u2014 additive changes only\u003C/li\u003E\n\u003Cli\u003EGo binary is the single hook handler for both hosts \u2014 no code duplication\u003C/li\u003E\n\u003Cli\u003EHook blocking response format differs: Codex uses permissionDecision/permissionDecisionReason\u003C/li\u003E\n\u003Cli\u003EAll host adapters must call internal/ packages directly \u2014 no business logic duplication (verified: architecture already supports this)\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='Xref-0' random-id='dc954e6a-dd4d-459c-84e2-2fe16b0c2e5f'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve design\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Add Comments\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cmarimo-ui-element object-id='Xref-1' random-id='74470b9b-a7b8-295b-98ee-12efad7a8225'\u003E\u003Cmarimo-text-area data-initial-value='\u0026quot;\u0026quot;' data-label='null' data-placeholder='\u0026quot;Comments on design...\u0026quot;' data-disabled='false' data-debounce='true' data-full-width='true'\u003E\u003C/marimo-text-area\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "0de04c48b84f003a9ba7f8dd82d443c0", "console": [], "id": "SFPL", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "3921dc09a8bbecc464db167e394d5b97", "console": [], "id": "BYtC", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"b-vertical-slices\"\u003EB. Vertical Slices\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EApprove slices individually.\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 1: Fix stale CODEX.md references\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 2: Codex plugin scaffold with hooks.json\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 3: Port host-neutral skills to Codex plugin\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 4: Agent roster in Codex TOML format\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 5: Codex hook event adapter in Go binary\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Slice 6: HtmlGraph MCP server using official Go SDK\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='true'\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='BYtC-6' random-id='03659554-fbb8-d57e-fa09-7f3004a4b92d'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: S\u003C/span\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: Low\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Remove references to nonexistent packages/codex-skill and docs/codex_headless.md. Fix uv run htmlgraph to plain htmlgraph (Go binary, not Python). Update quick start workflow to reflect current CLI. Remove Prefer uv run instruction entirely.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E First impression for Codex users. Stale docs erode trust. Both paths verified nonexistent in current repo.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003ECODEX.md\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EAll file paths referenced in CODEX.md exist in the repo\u003C/li\u003E\n\u003Cli\u003ENo uv run prefix in any htmlgraph invocation\u003C/li\u003E\n\u003Cli\u003EQuick start commands actually work when run\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EManual: verify every path referenced in CODEX.md exists.\nManual: run each command in CODEX.md and confirm it works.\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='BYtC-7' random-id='d979c14f-7c92-c65e-b8a1-3fb2ad7afe81'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(22,163,74,0.15);color:#16a34a;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: S\u003C/span\u003E\u003Cspan style=\"background:rgba(245,158,11,0.15);color:#f59e0b;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: Med\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Create plugins/htmlgraph-codex/ with .codex-plugin/plugin.json manifest (required field: name as kebab-case), skills/ directory, and .codex/hooks.json routing 5 supported events to htmlgraph hook binary. The hooks.json uses regex matchers per Codex spec. Add marketplace entry stub at .agents/plugins/marketplace.json.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E Codex requires this specific layout for plugin discovery. Plugins install to ~/.codex/plugins/cache/. Without this scaffold, nothing else can be tested.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Eplugins/htmlgraph-codex/.codex-plugin/plugin.json\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/.codex/hooks.json\u003C/code\u003E, \u003Ccode\u003E.agents/plugins/marketplace.json\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eplugin.json has required name field in kebab-case\u003C/li\u003E\n\u003Cli\u003Ehooks.json routes 5 events to htmlgraph hook binary with regex matchers\u003C/li\u003E\n\u003Cli\u003Emarketplace.json stub exists for local installation\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-teratermmacro codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"nv\"\u003EUnit\u003C/span\u003E:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eplugin\u003C/span\u003E.\u003Cspan class=\"nv\"\u003Ejson\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Evalidates\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eagainst\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Edocumented\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u0 on. Without these, Codex agents have no guidance for HtmlGraph workflows.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Eplugins/htmlgraph-codex/skills/agent-context/SKILL.md\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/skills/code-quality-skill/SKILL.md\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/skills/strategic-planning/SKILL.md\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E3 skills load in Codex without errors\u003C/li\u003E\n\u003Cli\u003ENo Claude-specific API references remain (no Task(), no Agent())\u003C/li\u003E\n\u003Cli\u003EWork attribution workflow (feature start/complete) works via CLI\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E Codex plugin scaffold with hooks.json\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-teratermmacro codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"nv\"\u003EUnit\u003C/span\u003E:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Egrep\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Efor\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003ETask\u003C/span\u003E\u003Cspan class=\"ss\"\u003E()\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Eand\u00 ons with different field names than Claude. Without re-encoded agents, Codex users have no specialized subagents for research, coding, or testing.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Eplugins/htmlgraph-codex/.codex/agents/haiku-coder.toml\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/.codex/agents/sonnet-coder.toml\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/.codex/agents/opus-coder.toml\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/.codex/agents/researcher.toml\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/.codex/agents/test-runner.toml\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E5 TOML files parse without errors with required fields (name, description, developer_instructions)\u003C/li\u003E\n\u003Cli\u003ENo system_prompt or tools fields used (use developer_instructions, mcp_servers, skills.config)\u003C/li\u003E\n\u003Cli\u003EEach agent has equivalent role guidance from Claude markdown body\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E Port host-neutral skills to Codex plugin\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-gdscript codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"n\"\u003EUnit\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/spa 3EWhat:\u003C/strong\u003E Add internal/hooks/codex_adapter.go \u2014 a thin normalization layer. The Go binary already implements CLI-as-engine: internal/hooks/ contains all guard logic, event recording, and session management. The adapter only needs to: (1) Normalize Codex JSON field names (hook_event_name, tool_input.command) into the existing CloudEvent struct. (2) Output permissionDecision/permissionDecisionReason format for Codex (vs decision/reason for Claude). (3) Detect host via --host=codex CLI flag passed in hooks.json entries. All guard logic, event recording, session management stays unchanged \u2014 zero business logic reimplementation. Add AGENTS.md prohibiting direct .htmlgraph/ writes (since Codex PreToolUse only fires for Bash).\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E The adapter is thin because internal/hooks/ already IS the engine. The Codex adapter just normalizes the wire format. This is the same pattern the CLI uses \u2014 cmd/htmlgraph/hook.go is already a thin wrapper calling internal/hooks/ functions. Adding Codex is adding another thin wrapper, not reimplementing logic.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Einternal/hooks/codex_adapter.go\u003C/code\u003E, \u003Ccode\u003Einternal/hooks/codex_adapter_test.go\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/AGENTS.md\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ECodex JSON payloads normalize into CloudEvent struct correctly\u003C/li\u003E\n\u003Cli\u003EHook blocking returns permissionDecision format for Codex, decision format for Claude\u003C/li\u003E\n\u003Cli\u003EAGENTS.md explicitly prohibits direct .htmlgraph/ file writes\u003C/li\u003E\n\u003Cli\u003ESession tracking works (htmlgraph status shows Codex session)\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E Codex plugin scaffold with hooks.json\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EUnit: Codex PreToolUse JSON normalizes to CloudEvent with correct field values.\nUnit: Codex Stop JSON normalizes correctly.\nUnit: blocking response uses permissionDecision format.\nIntegration: Codex session triggers SessionStart and creates session record.\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='BYtC-11' random-id='724b37d4-d3ff-7f9f-91d6-affe47488025'\u003E\u003Cmarimo-checkbox data-initial-value='true' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Approve\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-disabled='false'\u003E\u003C/marimo-checkbox\u003E\u003C/marimo-ui-element\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.25rem'\u003E\u003Cspan style=\"background:rgba(220,38,38,0.15);color:#dc2626;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003EEffort: L\u003C/span\u003E\u003Cspan style=\"background:rgba(220,38,38,0.15);color:#dc2626;padding:2px 10px;border-radius:9999px;font-size:0.75rem;font-weight:600\"\u003ERisk: High\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhat:\u003C/strong\u003E Implement MCP server as htmlgraph mcp-server subcommand using the official modelcontextprotocol/go-sdk (v1.4.1). Each MCP tool calls the same internal/ functions that CLI commands use \u2014 internal/workitem for feature operations, internal/db for queries, internal/htmlparse for HTML parsing. Direct Go function calls, not subprocess overhead. Expose tools: htmlgraph_status, htmlgraph_feature_list, htmlgraph_feature_start, htmlgraph_feature_complete, htmlgraph_snapshot, htmlgraph_find, htmlgraph_session_link_transcript. STDIO transport. Host-neutral \u2014 works with Claude, Codex, Cursor, any MCP client.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EWhy:\u003C/strong\u003E MCP tools call the same internal/ packages as CLI commands \u2014 the CLI-as-engine pattern means zero duplication. The official Go SDK handles JSON-RPC 2.0 protocol complexity. Host-neutral by design: one implementation serves all AI coding agents.\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EFiles:\u003C/strong\u003E \u003Ccode\u003Ecmd/htmlgraph/mcp_server.go\u003C/code\u003E, \u003Ccode\u003Einternal/mcp/server.go\u003C/code\u003E, \u003Ccode\u003Einternal/mcp/tools.go\u003C/code\u003E, \u003Ccode\u003Eplugins/htmlgraph-codex/.mcp.json\u003C/code\u003E, \u003Ccode\u003Ego.mod\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDone when:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Ehtmlgraph mcp-server starts and responds to initialize request\u003C/li\u003E\n\u003Cli\u003E7 tools registered and callable via MCP protocol\u003C/li\u003E\n\u003Cli\u003ESTDIO transport works with both Codex and Claude MCP clients\u003C/li\u003E\n\u003Cli\u003Ego.mod includes modelcontextprotocol/go-sdk dependency\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDepends on:\u003C/strong\u003E Codex plugin scaffold with hooks.json\u003C/span\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETests:\u003C/strong\u003E\n\u003Cdiv class=\"language-gdscript codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"n\"\u003EUnit\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eeach\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Etool\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ehandler\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ereturns\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Evalid\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EMCP\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eresponse\u003C/span\u003E\u003C
