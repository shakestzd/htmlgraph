meta:
    id: plan-1cd284e0
    track_id: trk-c4615ad2
    title: Per-session OTel collector with NDJSON ingest + SQLite as derived index
    description: |
        Move the OTLP receiver out of htmlgraph serve into per-session collector subprocesses that append OTel signals to session-scoped NDJSON files, and build an NDJSON-to-SQLite indexer in serve to preserve existing dashboard APIs. Retires the shared-port shared-writer model that causes parallel-session merging (bug-e8b8900b), SQLITE_BUSY cascades on the OTel write path (bug-08681166 class), and serve-restart span drops. Establishes the NDJSON-canonical + SQLite-derived pattern without committing to full SQLite removal (deferred to follow-on plans).
    created_at: "2026-04-24"
    status: draft
    created_by: claude-opus
    version: 1
design:
    problem: |
        The OTLP receiver is embedded inside htmlgraph serve and writes to the shared .htmlgraph/htmlgraph.db SQLite file on a project-hashed port (4318 + FNV32a(projectDir) % 1000, internal/otel/receiver/port.go:11). This creates four recurring failure modes. (1) Parallel htmlgraph claude terminals in the same project share one port and one writer; Claude Code's span tagging is the only thing distinguishing their sessions, and bug-e8b8900b documents session merging from this. (2) The receiver competes with hook processes for SQLite writes, producing SQLITE_BUSY cascades — bug-08681166 (in-progress), and the already-resolved bug-6ab963d3 and bug-59b98285, all describe the same contention class. (3) Restarting serve drops in-flight spans because Claude Code's OTel SDK has no durable retry against a closed port (claude_serve_autostart.go:93 logs a warning and accepts the loss). (4) Session identity is authoritative only in Claude Code — HTMLGRAPH_SESSION_ID leaks from parent shells into subprocesses (internal/hooks/runner.go:187), misattributing hook events in subagent contexts.
    goals:
        - '**Per-session isolation** — each htmlgraph claude/yolo/dev session owns its own collector subprocess, ephemeral port, and NDJSON file; parallel terminals never contend at the ingest layer.'
        - '**Eliminate OTel writer collisions with SQLite** — collectors never hold a SQLite write lock directly; the bug-08681166 class of failures stops reaching the OTel ingest path entirely.'
        - '**Lifecycle independence from serve** — collectors survive serve restarts without dropping spans; serve becomes a pure reader + semantic-op server.'
        - '**Launcher-owned session identity** — htmlgraph mints the session ULID and binds it to every emitted event, replacing Claude Code''s span-tagged session.id as the authority.'
        - '**Zero dashboard regression** — every /api/otel/* endpoint keeps returning the same data shape; the NDJSON→SQLite indexer preserves all existing query paths.'
    constraints:
        - 'Keep SQLite as the dashboard read index for this plan. Removing it entirely is a future phase that depends on answers we do not yet have for six genuine-SQL sites: yolo-guard LIKE scans (yolo_guard.go:539–704), DSL graph traversal (internal/graph/dsl.go), feature_files self-join overlap (feature_files_repo.go:86), claims CAS and lease expiry (claim_repo.go), OTel span re-parenting transactions (writer.go:553), and dashboard sessions list 5-table correlated subqueries (api.go:116–146).'
        - Reuse the existing syscall.Flock pattern (session_html.go:147, materialize.go:241) for NDJSON atomicity on oversize writes. Do not introduce a new lock primitive.
        - PIPE_BUF atomicity is 4096 bytes on Linux and 512 bytes on macOS. Some transcript_assistant.go:267 payloads exceed 4KB. Plan must name an explicit size-overflow strategy, not assume single-syscall atomicity.
        - Serve auto-spawn must continue to work for semantic ops and the dashboard — only the OTLP receive-side is removed from serve. The existing checkServeLock/writeServeLock/spawnDetachedServe pattern (claude_serve_autostart.go:179–255) is reused for the dashboard path.
        - Dashboard is an SPA (plugin/static/dashboard/js/app.js, 3435 lines) with substantial client-side aggregation already. The indexer preserves current API response shapes; no frontend rewrite is in scope.
        - Launcher currently detaches subprocesses via Setpgid:true and uses PID lockfiles. Collector subprocess reuses these mechanisms. Linux-only PDEATHSIG is not required if SIGTERM-on-exit is wired reliably at layered levels (SessionEnd hook + deferred launcher SIGTERM + idle timeout).
    approved: false
    comment: ""
slices:
    - id: slice-1
      num: 1
      title: Extract SignalSink interface; add NDJSONSink implementation
      what: |
        Refactor internal/otel/receiver/writer.go to depend on a SignalSink interface with WriteBatch(ctx, *otel.UnifiedSignalBatch) error. Keep the current SQLite-backed writer as the first concrete implementation under internal/otel/sink/sqlite/. Add internal/otel/sink/ndjson/ that opens .htmlgraph/sessions/<sid>/events.ndjson (layout per Q1) in O_APPEND mode, serializes each UnifiedSignal as one JSON line, and handles payloads larger than PIPE_BUF according to the strategy chosen in Q4. Both sinks implement the same interface and are swappable at construction time. internal/otel/receiver/receiver.go's New() accepts a SignalSink rather than opening a *sql.DB directly.
      why: |
        Today writer.go is deeply SQLite-coupled: five prepared statements, BEGIN IMMEDIATE transactions, cross-table FK resolution against pending_subagent_starts and active_work_items. Without an interface boundary, a per-session collector cannot choose between sinks and cannot be tested without a real SQLite file. This interface extraction is the prerequisite that unblocks every downstream slice. Supports goal "Eliminate OTel writer collisions" by making sink selection explicit.
      files:
        - internal/otel/receiver/writer.go
        - internal/otel/receiver/receiver.go
        - internal/otel/sink/sink.go
        - internal/otel/sink/sqlite/sqlite.go
        - internal/otel/sink/ndjson/ndjson.go
        - internal/otel/sink/ndjson/overflow.go
      deps: []
      done_when:
        - SignalSink interface exists with WriteBatch(ctx, *otel.UnifiedSignalBatch) error; both sqlite and ndjson sinks implement it and pass the same parameterized test suite.
        - internal/otel/receiver/receiver.go constructor accepts a SignalSink, not a *sql.DB.
        - 'NDJSONSink correctly applies the oversize strategy chosen in Q4: if truncate+sidecar, the main line stays under PIPE_BUF and the .overflow/<signal-id> sidecar contains the full payload.'
        - go build ./... && go vet ./... && go test ./internal/otel/... all green.
      effort: M
      risk: Low
      tests: |
        Unit: internal/otel/sink/sink_test.go parameterized over sinkFactory — write
          a mixed batch of spans/metrics/logs, read back via sink-specific inspector,
          assert UnifiedSignal round-trip with every field preserved.
        Unit: internal/otel/sink/ndjson/overflow_test.go — log signal with
          attrs.text = strings.Repeat("x", 10000); assert main line < PIPE_BUF
          AND overflow sidecar exists with full text (or per Q4 alternative).
        Integration: internal/otel/receiver/receiver_test.go boots a Receiver
          wired to NDJSONSink, posts a known OTLP protobuf batch, asserts
          events.ndjson on disk contains the expected signal lines.
        Regression: existing internal/otel/receiver tests pass unchanged against
          the SQLite sink path.
      approved: false
      comment: ""
    - id: slice-2
      num: 2
      title: htmlgraph otel-collect subcommand
      what: |
        New CLI subcommand `htmlgraph otel-collect --session-id <sid> --project-dir <path> --listen :0`. On start, constructs a receiver.Receiver wired to NDJSONSink rooted at .htmlgraph/sessions/<sid>/, chooses an ephemeral port via net.Listen(":0"), prints the chosen port to stdout in a single line `listen=127.0.0.1:<port>`, then blocks on Receiver.Start(ctx). Handles SIGTERM gracefully: flush pending batch (bounded ≤3s), close sink, exit 0. Emits a collector_start NDJSON line on boot: {"type":"collector_start","htmlgraph_sid":"<sid>","pid":<pid>, "port":<port>,"ts":<ns>} so the indexer can correlate collector lifetime with session events.
      why: |
        The collector must run as a separate process to achieve lifecycle independence from serve. Printing the chosen port on stdout is the simplest contract between launcher and collector — no advertisement protocol, no lockfile scan. SIGTERM drain is the only shutdown path that preserves in-flight spans. Forcing the launcher to pass session-id via flag closes the HTMLGRAPH_SESSION_ID env-leak misattribution at runner.go:187. Supports goal "Launcher-owned session identity".
      files:
        - cmd/htmlgraph/otel_collect.go
        - cmd/htmlgraph/main.go
      deps:
        - 1
      done_when:
        - '`htmlgraph otel-collect --session-id 01HK... --project-dir /tmp/proj --listen :0` prints a single `listen=127.0.0.1:<port>` line on stdout within 200ms of start.'
        - POSTing an OTLP protobuf to the printed port produces a corresponding NDJSON line in .htmlgraph/sessions/01HK.../events.ndjson within 500ms.
        - SIGTERM drains the pending batch and exits 0 within 3s; SIGKILL accepted without corrupting NDJSON beyond the last partial line (tolerable by indexer's checkpoint logic).
        - collector_start event is the first line of the NDJSON file and contains htmlgraph_sid, pid, port, ts.
      effort: S
      risk: Low
      tests: |
        Unit: cmd/htmlgraph/otel_collect_test.go — spawn subprocess via
          exec.Command, read port line, POST OTLP protobuf, kill SIGTERM, assert
          NDJSON contents.
        Integration: parallel launch — spawn 3 otel-collect processes with
          different session IDs in the same project, assert each gets a distinct
          port and writes to its own NDJSON file with no cross-contamination.
        Regression: `htmlgraph --help` output includes otel-collect; no other
          subcommand is affected.
      approved: false
      comment: ""
    - id: slice-3
      num: 3
      title: Launcher spawns per-session collector child
      what: |
        In cmd/htmlgraph/claude.go:launchClaude, before buildClaudeLaunchEnv: (1) generate a ULID for HTMLGRAPH_SESSION_ID; (2) exec `htmlgraph otel-collect --session-id <sid> --project-dir <root> --listen :0` as a child with Setpgid:true, matching claude_serve_autostart.go:255; (3) scan stdout for the `listen=` line with a 3s timeout; abort launch with a clear error if the collector fails to bind; (4) set OTEL_EXPORTER_OTLP_ENDPOINT=http://<address> and HTMLGRAPH_SESSION_ID=<sid> in the launch env, replacing the current static port derivation at claude_env.go:77; (5) register a deferred SIGTERM to the collector PID on launchClaude return, with the collector PID written to .htmlgraph/sessions/<sid>/.collector-pid so SessionEnd hook can also target it (slice 7). The existing MaybeShowOtelNotice and ensureServeForOtel calls stay intact for this slice — slice 6 renames and re-scopes them.
      why: |
        The launcher is the only process that lives exactly as long as one Claude Code session. Spawning the collector here is what makes "session ID owned by the launcher" a code-level fact, not just documentation. Capturing the ephemeral port from child stdout is the irreversible step — once claude-code is exec'd with a given OTel endpoint, it cannot be reconfigured at runtime. Fail-fast on bind failure prevents orphaned claude-code processes exporting telemetry to nowhere. Directly addresses the parallel-terminal merging root cause (bug-e8b8900b).
      files:
        - cmd/htmlgraph/claude.go
        - cmd/htmlgraph/claude_env.go
        - cmd/htmlgraph/claude_otel_collect_spawn.go
      deps:
        - 2
      done_when:
        - htmlgraph claude launches a detached otel-collect child, reads its port from stdout with ≤3s timeout, sets OTEL_EXPORTER_OTLP_ENDPOINT to the child's address, and propagates HTMLGRAPH_SESSION_ID to the Claude Code process.
        - Running htmlgraph claude in three terminals in the same project produces three distinct otel-collect children on three distinct ports writing to three distinct NDJSON files with no cross-session events mixed.
        - Collector bind failure (e.g. no ports available) aborts launchClaude with a non-zero exit and a clear error message; no orphaned claude-code process is exec'd.
        - Deferred SIGTERM fires on clean launcher exit; launcher SIGKILL leaves the collector as an orphan (accepted per Q3's layered policy — SessionEnd hook is primary, launcher defer is secondary).
        - The collector PID is written to .htmlgraph/sessions/<sid>/.collector-pid within 500ms of spawn.
      effort: M
      risk: Med
      tests: |
        Integration: e2e launcher test — invoke htmlgraph claude with
          noninteractive args; post-exit inspect .htmlgraph/sessions/<sid>/events.ndjson
          contains the collector_start event.
        Integration: parallel launch — 3 concurrent `htmlgraph claude` invocations
          in the same project directory; assert 3 distinct session-ids, 3 distinct
          collector PIDs, 3 distinct ports, and no overlap in NDJSON file contents.
        Integration: bind failure — simulate exhausted port range (mock
          net.Listen to fail); assert htmlgraph claude aborts with exit code ≠ 0
          and no Claude Code process is spawned.
        Regression: existing claude.go launch paths (yolo, dev, --resume,
          --tmux) continue to work without functional change.
      approved: false
      comment: ""
    - id: slice-4
      num: 4
      title: Session-start Rosetta event + env-leak fix
      what: |
        Emit a session_start NDJSON line containing both the launcher-minted htmlgraph_sid and Claude Code's own session_id (read from the SessionStart hook payload) as the correlation record that maps `claude --resume <id>` back to an htmlgraph session: {"type":"session_start","htmlgraph_sid":"<launcher ULID>", "claude_session_id":"<from hook>","project_dir":"<path>","ts":<ns>}. Additionally, close the HTMLGRAPH_SESSION_ID env-leak into subagent shells at internal/hooks/runner.go:187 by stripping the env var at the Task-spawn boundary — use the Codex/Gemini mitigation pattern already present at runner.go:206 as the template.
      why: |
        Without the Rosetta event, `claude --resume <id>` creates a new collector and a new NDJSON file with no link back to the prior transcript — the dashboard loses the ability to show a continuous session history across resume points. The env-leak fix is a small real bug that becomes trivially closable once the launcher is the session-id authority. Supports goal "Launcher-owned session identity" and enables the "zero dashboard regression" goal across resume flows.
      files:
        - internal/hooks/session_start.go
        - internal/hooks/runner.go
        - cmd/htmlgraph/claude.go
      deps:
        - 3
      done_when:
        - Every new session's events.ndjson contains a session_start event with both htmlgraph_sid and claude_session_id populated (within the first 10 lines).
        - Running `htmlgraph claude --resume <prior-claude-id>` produces a session_start event whose claude_session_id equals the resume argument.
        - HTMLGRAPH_SESSION_ID does not leak into Task-spawned subagent shells; subagent collectors receive their parent session ID only via explicit flag propagation, not env inheritance — verified by a test that spawns a subagent and inspects its env.
      effort: S
      risk: Low
      tests: |
        Unit: internal/hooks/session_start_test.go — invoke with synthetic
          payload, assert the emitted NDJSON line shape and contents.
        Integration: resume flow — launch, capture sid, exit, relaunch with
          --resume <captured-sid>, assert second session's session_start event
          contains the original claude_session_id.
        Regression: subagent attribution tests relevant to feat-82e11bbb still
          pass; no new env-leak cases introduced as verified by
          runner_test.go env-capture assertions.
      approved: false
      comment: ""
    - id: slice-5
      num: 5
      title: NDJSON→SQLite indexer loop inside serve
      what: |
        New internal/otel/indexer/ package that watches .htmlgraph/sessions/*/events.ndjson files (fsnotify on Linux, polling every 500ms on macOS per Q2), tails each file, parses one JSON line at a time, and applies it to SQLite through the SQLite SignalSink from slice 1. Maintains a per-file checkpoint in .htmlgraph/sessions/<sid>/.index-offset (written atomically via write-to-temp-then-rename after each successful batch commit). On indexer boot, replays from last checkpoint to end-of-file for every session directory. Mount the indexer in cmd/htmlgraph/serve_child.go alongside the existing autoIngestLoop, feature-flagged via HTMLGRAPH_INDEXER=1 if Q5 selects parallel-validation rollout, or unconditionally on if Q5 selects cutover.
      why: |
        With collectors writing NDJSON instead of SQLite directly, every /api/otel/* endpoint (backed by otel_signals, otel_resource_attrs, otel_session_rollup) would break on day one. The indexer is the bridge: NDJSON is canonical, SQLite becomes derived and rebuildable. Checkpoint files are what make "rebuild by deleting htmlgraph.db and restarting serve" a single-command recovery — serve replays every NDJSON from offset 0 and repopulates the index. Directly supports goal "Zero dashboard regression".
      files:
        - internal/otel/indexer/indexer.go
        - internal/otel/indexer/checkpoint.go
        - internal/otel/indexer/watch_linux.go
        - internal/otel/indexer/watch_fallback.go
        - cmd/htmlgraph/serve_child.go
      deps:
        - 1
      done_when:
        - Indexer starts inside htmlgraph serve, tails every .htmlgraph/sessions/*/events.ndjson, applies new NDJSON lines to SQLite, and advances .index-offset atomically after each committed batch.
        - Killing serve mid-replay and restarting resumes from the last checkpointed offset with zero duplicate rows (INSERT OR IGNORE semantics preserved by the SQLite sink).
        - 'Full-rebuild test: delete htmlgraph.db, restart serve, assert otel_signals row count equals total parseable NDJSON line count across all sessions.'
        - Indexer lag is ≤ 5s at 100 signals/s of synthetic single-session load, measured by NDJSON append-time vs. first SQLite visibility.
        - Every /api/otel/* endpoint returns a byte-identical payload (modulo timestamps) for a fixture session whether populated via direct SQLite writer (pre-change) or via indexer (post-change).
      effort: L
      risk: Med
      tests: |
        Unit: internal/otel/indexer/checkpoint_test.go — write offset, simulate
          crash mid-write (truncate), recover, assert offset falls back to the
          previous good value rather than partial-write garbage.
        Unit: internal/otel/indexer/indexer_replay_test.go — given a prewritten
          NDJSON file, run the indexer, assert every line is applied to SQLite
          in order, duplicates are ignored.
        Integration: collector + indexer — spawn a collector, POST 1000 OTLP
          signals, wait for indexer catch-up, assert
          SELECT COUNT(*) FROM otel_signals = 1000.
        Integration: crash-recovery — spawn collector + indexer, kill indexer
          after 500 signals, POST 500 more signals, restart indexer, assert
          final count = 1000 with no duplicates.
        Regression: /api/otel/rollup, /api/otel/cost, /api/otel/spans,
          /api/otel/logs, /api/otel/prompts return the same shape for a
          fixture session under both write paths.
      approved: false
      comment: ""
    - id: slice-6
      num: 6
      title: Strip OTLP receiver from serve; rename ensureServeForOtel
      what: |
        Remove receiver.New/Start calls from cmd/htmlgraph/serve_child.go. The embedded OTLP endpoint on the project-hashed port is deleted. Rename claude_serve_autostart.go:ensureServeForOtel to ensureServeForDashboard and change its semantics — serve is no longer auto-spawned for telemetry reasons. It is only auto-spawned when (a) a CLI command requires semantic-op execution or (b) the user explicitly opens the dashboard. Keep the PID-lockfile and TCP-probe pattern (checkServeLock, writeServeLock, spawnDetachedServe) intact for the dashboard path. Delete internal/otel/receiver/port.go and its FNV-hash port derivation — no more shared port per project.
      why: |
        This is the slice that actually shuts the contention class down: once the OTLP receiver is gone from serve and collectors are the only ingest path, bug-08681166 (busy_timeout lost) stops reaching OTel writes entirely. The rename clarifies serve's role as a reader plus semantic-op singleton, not a telemetry endpoint. Deleting port.go eliminates the multi-project-collision history documented in bug-d2ba2a82. Directly supports goals "Eliminate OTel writer collisions" and "Lifecycle independence from serve".
      files:
        - cmd/htmlgraph/serve.go
        - cmd/htmlgraph/serve_child.go
        - cmd/htmlgraph/claude_serve_autostart.go
        - cmd/htmlgraph/claude.go
        - internal/otel/receiver/port.go
      deps:
        - 3
        - 5
      done_when:
        - htmlgraph serve no longer binds any OTLP port; scanning running processes for listeners in range 4318–5317 shows only otel-collect children, never serve.
        - ensureServeForDashboard auto-spawns serve only when a semantic op or dashboard request requires it; launching htmlgraph claude with the dashboard already running does NOT re-probe any OTLP port.
        - internal/otel/receiver/port.go is deleted; no import references remain in the codebase.
        - The specific SQLITE_BUSY cascade symptom of bug-08681166 (OTel writer colliding with hook writers) cannot reproduce because no OTel writer lives inside serve.
      effort: M
      risk: Med
      tests: |
        Unit: internal/otel/receiver/receiver_test.go adjusted to construct
          the Receiver in-process with NDJSONSink, not via the old serve mount.
        Integration: serve startup probe — after htmlgraph serve boots, assert
          no TCP listener exists on any port in range 4318–5317; every
          /api/otel/* endpoint still serves data sourced from indexer-populated
          SQLite.
        Integration: concurrent-claude — run 3 parallel htmlgraph claude
          sessions; assert 3 distinct otel-collect listeners during the
          sessions and zero persist after all three exit cleanly.
        Regression: existing OTel-related dashboard tests continue to pass;
          the first-launch OTel notice is still shown at the correct time.
      approved: false
      comment: ""
    - id: slice-7
      num: 7
      title: 'Session cleanup: graceful drain + retention hygiene'
      what: |
        Two pieces. (1) On SessionEnd hook, read .htmlgraph/sessions/<sid>/.collector-pid (written by slice 3), send SIGTERM, wait up to 3s for clean drain, fall back to SIGKILL if needed. This is Q3's "primary" layer. (2) Retention job in a new internal/otel/retention/ package: on serve startup and every 24h thereafter, walk session directories, detect sessions whose sessions.status = 'done' is older than HTMLGRAPH_SESSION_RETAIN_DAYS (default 30), archive events.ndjson into .htmlgraph/archive/<yyyy-mm>/<sid>.tar.zst, delete the live session dir (but preserve the indexer-populated SQLite rows — those age out via existing cleanup commands). Dry-run mode via HTMLGRAPH_RETENTION_DRYRUN=1 logs intended actions without moving files.
      why: |
        Without SessionEnd SIGTERM, collectors either persist past session lifetime (waiting for a launcher SIGTERM that may never fire after launcher SIGKILL), or get reaped by OS cleanup with spans still in their batch buffer — losing them. Without retention, .htmlgraph/sessions/ grows unbounded over months. Restoring an archived session is supported so lineage queries over historical transcripts still work. This slice closes the correctness gap named in Q3 and the operational gap noted in the design doc.
      files:
        - internal/hooks/session_end.go
        - internal/otel/retention/retention.go
        - cmd/htmlgraph/serve_child.go
        - cmd/htmlgraph/session_restore.go
      deps:
        - 3
        - 6
      done_when:
        - SessionEnd hook reads .collector-pid, sends SIGTERM, waits up to 3s, falls back to SIGKILL; the collector flush completes and the final NDJSON batch has no torn last line.
        - Retention job runs at serve boot and on a 24h timer; HTMLGRAPH_RETENTION_DRYRUN=1 logs intended archive/delete actions without moving files.
        - A session archived to .htmlgraph/archive/ is restorable via `htmlgraph session restore <sid>`; the indexer picks up the restored NDJSON on next replay without duplicating rows.
      effort: M
      risk: Low
      tests: |
        Unit: internal/otel/retention/retention_test.go — construct 10
          synthetic session directories with varying ages, run retention,
          assert correct archive and deletion behavior, assert live sessions
          (status != 'done') are untouched.
        Integration: SessionEnd signal — spawn collector, write 100 signals,
          invoke SessionEnd hook, assert collector exits 0 within 3s and
          the final batch is fully flushed to NDJSON.
        Integration: restore flow — archive a session, run `htmlgraph session
          restore <sid>`, assert indexer picks up the restored file and
          otel_signals row count matches pre-archive value.
        Regression: existing session-end flows (transcript sync, feature
          work-on capture) still fire in the correct order relative to the
          new SIGTERM step.
      approved: false
      comment: ""
questions:
    - id: q-ndjson-file-layout
      text: One NDJSON file per session with all signal types mixed, or separate files per type?
      description: |
        Every OTLP batch carries a mix of traces, metrics, and logs. Option A writes all of them plus hook observations to one events.ndjson; each line carries a `kind` field (span/metric/log/hook). Simpler to watch (one fsnotify handle per session), simpler to replay in arrival order, but larger files with heterogeneous schemas. Option B splits into otel-spans.ndjson, otel-metrics.ndjson, otel-logs.ndjson, and events.ndjson for hook observations. Cleaner per-type schemas and independent retention, but 3–4 watchers per session and cross-type ordering is lost (matters if a trace and a related metric from the same span need to be applied in deterministic order). Given the OTLP batch is already an atomic unit, Option A preserves batch ordering and is the simpler implementation today. Option B is more future-flexible for differential retention but buys complexity we do not need for the stated goals.
      recommended: mixed
      options:
        - key: mixed
          label: 'A: One events.ndjson per session — all signals plus hook observations interleaved, a kind field distinguishes them. Simpler fsnotify (one file), batch arrival order preserved, single checkpoint per session. Recommended.'
        - key: per-type
          label: 'B: Separate per-type files — otel-spans.ndjson, otel-metrics.ndjson, otel-logs.ndjson, events.ndjson. Cleaner per-type schemas and independent retention, but multiple watchers per session and lost cross-type ordering.'
      answer: null
    - id: q-indexer-trigger
      text: How does the indexer learn that new NDJSON lines exist?
      description: |
        The indexer must pick up new appends quickly to keep dashboard staleness low. Option A uses fsnotify on Linux (kernel events, sub-millisecond latency) with polling fallback on macOS (fsevents is coarse-grained for append-only files and can coalesce events). Option B is pure polling every 500ms on all platforms — uniform but adds fixed latency and a CPU floor. Option C extends the existing serve autoIngestLoop (serve_child.go) to also drive the indexer — reuses machinery but couples to that loop's cadence (currently ~5s, tuned for session metadata changes, not append events). fsnotify is the observability-standard choice but requires platform branching; polling is simpler and deterministic but wastes cycles when idle.
      recommended: fsnotify-with-polling-fallback
      options:
        - key: fsnotify-with-polling-fallback
          label: 'A: fsnotify on Linux + polling every 500ms on macOS — native events where available, platform-correct fallback. Recommended.'
        - key: polling-only
          label: 'B: Polling every 500ms on all platforms — simpler, uniform, ~1% CPU when active and zero when no session dirs exist.'
        - key: extend-auto-ingest
          label: 'C: Extend autoIngestLoop to drive the indexer — reuse existing timer machinery, accept its coarser 5s cadence, couple lifecycles.'
      answer: null
    - id: q-session-close-policy
      text: When exactly does a per-session collector exit?
      description: |
        Three candidate triggers. (a) SessionEnd hook fires and the hook SIGTERMs the collector. (b) Launcher exit triggers a deferred SIGTERM to the collector. (c) Idle timeout inside the collector (e.g., no OTLP traffic for 5 minutes) triggers self-exit. (a) is the most correct — the session ending is the exact moment it is safe to drain and close. But SessionEnd can fail to fire if Claude Code crashes. (b) catches the launcher-crash path but not launcher-killed-9. (c) is a belt-and-suspenders backup but risks early exit during long thinks (though OTel spans should keep flowing during a think). Recommended: all three, layered — (a) primary, (b) fallback, (c) ultimate safety net. Retention (slice 7) sweeps any true orphans.
      recommended: layered-all-three
      options:
        - key: layered-all-three
          label: 'A: All three layered — SessionEnd hook (primary) + launcher deferred SIGTERM (fallback) + 5-minute idle timeout (safety net). Defense in depth. Recommended.'
        - key: hook-only
          label: 'B: SessionEnd hook only — rely on the hook to fire; accept orphan collectors in crash paths and let retention sweep them.'
        - key: idle-only
          label: 'C: Idle timeout only — no explicit signaling; collector self-terminates after N seconds of no OTLP traffic. Simplest, but risks dropping late-arriving spans post-session.'
      answer: null
    - id: q-oversize-payload-strategy
      text: How do we preserve NDJSON line atomicity when a signal's payload exceeds PIPE_BUF?
      description: |
        PIPE_BUF is 4096 bytes on Linux ext4/btrfs and 512 bytes on macOS. Some transcript assistant payloads already exceed 4KB (transcript_assistant.go:267). If two processes in the same session both append large lines without coordination, writes can interleave and corrupt the NDJSON. Three strategies. (A) Truncate attrs.text at 3900 bytes in the inline NDJSON line; spill overflow to .htmlgraph/sessions/<sid>/.overflow/<signal-id>.txt — small main file, queryable full text on demand, single watcher. (B) Wrap large writes in syscall.Flock(LOCK_EX) — slower but uniformly correct; reuses the existing session_html.go pattern. (C) Per-process NDJSON files (one per hook PID per session); merge at query time — no interleaving possible, but explodes inode counts and complicates the indexer. (A) is simplest; (B) is the most uniform; (C) has the cleanest per-process semantics but the worst file-count pressure.
      recommended: truncate-with-overflow-sidecar
      options:
        - key: truncate-with-overflow-sidecar
          label: 'A: Truncate at 3900 bytes + overflow sidecar per signal — small main file, full content preserved, single watcher. Recommended.'
        - key: flock-all-writes
          label: 'B: Flock every NDJSON append — uniform correctness, reuses session_html.go pattern, adds a per-append syscall overhead.'
        - key: per-process-files
          label: 'C: Per-process NDJSON files (one per hook PID per session) — no interleaving possible; merge at query time; many more inodes and more indexer complexity.'
      answer: null
    - id: q-rollout-shape
      text: Do we run NDJSON direct-writer and SQLite-indexer in parallel during rollout, or cut over?
      description: |
        Two rollout shapes. Shape X (parallel-validation): ship slices 1–4 with sinks dual-writing (NDJSON plus direct SQLite) for one release cycle; users can run indexer=off and still see dashboards; compare NDJSON-derived indexer output vs. direct writes to validate parity; then flip indexer=on and remove the direct writer in a follow-up release. Shape Y (cutover): a single release moves everything — collectors write NDJSON only, serve's indexer replays into SQLite, no fallback. Shape Y is what the plan scoping assumes and what simplifies the slice story. Shape X buys a validation window but requires keeping the SQLite sink's direct-write path alive for one release. Given slice 5's checkpoint + replay story makes full rebuild from NDJSON a single command (`rm htmlgraph.db && serve`), the validation window may not be necessary.
      recommended: cutover
      options:
        - key: cutover
          label: 'A: Single-release cutover — NDJSON is the sole write path from day one; indexer drives SQLite. Simpler scope; relies on slice 5''s test matrix for confidence. Recommended.'
        - key: parallel-validation
          label: 'B: One release of dual-writing (NDJSON + SQLite direct) plus parity checks, then cutover in the next release. Safer for production users, larger scope, two deployment events.'
      answer: null
    - id: q-scope-phase-2
      text: Does this plan also cover hook NDJSON migration and CLI op-queue routing, or only the OTel path?
      description: |
        The larger architectural move (HTML + NDJSON as the only canonical stores, SQLite entirely gone) requires three additional pieces beyond this plan: (i) observation-only hook handlers migrate to NDJSON append; (ii) hook mutations plus write-capable CLI commands route through a new serve op queue; (iii) the six genuine-SQL sites named in the constraints (yolo-guard LIKE scans, DSL graph traversal, feature_files self-join, claims CAS, OTel span re-parenting, dashboard sessions list correlated subqueries) get alternative implementations. Including them here makes this plan ~15–20 slices spanning multiple quarters. Excluding them focuses this plan on the per-session collector story (7 slices, estimated 500–800 lines) and leaves the larger move to follow-on plans once this plan's delivery provides real-world signal. Recommended scope: only the OTel path here. Hook NDJSON migration, CLI op-queue routing, and SQL-only query remediation become their own plans under trk-c4615ad2. This plan establishes the NDJSON-canonical + SQLite-derived pattern that follow-on plans extend.
      recommended: otel-only
      options:
        - key: otel-only
          label: 'A: This plan covers the OTel ingest path only (slices 1–7). Hook NDJSON migration, CLI op-queue routing, and SQL-only query remediation become separate future plans. Recommended.'
        - key: include-hook-ndjson
          label: 'B: Also include observation-only hook migration (agent_events writes from missing_events.go handlers → NDJSON) in this plan. Adds ~3 slices.'
        - key: full-sqlite-removal
          label: 'C: Full architectural move — this plan covers everything through complete SQLite removal. Adds ~8–10 slices, multi-quarter delivery.'
      answer: null
