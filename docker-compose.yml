services:
  dashboard:
    build:
      context: packages/phoenix-dashboard
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./.htmlgraph:/storage
    environment:
      - HTMLGRAPH_DB_PATH=/storage/htmlgraph.db
      - PHX_HOST=localhost
      - SECRET_KEY_BASE=dev-only-secret-key-base-that-is-at-least-64-bytes-long-for-phoenix
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
